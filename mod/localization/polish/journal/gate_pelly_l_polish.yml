l_polish:
# Events
 gate_pelly.1.t: "Cold-blooded Murder"
 gate_pelly.1.d: "An unusual murder case has occurred in [TopScope.sS('murder_state').GetName]. A doppelganger of [TopScope.sCha('clone').GetPrimaryRoleTitle] [TopScope.sCha('clone').GetFullName] has been found shot to death. The similarity in appearance is beyond uncanny. The shooter remains unknown and at large."
 gate_pelly.1.f: "A witness reported the shooter as wearing a trenchcoat and hat. He believes the shooter must have been ill as he had a greenish cast to the little skin that was visible. He also reported the shooter might be foreign as he heard the shooter utter a strange phrase after killing the victim."
 gate_pelly.1.a: "Strange."
 gate_pelly.2.t: "Murderer on the run"
 gate_pelly.2.d: "After a long investigation, our officers were able to pin down the murderers hideout, but he fled before police could apprehend him. Investigators found a ripped diary page in the hideout."
 gate_pelly.2.f: "\"The rain was kind enough to cover the noise. I wore the hat for the sake of being seen the way I wished to be seen, though the night would have known me either way. The cigarette shook only once before I let it go out. There was no need to finish it. The car came when it came, slow and careless, and I stepped from the dark, as cool as the revolver in my hand.\n\nThree shots.\n\nThe sound was cleaner than I expected. The body in the road looked like Ford, and that is the part that still amuses me. A man may hide in a gala across the city, but a face like that can be copied, and copied poorly. Still, the one in the street was the one I came for.\n\nWhen I was sure he had croaked, so did I.\"\n\n - Recovered diary page signed 'P.'"
 gate_pelly.2.a: "Strange."
 gate_pelly.3.t: "Murderer jumped the country"
 gate_pelly.3.d: "Our investigators were able to pin down the suspect's location, but he got away. He seems to have left the country and vanished to the wind."
 gate_pelly.3.f: "\"The suspect was located, but apprehension was not achieved. During the attempted approach, he escaped by leaping an impossible distance, beyond any known human capability. In light of this inhuman movement, investigators conclude that the subject was likely a spellcaster of some type. He has since fled the country and is now presumed to be beyond our reach.\"\n\n - Excerpt from case file 1.13.5 LS"
 gate_pelly.3.a: "At least it's over."