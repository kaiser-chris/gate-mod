# Shared
 gate_project_button_stop: "Stop Project"
 gate_project_button_stop_desc: "Stop this [concept_gate_project] and allow our [concept_gate_magic_researcher] to start a new one."
 gate_project_button_pause: "Pause Project"
 gate_project_button_pause_desc: "Pause this [concept_gate_project] and its ongoing cost for a time."
 gate_project_button_continue: "Continue Project"
 gate_project_button_continue_desc: "Continue this [concept_gate_project]."
 modifier_gate_project_cost: "[concept_gate_project] Cost"
 modifier_gate_project_infrastructure_cost: "Project Construction Cost"
