 je_gate_project_modernize_seed_selection_description: "[GetGoods('gate_magic_seed').GetName] are used to increase crop yield. Modernizing selection of those seeds for a better yield will improve our production. This project adds the $modifier_gate_project_modernize_seed_selection_with_tooltip$ [concept_modifier] to one of our [GetBuildingType('building_gate_druid_grove').GetBuildingGroupName]."
 modifier_gate_project_modernize_seed_selection: "Modern Seed Selection"
 modifier_gate_project_modernize_seed_selection_tooltip: "#V $modifier_gate_project_modernize_seed_selection$#!\n[GetStaticModifier('modifier_gate_project_modernize_seed_selection').GetDesc]"
