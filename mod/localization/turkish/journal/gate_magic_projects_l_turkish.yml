 trigger_gate_project_can_has_unimproved_magic_seed: "Have a [GetBuildingType('building_gate_druid_grove').GetBuildingGroupName] [concept_building] without the $modifier_gate_project_modernize_seed_selection_with_tooltip$ [concept_modifier]"
