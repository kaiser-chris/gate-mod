# Expand Magic Research Institute
 button_project_expand_research_institute: "Expand [GetBuildingType('building_gate_magic_research_institute').GetNameNoFormatting]"
 je_gate_project_expand_research_institute: "Expanding our [GetBuildingType('building_gate_magic_research_institute').GetNameNoFormatting]"
 je_gate_project_expand_research_institute_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('magic_researcher').GetCharacter.GetFullName] is currently working on #bold $je_gate_project_expand_research_institute$#!.\n$gate_journal_delimiter$\n$je_gate_project_expand_research_institute_description$"
 je_gate_project_expand_research_institute_description: "The [GetBuildingType('building_gate_magic_research_institute').GetName] is the heart of our efforts to research new ways to apply magic. This project will increase the #bold maximum#! amount of [concept_gate_magic_innovation] we can earn every month."
 modifier_gate_project_institute_new_wing: "New Research Wing"
 modifier_gate_project_institute_improved_instruments: "Improved Instruments"
 modifier_gate_project_institute_better_mana_conduits: "Better Mana Conduits"
# Research Arcane Domains
 button_project_domain: "Research $concept_gate_magic_ethics$"
 je_gate_project_domain: "Research $concept_gate_magic_ethics$"
 je_gate_project_domain_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('magic_researcher').GetCharacter.GetFullName] is currently working on #bold $je_gate_project_domain$#!.\n$gate_journal_delimiter$\n$je_gate_project_domain_description$"
 je_gate_project_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] represent our view of magic in our society and provide massive boosts to our country. This project will let us choose an additional [concept_gate_magic_ethic]."
 je_gate_project_domain_condition_not_researched: "[THIS.GetCountry.GetNameNoFlag] has not already researched a new [concept_gate_magic_ethic]"
 je_gate_project_domain_condition_domain_slot: "[THIS.GetCountry.GetNameNoFlag] has at least one free [concept_gate_magic_ethic] slot"
 # Change Arcane Domains
 button_project_change_domain: "Change $concept_gate_magic_ethics$"
 je_gate_project_change_domain: "Change $concept_gate_magic_ethics$"
 je_gate_project_change_domain_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('magic_researcher').GetCharacter.GetFullName] is currently working on #bold $je_gate_project_change_domain$#!.\n$gate_journal_delimiter$\n$je_gate_project_change_domain_description$"
 je_gate_project_change_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] represent our view of magic in our society and provide massive boosts to our country. This project will let us change our active [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]. #r We can only change our [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] domains once!#!"
 je_gate_project_change_domain_condition_max_domains: "[THIS.GetCountry.GetNameNoFlag] is using all three [concept_gate_magic_ethic] slots"
 je_gate_project_change_domain_condition_not_researched: "[THIS.GetCountry.GetNameNoFlag] has not already changed their [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]"
# Improve Mana Extraction
 button_project_improve_mana_extraction: "Improve Mana Extraction"
 je_gate_project_improve_mana_extraction: "Improve Mana Extraction"
 je_gate_project_improve_mana_extraction_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('magic_researcher').GetCharacter.GetFullName] is currently working on #bold $je_gate_project_improve_mana_extraction$#!.\n$gate_journal_delimiter$\n$je_gate_project_improve_mana_extraction_description$"
 je_gate_project_improve_mana_extraction_description: "Mana Extraction is our primary source of [GetGoods('gate_mana').GetName], which are essential for magical industry to flourish. This project adds the $modifier_gate_project_improved_mana_extraction_with_tooltip$ [concept_modifier] to one of our [GetBuildingType('building_gate_mana_extractor').GetBuildingGroupName]."
 modifier_gate_project_improved_mana_extraction: "Improved Extraction"
 modifier_gate_project_improved_mana_extraction_tooltip: "#V $modifier_gate_project_improved_mana_extraction$#!\n[GetStaticModifier('modifier_gate_project_improved_mana_extraction').GetDesc]"
 modifier_gate_project_improved_mana_extraction_with_tooltip: "#bold #tooltip:[GetRawTextTooltipTag('modifier_gate_project_improved_mana_extraction_tooltip')] #underline $modifier_gate_project_improved_mana_extraction$#!#!#!"
 trigger_gate_project_can_has_unimproved_mana_extraction: "Have a [GetBuildingType('building_gate_mana_extractor').GetBuildingGroupName] [concept_building] without the $modifier_gate_project_improved_mana_extraction_with_tooltip$ [concept_modifier]"
# Modernizing Seed Selection
