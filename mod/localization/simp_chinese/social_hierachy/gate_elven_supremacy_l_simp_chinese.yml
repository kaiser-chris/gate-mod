l_simp_chinese:
 gate_elven_supremacy: "$elven$ 至高无上" #deepl:3321457681
 gate_elven_supremacy_desc: "“精灵至上”制度确立了一套严苛的社会秩序，精灵在权力、声望和魔法方面享有不可撼动的垄断地位。其他种族虽融入社会结构，却被局限于社会底层，无权担任神职人员、贵族或魔法师等职位。这一制度植根于精灵天生优越的信念，在确保精灵统治地位的同时，也剥削着其他种族的劳动和技能。" #deepl:4168647767
 gate_elven_supremacy_trigger_desc: "每个人都受制于这个体系" #deepl:2639333999
# Classes
 gate_elven_upper_class: "精灵上层"
 gate_elven_upper_class_desc: "精灵上层阶级"
 gate_elven_middle_class: "精灵中层"
 gate_elven_middle_class_desc: "精灵中层阶级"
 gate_elven_human_upper_class: "半精灵上层"
 gate_elven_human_upper_class_desc: "半精灵上层阶级"
 gate_elven_human_middle_class: "半精灵中层"
 gate_elven_human_middle_class_desc: "半精灵中层阶级"
 gate_elven_human_lower_class: "半精灵下层"
 gate_elven_human_lower_class_desc: "半精灵下层阶级"
