# Placeholder
 expedition_location_gate_name: "地球之门"
 expedition_location_gate_desc: "我们穿过的魔法门。这是我们返回地球的链接。"
 expedition_location_gate_flavor: "远征队日志——传送门周边，安卡里斯侧\n\n#lore 我们成功抵达了。第一次，我们的靴子踏上了安卡里斯传送门门槛之外的土壤——现在它是我们的了。空气中弥漫着残留的魔法和早已沉降的烟雾。拱门之外就是一片野战营地的残骸：倒塌的帐篷、破损的板条箱、碎裂的奥术电池。敌人的符印烧灼在生锈的盔甲和焦黑的旗帜上，但没有尸体留下。无论这里发生了什么，结局都是逃亡——或者更糟。大地一片寂静。没有侦察兵，没有哨兵，甚至连食腐野兽都没有。只有风在移动，呼啸着穿过空荡的框架，将灰烬扬起，像幽灵一样在空气中飘荡。传送门是安全的，但这寂静令人不安。我们现在控制着这个入口——但安卡里斯正在注视着。#!"
 expedition_location_village_name: "村庄"
 expedition_location_village_desc: "一个[concept_gate_planet]小村庄。我们该如何与他们互动？"
 expedition_location_village_flavor: "侦察报告——初步村庄评估，安卡里斯远征队日志\n\n#lore 村庄坐落在自然地形之中，与周围环境浑然一体。它看起来基本自给自足，有耕种的土地和我们学者不熟悉的奇怪驯化生物。建筑低矮而实用，许多用有机材料加固，这些材料随着环境魔力微弱地脉动。当地人尚未靠近，但他们从屋顶和树木间张起的闪烁魔法结界后观察着我们。整个区域都弥漫着微弱的魔法痕迹——分散而广泛，并不集中——这表明他们要么与土地有着深刻的联系，要么保持着谨慎的戒备。尚未进行直接接触。建议进一步观察。#!"
 expedition_location_castle_name: "城堡"
 expedition_location_castle_desc: "一座[concept_gate_planet]城堡。我们该如何与他们互动？"
 expedition_location_castle_flavor: "侦察报告——要塞据点，安卡里斯远征队日志\n\n#lore 我们的先遣队发现了一座维护良好的城堡，耸立在附近平原上的一道低矮山脊上。这座要塞似乎满员且状况极佳，石工光滑，城垛整洁，新悬挂的旗帜展示着我们纹章学未知的徽记。场地显示出定期巡逻和纪律严明的维护迹象，其外墙周围发展出一个小村庄，很可能为驻军和领主的宫廷提供服务。没有冲突或动乱的迹象——相反，该地区散发着稳定与秩序的气息。中央主塔顶部有一个玻璃圆顶尖塔，在夜间发出柔和的魔法光芒，表明存在奥术顾问或结界。这座城堡似乎是当地某个权力中心（可能是贵族或总督）的所在地，可能对开展外交接触有价值。#!"
 expedition_location_town_name: "市镇"
 expedition_location_town_desc: "一座[concept_gate_planet]市镇。我们该如何与他们互动？"
 expedition_location_town_flavor: "侦察报告——未知城镇定居点，安卡里斯远征队日志\n\n#lore 初步侦察发现了一个相当大的定居点，坐落在一个浅谷中，周围环绕着多层石墙和用当地矿物加固的木栅栏。该城镇似乎是自给自足的，有梯田、风力磨坊和几个高架瞭望哨。与我们经过的小村庄不同，这个地方显示出刻意的规划——宽阔的街道、区域划分，以及一座在夜间微弱闪烁着奥术能量的中央尖塔。城门处可见活动，居民们显得警觉但并未公开敌对。城墙沿线悬挂着几面旗帜，尽管其含义尚不清楚。尚未进行直接接触，但其规模和结构表明，这个城镇可能是当地的贸易中心，甚至是区域性的权力中心。#!"


 expedition_location_kaelmont_harbor_name: "凯尔蒙特港" #deepl:1260914929
 expedition_location_kaelmont_harbor_desc: ""
 expedition_location_kaelmont_harbor_flavor: "侦察报告——凯尔蒙特港，初步海岸评估，安卡里斯远征日志 \n \n #lore  这座城市从一个天然深水港湾层层向上延伸，石砌码头与木制栈桥紧贴着避风海湾的弧线。最近修缮过的防御城墙上留有灼烧痕迹和冲击裂痕，与攻城器械及魔法攻击造成的损伤特征一致。 港口的船只往来依然繁忙：风帆船与法力驱动的船只以熟练的节奏进出，表明尽管近期发生冲突，贸易活动已恢复。 当地建筑多采用坚实的石砌基座搭配木质上层结构，部分建筑还镶嵌着肉眼可见的符文，黄昏时分会微微发光。市政秩序看似稳定；守卫巡逻纪律严明，港口官员则以条理分明的效率进行检查。对外来者的态度虽谨慎但并不敌视——观察到几名码头工人，但鲜少有人愿意在基本的交易往来之外进行交流。#!" #deepl:2898752998
 expedition_location_kaelmont_harbor_sgui: "探险地点：凯尔蒙特港" #deepl:3205318893
 expedition_location_shadowfen_marshes_name: "影沼泽" #deepl:3322250556
 expedition_location_shadowfen_marshes_desc: ""
 expedition_location_shadowfen_marshes_flavor: "侦察报告——影沼泽，前哥布林营地勘察，安卡里斯远征日志 \n \n #lore  这片沼泽横亘于一个低洼盆地之中，遍布着死水横流的沟渠和芦苇丛生的水潭，终年笼罩在迷雾之中。由粗糙的木材和骨头构成的残破栅栏以不规则的间隔从泥沼中凸起——这些曾是宏大防御工事的遗迹，如今已被泥浆吞噬了一半。 由雕刻木头、牙齿和生锈金属制成的护身符悬挂在枯枝上，其中许多仍萦绕着不稳定的萨满能量，即便是未经训练的感官也能察觉。地面险恶；看不见的洼地和被腐化的法力漩涡阻碍着行进，随时可能将人和野兽一同吞噬。 水面偶尔漂浮着萤火虫般的微光，在古老的仪式遗址附近会闪烁得更亮，随后便熄灭。未探测到有组织的哥布林踪迹，但足迹和痕迹表明有食腐生物出没，也可能有孤立的幸存者。若无魔法支援和专业装备，不建议进行深入探索。该区域被列为危险区域；接近时务必极其谨慎。#!" #deepl:3716168922
 expedition_location_shadowfen_marshes_sgui: "探险地点：影沼泽" #deepl:2886152630
 expedition_location_thornhaven_name: "索恩黑文图书馆" #deepl:2889098929
 expedition_location_thornhaven_desc: ""
 expedition_location_thornhaven_flavor: "侦察报告——荆棘港图书馆，学术堡垒观察，安卡里斯远征日志 \n \n #lore  荆棘港矗立于一座岩石山丘之巅，其外墙与天然岩石融为一体，形成了一层浑然天成的防御外壳。这座建筑群兼具堡垒与修道院的特征：狭窄的窗户、加固的大门，以及被回廊环绕的内向式庭院。 顶覆板岩屋顶的塔楼内设有观测台，很可能还藏有奥术实验室——结构化的魔力偶尔会化作细微光束直冲天际，随即消散。在视野范围内，身着长袍的人影正沿着城垛和露台有条不紊地移动，间隔处有身着盔甲的随从护卫，其盔甲上烙印着与图书馆旗帜相同的徽记。 环境中的魔法无处不在却受到严密控制；门扉、窗棂乃至小径上都布满了层层护符，暗示着这里对安全与封锁的极度重视。虽未显露敌意，但初次尝试靠近时，只得到礼貌而疏离的回应，并明确要求必须尊重边界。#!" #deepl:3827972942
 expedition_location_thornhaven_sgui: "探险地点：荆棘港" #deepl:1547988032
 expedition_location_shattered_spine_name: "《破碎的脊梁》" #deepl:2368636830
 expedition_location_shattered_spine_desc: ""
 expedition_location_shattered_spine_flavor: "侦察报告——碎脊，异常地形勘测，安卡里斯远征日志 \n \n #lore  碎脊地带在地平线上延伸，形成一道由断裂的山脊和晶体岩层构成的锯齿状带，仿佛这片土地曾被某种庞大的力量击中并碎裂开来。 岩层以不可思议的角度扭曲，偶尔悬浮在空中，仿佛在挑战重力，被某种无形的力量牢牢固定。植被稀疏且扭曲：焦黑的树木散发出微弱的磷光，而坚韧的灌木上长着如玻璃般的荆棘，其中残留着嗡嗡作响的能量。空气中带着金属味，刚进入此地不久，指南针便开始失灵。零星分布的浓缩魔力区域会以摇曳的海市蜃楼或局部声光扭曲的形式显现。 虽未发现永久性居所，但先前探险队的痕迹——废弃营地、残破工具及焦黑的开垦地——表明寻宝者与学者曾间歇性地深入此地。长时间暴露于此会导致人员产生疲劳与方向迷失。#!" #deepl:2193838243
 expedition_location_shattered_spine_sgui: "远征地点：碎脊" #deepl:1883865606
 expedition_location_silverwood_name: "银木" #deepl:2345942143
 expedition_location_silverwood_desc: ""
 expedition_location_silverwood_flavor: "侦察报告——银木林，精灵领地侦察，安卡里斯远征日志 \n \n #lore  银木林的树冠形成了一幅由交错枝干编织而成的连绵不绝的挂毯，将阳光过滤成银绿交织、变幻莫测的光影。 参天巨树高耸入云，树干上盘绕着活体平台、桥梁和居所，它们与枝叶融为一体，远观几乎难以分辨。空气中弥漫着开花藤蔓的浓郁香气，并蕴含着一种有组织的自然魔法：魔力流如同树液般在根茎与枝干间流动，即便在森林边缘也能清晰感知。 野生动物在侦察队周围表现出不同寻常的镇定，毫无畏惧地观察着，仿佛被某种无形的守护所安抚。精灵的存在更多是隐约可感而非显露——偶尔在高枝间瞥见一闪而过的身影，风中飘来的微弱乐声，以及那些将外来者引离特别神圣树丛的细微路径调整。虽未遭遇敌意，但每一步都受到监视的事实显而易见。#!" #deepl:1919018679
 expedition_location_silverwood_sgui: "探险地点：银木镇" #deepl:1309102118
 expedition_location_crescent_bay_name: "新月湾贸易站" #deepl:906168465
 expedition_location_crescent_bay_desc: ""
 expedition_location_crescent_bay_flavor: "侦察报告——新月湾贸易站，商业中心勘测，安卡里斯探险日志 \n \n #lore  新月湾环抱一个规模不大的天然港湾，海岸线上排列着建造方式和质量各异的码头——有的坚固且保养良好，有的则破旧不堪，显然只是临时搭建的。 定居点本身由层层扩建的区域构成：临水处是最初的石砌仓库，其后挤满了后建的木质建筑，帆布遮阳篷则延伸至露天市场。来自多种文化的旗帜、图腾和彩绘符号在摊位上方飘扬，昭示着形形色色的外来商人和本地顾客。这里氛围虽繁忙却井然有序；一旦发生纠纷，中立的守卫便会迅速出面调解，他们佩戴的臂章和隐约的束缚咒语令人肃然起敬。 魔法以实用形式存在——施了防护咒的保险箱、恒温储藏室、翻译咒——但鲜少被炫耀。居民们对新来者表现出习以为常的漠然，将所有人视为潜在客户，而非威胁或奇观。#!" #deepl:3176239294
 expedition_location_crescent_bay_sgui: "探险地点：新月湾" #deepl:986831799
 expedition_location_ashcrest_ruins_name: "阿什克雷斯特废墟" #deepl:1965952850
 expedition_location_ashcrest_ruins_desc: ""
 expedition_location_ashcrest_ruins_flavor: "侦察报告——灰冠废墟，废弃城市勘测，安卡里斯远征队日志 \n \n #lore  灰冠坐落于一座俯瞰山谷的广阔高原上，其曾经宏伟的大道如今已被风吹扬的尘土和肆意蔓延的植被所覆盖。 许多多层石砌建筑依然屹立，其上精美的浮雕与镶嵌的沟槽暗示着曾存在过完整的魔法系统——如今大多已休眠或损毁。中央广场上矗立着龟裂的方尖碑，干涸的喷泉池底残留着微弱的古老魔法痕迹。此地的寂静令人震撼；未见常住居民，甚至在城墙范围内，动物生命也显得稀少。 仪器检测到低水平的魔法背景辐射，稳定却无害，仿佛这座城市昔日的力量残余仍在向环境中渗出。散落的个人物品——陶器、工具、衣物碎片——暗示着一场仓促的撤离，而非渐进的衰落。#!" #deepl:4055177605
 expedition_location_ashcrest_ruins_sgui: "探险地点：阿什克雷斯特废墟" #deepl:205406364
