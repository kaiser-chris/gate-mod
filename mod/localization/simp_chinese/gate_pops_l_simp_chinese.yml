l_simp_chinese:
# Mages
 gate_mages: "@gate_mages!$gate_mages_no_icon$"
 gate_mages_only_icon: "@gate_mages!"
 gate_mages_no_icon: "法师"
 gate_mages_desc: "受过教育的[concept_gate_magic_users]，通常来自富裕的精英阶层。他们的政治利益通常由[GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameWithCountryVariant]代表。"
 GATE_MAGES_QUALIFICATIONS_DESC: "只有拥有足够[concept_literacy]的人群能成为#v $gate_mages$#!。[concept_literacy]和[concept_wealth]越高，转变潜力就越高。[concept_culture]被[concept_discrimination]的人群转变需要更长时间。#v $aristocrats$#!和#v $academics$#!特别容易成为#v $gate_mages$#!。[GetBuildingType('building_gate_magic_academy').GetName][concept_building]也会使培养新#v $gate_mages$#!更加容易。"
 gate_mages_qualifications_academy: "来自我们的[GetBuildingType('building_gate_magic_academy').GetName]"
 pop_gate_mages: "$gate_mages$[concept_profession]"
 building_employment_gate_mages_add: "$gate_mages$/级"
 building_employment_gate_mages_add_desc: "修正建筑每等级可以雇佣的$gate_mages$数量"
 building_employment_gate_mages_mult: "$building_employment_gate_mages_add$"
 building_employment_gate_mages_mult_desc: "$building_employment_gate_mages_add_desc$"
 building_gate_mages_shares_add: "$gate_mages$[Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_add_desc: "对$gate_mages$[Concept('concept_ownership_share', '$concept_ownership_shares$')]的增益或惩罚"
 building_gate_mages_shares_mult: "$gate_mages$[Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_mult_desc: "对$gate_mages$[Concept('concept_ownership_share', '$concept_ownership_shares$')]的增益或惩罚"
 building_gate_mages_mortality_mult: "$state_gate_mages_mortality_mult$"
 building_gate_mages_mortality_mult_desc: "$state_gate_mages_mortality_mult_desc$"
 building_gate_mages_fertility_mult: "$gate_mages$[Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')]"
 building_gate_mages_fertility_mult_desc: "对$gate_mages$[Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')]的增益或惩罚"
 state_gate_mages_dependent_wage_mult: "$gate_mages$受扶养人口收入"
 state_gate_mages_dependent_wage_mult_desc: "对$gate_mages$受扶养人口收入的增益或惩罚"
 state_gate_mages_mortality_mult: "$gate_mages$[Concept('concept_pop_growth', '$concept_pop_growth_mortality$')]"
 state_gate_mages_mortality_mult_desc: "对$gate_mages$[Concept('concept_pop_growth', '$concept_pop_growth_mortality$')]的增益或惩罚"
 state_gate_mages_investment_pool_contribution_add: "$gate_mages$[concept_investment_pool]贡献"
 state_gate_mages_investment_pool_contribution_add_desc: "$gate_mages$会将多少收益用于投资"
 state_gate_mages_investment_pool_efficiency_mult: "$gate_mages$[concept_investment_pool]贡献效率"
 state_gate_mages_investment_pool_efficiency_mult_desc: "提高或降低$gate_mages$将自身收益贡献给[concept_investment_pool]的比重"
 country_gate_mages_pol_str_mult: "$gate_mages$[concept_political_strength]"
 country_gate_mages_pol_str_mult_desc: "对$gate_mages$[concept_political_strength]的增益或惩罚"
 country_gate_mages_voting_power_add: "$gate_mages$[concept_votes]产生的[concept_political_strength]"
 country_gate_mages_voting_power_add_desc: "对选举时$gate_mages$[concept_votes]提供的[concept_political_strength]的提高或降低"
