l_simp_chinese:
 io_gate_arcane_council: "奥术委员会"
 io_gate_arcane_council_reason: "在一个[concept_gate_magic]普遍存在且强大的[concept_gate_magic_users]可以自由穿梭于各个国家之间的世界里，各国发现有必要进行合作。[concept_gate_arcane_council]应运而生，负责协调国际间关于秘法实践的规则与限制。"
 io_gate_arcane_council_election: "[concept_gate_arcane_council_high_mage]的任期贯穿其整个职业生涯。当现任[concept_gate_arcane_council_high_mage]退休或去世时，将举行新的选举。所有成员[Concept('concept_country','$concept_countries$')]的[concept_gate_magic_researcher]均有资格参选。[AddLocalizationIf(GetPlayer.MakeScope.Var('gate_joined_mage_council').IsSet, 'io_gate_arcane_council_election_involved')]" #deepl:272868124
 io_gate_arcane_council_election_involved: "\n \n 我们的[concept_gate_magic_researcher]网站的选举评分是#tooltippable  #tooltip: [GetRawTextTooltipTag('io_gate_arcane_council_election_score_tooltip')] [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v] #! #! 而且我们很可能会在下次选举中[GetPlayer.GetCustom('gate_arcane_council_election_indicator')]。" #deepl:2891667291
 io_gate_arcane_council_election_indicator_loss: "#r  访问 #!" #deepl:3926816450
 io_gate_arcane_council_election_indicator_win: "#g  win #!" #deepl:3291145026
 io_gate_arcane_council_election_score_tooltip: "我们的[concept_gate_magic_researcher]在[concept_gate_arcane_council_high_mage]上的总评分为[GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]，原因如下：#indent_newline:3 \n [GetPlayer.MakeScope.GetScriptValueDesc('gate_arcane_council_election_score')] #!" #deepl:2154648864
 io_gate_arcane_council_status_election: "该组织目前正在选举新一届[concept_gate_arcane_council_high_mage]。" #deepl:2521965666
 io_gate_arcane_council_leader_title: "至高法师"
 io_gate_arcane_council_leader_tooltip: "#header  [concept_gate_arcane_council_high_mage] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] #! \n [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetName] 目前是 [concept_gate_arcane_council] 的 [concept_gate_arcane_council_high_mage]。\n \n 他们的选举评分是 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]，预计将在下次选举中 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetCustom('gate_arcane_council_election_indicator')]。" #deepl:175225360
 sb_gate_arcane_council_research_cooperation: "开展科研合作" #deepl:347480126
 sb_gate_arcane_council_research_cooperation_desc: "请使用我们的“[concept_influence]”来推动全体成员之间的联合研究计划。" #deepl:1676093222
