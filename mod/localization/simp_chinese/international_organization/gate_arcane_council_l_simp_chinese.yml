 sb_gate_arcane_council_cancel_regulations_desc: "允许会员再次使用 [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName] 和 [GetMobilizationOption('mobilization_option_gate_basic_regulations').GetName] [concept_mobilization_option]。" #deepl:4008094272
