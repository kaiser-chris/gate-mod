l_simp_chinese:
 concept_gate_planet: "$gate_planet$"
 concept_gate_planet_desc: "安卡里斯，一个充满原始魔法与古老奇迹的世界，巍峨的山脉环抱着矮人族的大厅，苍翠的森林庇护着精灵王国，广袤的平原回荡着兽人战团的怒吼。这个世界的美丽之下，隐藏着动荡的历史，魔能的狂暴涌流塑造了这里的土地与人民，它既是联系一切的纽带，又是冲突的源泉。"
 concept_gate_magic_knowledge: "奥术知识"
 concept_gate_magic_knowledge_desc: "$concept_gate_magic_knowledge$是一组无法直接研究的技术集合，只能通过你的[concept_gate_magic_researcher]研究魔法本身来获得。\n\n这些技术包括：\n• [GetTechnology('gate_magic_understanding_production').GetName]\n• [GetTechnology('gate_magic_understanding_society').GetName]\n• [GetTechnology('gate_magic_understanding_military').GetName]"
 concept_gate_mana_saturation: "魔能饱和度"
 concept_gate_mana_saturation_desc: "魔能饱和度是世界各地[concept_gate_mana_density]的平均值。"
 concept_gate_magic_innovation: "魔法创新力"
 concept_gate_magic_innovation_desc: "@magic_innovation!$concept_gate_magic_innovation$主要通过我们的[concept_gate_magic_researcher]和[GetBuildingType('building_gate_magic_research_institute').GetName]产生。[GetBuildingType('building_gate_alxa').GetName]、[GetBuildingType('building_gate_mage_tower').GetName]、[GetBuildingType('building_gate_magic_academy').GetName]和[GetBuildingType('building_university').GetName]$concept_buildings$也能为我们的月度魔法创新产出做出贡献。"
 concept_gate_magic_technology: "魔法科技"
 concept_gate_magic_technologies: "魔法科技"
 concept_gate_magic_technology_desc: "$concept_gate_magic_technology$ covers all magical innovation in the fields of $PRODUCTION_NO_CONCEPT$, $MILITARY$, and $SOCIETY$. $concept_gate_magic_technologies$ have nation-wide effects, which can range from changing the [Concept('concept_country','$concept_country_possessive$')] operating parameters via [Concept('concept_modifier','$concept_modifiers$')] to unlocking new [Concept('concept_production_method','$concept_production_methods$')], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')], [Concept('concept_decree','$concept_decrees$')], and [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')].\n\nProgress is made towards new $concept_gate_magic_technologies$ through [concept_gate_magic_innovation].\n\nThe amount of progress required in a $concept_gate_magic_technology$ to acquire it depends on its [Concept('concept_technology_era','$concept_technology_era_short$')]. $concept_technology_era_ahead_of_time_penalty_desc$"
 concept_gate_monster_attack: "魔物袭击"
 concept_gate_monster_attacks: "魔物袭击"
 concept_gate_monster_attack_desc: "当[concept_gate_mana_density]达到中等水平时，当地动植物可能会发生突变，并攻击平民。"
 concept_gate_monster_horde: "魔物潮"
 concept_gate_monster_hordes: "魔物潮"
 concept_gate_monster_horde_desc: "当[concept_gate_mana_density]达到中等水平时，当地动植物可能会发生大规模突变，并疯狂地攻击平民。"
 concept_gate_mana_density: "魔能浓度"
 concept_gate_mana_density_mana: "魔能"
 concept_gate_mana_density_desc: "Since the Magic Gates opened, mana is spewing onto Earth. Applications of [concept_gate_magic_knowledge] on Earth has further increased the amount of mana in the atmosphere. Should the $concept_gate_mana_density$ in a state reach its maximum, [concept_gate_magical_phenomena] will become common place. Until then different levels of $concept_gate_mana_density$ in a state will lead to unpredictable changes and events.\n\n#header Mana Density Levels:#!\n• Low Mana Density starts from #v [GuiScope.ScriptValue('gate_low_mana_density_threshhold')]%#!\n• Medium Mana Density starts from #v [GuiScope.ScriptValue('gate_medium_mana_density_threshhold')]%#!\n• High Mana Density starts from #v [GuiScope.ScriptValue('gate_high_mana_density_threshhold')]%#!"
 concept_gate_magical_phenomena: "魔法现象"
 concept_gate_magical_phenomena_desc: "Magical phenomena are events driven by the increased [concept_gate_mana_density] in a state. They range from benign over helpful to terrifying."
 concept_gate_magic_researcher: "奥术师"
 concept_gate_magic_researchers: "奥术师"
 concept_gate_magic_researcher_desc: "A countries Arcanist leads the [GetBuildingType('building_gate_magic_research_institute').GetName] and steers its [concept_gate_magic_innovation]. They lead [Concept('concept_gate_project','$concept_gate_projects$')] and help us improve magical industries and the usage of magic in society."
 concept_gate_character_experience: "角色经验"
 concept_gate_character_experience_desc: "某些角色，如我们的[concept_gate_magic_researcher]，能在工作中积累经验。等级越高的角色工作能力越强，能提升日常工作的成果。\n\n#header 经验等级：#!\n• $gg_character_experience_basic$\n• $gg_character_experience_experienced$\n• $gg_character_experience_expert$"
 concept_gate_magic: "魔法"
 concept_gate_magic_desc: "魔法即通过操控魔能改变现实的行为。[concept_gate_magic_users]使用魔法能产生奇效，亦可能招致毁灭。"
 concept_gate_magic_user: "施法者"
 concept_gate_magic_users: "施法者"
 concept_gate_magic_users_desc: "施法者是能够在日常生活中运用奥秘能量的[Concept('concept_pop','$concept_pops$')]。\n\n#header 人群：#!\n• [GetPopType('gate_mages').GetName]\n• [GetPopType('gate_druids').GetName]"
 concept_gate_magic_ethic: "奥术领域"
 concept_gate_magic_ethics: "奥术领域"
 concept_gate_magic_ethic_desc: "$concept_gate_magic_ethics$ are a defining [concept_country] modifier.\nThey represent how a country plans to use magic."
 concept_gate_mbudye_council: "姆布迪耶长老会"
 concept_gate_mbudye_council_desc: "The $concept_gate_mbudye_council$ stands as the heart of the Lunda's historical and spiritual identity. Comprising wise men and women, they serve as keepers of sacred traditions, interpreters of political principles, and guardians of ancestral memory. In the face of the Arcturian Dominion's efforts to spread the Golden Blessing, the council has been both a bulwark of resistance and a bridge for dialogue. Balancing the weight of history with the pressures of change, the Mbudye navigate a turbulent era where faith and power intertwine."
 concept_gate_bambudye: "邦布耶秘密结社"
 concept_gate_bambudye_desc: "The Bambudye, a clandestine society born of Lunda resilience, operates in the shadows, defying the Arcturian Dominion's rule. Rooted in ancient traditions, they blend mysticism with cunning strategy, fighting to preserve their people's autonomy and cultural identity. To the oppressed, they are symbols of hope and rebellion; to the elves, they are elusive insurgents sowing chaos in a fragile order. Their influence runs deep, whispered in hushed tones, a constant reminder that the Lunda spirit cannot be easily subdued."
 concept_gate_vampirism: "吸血鬼化"
 concept_gate_vampirism_desc: "鲜血与力量缔结的黑暗契约，吸血鬼化以代价换取永生。承受此诅咒者，将获非人之力、超凡感官，以及将其束缚在阴影之中的嗜血饥渴。受难者的血脉中，魔能与饥渴交织，铸就既被畏惧亦受敬畏的存在。接纳吸血鬼化，即意味着成为[GetCulture('vampire').GetName]的一员。"
 concept_gate_ley_line: "灵脉"
 concept_gate_ley_lines: "灵脉"
 concept_gate_ley_lines_desc: "灵脉是潜藏于地表之下的原始魔能脉络，常人不可见却维系着神秘学的根基。当其交汇之时，魔能会激涌而出，将所在区域化为强效魔法节点，并强化附近一切法术效果。"
 concept_gate_mana_well: "魔能井"
 concept_gate_mana_well_desc: "魔能井是[Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]上的节点。魔能井几乎可以产生无尽的$gate_mana$。\n\n但它们可能引发当地[Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]的#v 不稳定#!，进而导致#v 事故#!。"
 concept_gate_expedition: "$gate_planet$远征"
 concept_gate_expedition_desc: "当我们掌控[GetBuildingType('building_gate_alxa').GetName]并完成[GetTechnology('gate_expeditions').GetName]的开发后，即可发起一场对[concept_gate_planet]的远征。"
 concept_gate_expedition_location: "Expedition Location"
 concept_gate_expedition_location_desc: "" #TODO
 concept_gate_expedition_leader: "远征领队"
 concept_gate_expedition_leaders: "远征领队"
 concept_gate_expedition_leader_desc: "[concept_gate_expedition]的领队人选将决定我们能在[concept_gate_planet]上开展何种[concept_gate_expedition_activities]。\n\n领队分为三类：\n• [concept_gate_expedition_leader_militarist]\n• [concept_gate_expedition_leader_politician]\n• [concept_gate_expedition_leader_industrialist]"
 concept_gate_expedition_leader_militarist: "军事家"
 concept_gate_expedition_leader_militarist_desc: "$concept_gate_expedition_leader_militarist$专注于通过武力控制[concept_gate_planet]人。"
 concept_gate_expedition_leader_politician: "政治家"
 concept_gate_expedition_leader_politician_desc: "$concept_gate_expedition_leader_politician$专注于与[concept_gate_planet]人建立外交关系。"
 concept_gate_expedition_leader_industrialist: "实业家"
 concept_gate_expedition_leader_industrialist_desc: "$concept_gate_expedition_leader_industrialist$专注于与[concept_gate_planet]人一起开发新的贸易路线。"
 concept_gate_expedition_budget: "远征预算"
 concept_gate_expedition_budget_desc: "$concept_gate_expedition_budget$预算用于在[concept_gate_planet]上开启新的[concept_gate_expedition_activities]；当预算耗尽时，我们的[concept_gate_expedition]将宣告结束。"
 concept_gate_expedition_activity: "远征活动"
 concept_gate_expedition_activities: "远征活动"
 concept_gate_expedition_activities_desc: "在[concept_gate_expedition_map]上的每次交互都被视为一个[Concept('concept_gate_expedition_activities','$concept_gate_expedition_activity$')]。"
 concept_gate_expedition_map: "远征地图"
 concept_gate_expedition_map_desc: "$concept_gate_expedition_map$需要通过侦察逐步解锁，该地图本身在多次远征中保持不变。"
 concept_gate_project: "奥术师项目"
 concept_gate_projects: "奥术师项目"
 concept_gate_project_desc: "在顶尖魔法学者的引领下，奥术师工程项目将奥术理论转化为实用创新。这些专注研究释放出提升产业、优化社会、强化基建的魔法增效，铺就通往更辉煌魔法未来的道路。"
 concept_gate_magic_country: "奥术国家"
 concept_gate_magic_countries: "奥术国家"
 concept_gate_magic_country_desc: "已经获得[concept_gate_magic_knowledge]的国家。"
 concept_gate_arcane_council: "$io_gate_arcane_council$"
 concept_gate_arcane_council_desc: "The $io_gate_arcane_council$ is an [concept_com_international_organization] meant to regulate and restrict [concept_gate_magic_users]. Its primary goal is to prevent international incidents and it is headed by a [concept_gate_arcane_council_high_mage]."
 concept_gate_arcane_council_high_mage: "$io_gate_arcane_council_leader_title$"
 concept_gate_arcane_council_high_mage_desc: "The $io_gate_arcane_council_leader_title$ leads the [concept_gate_arcane_council] [concept_com_international_organization]. They are elected from all member countries [Concept('concept_gate_magic_researcher','$concept_gate_magic_researchers$')]."
