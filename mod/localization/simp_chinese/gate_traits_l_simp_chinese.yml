 gate_arcanist_bound_name_desc: "该角色封印了自身真名的一部分，以此抵御敌对的[concept_gate_magic]。这赋予了其对抗诅咒、强制术和召唤仪式的抗性，但同时也使其在社交层面受到削弱，仿佛其身份中某个至关重要的部分已无法完全向他人展现。" #deepl:1622693922
