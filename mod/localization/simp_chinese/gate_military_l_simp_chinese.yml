l_simp_chinese:
# Combat Unit Groups
 combat_unit_group_gate_magic_infantry: "奥术步兵"
 combat_unit_group_gate_magic_infantry_desc: "你的军队的主体。这些勇士为你的国家而战。"
 combat_unit_group_gate_magic_artillery: "奥术火炮"
 combat_unit_group_gate_magic_artillery_desc: "从远处向敌军阵地开火，以造成毁灭性的伤害。"
 combat_unit_group_gate_creatures: "召唤物"
 combat_unit_group_gate_creatures_desc: "能够在战场上造成严重破坏的奇异而强大的怪兽。"
# Combat Unit
 combat_unit_type_gate_mage_infantry: "法师步兵"
 combat_unit_type_gate_mage_infantry_desc: "由旧式骑士保护的法师。他们可以施展强大的攻击法术，但现代武器和战术足以与之抗衡。"
 combat_unit_type_gate_arcane_vangard: "奥术先锋"
 combat_unit_type_gate_arcane_vangard_desc: "前线部队配备了防护结界，能够偏转轻武器火力和削弱来袭的法术，非常适合领导冲锋或守住防线。"
 combat_unit_type_gate_mana_rifle_infantry: "魔能枪步兵"
 combat_unit_type_gate_mana_rifle_infantry_desc: "标准步兵配备由魔能核心增强的步枪，提升了射程与穿甲能力，可有效对抗魔法和机械类敌人。"
 combat_unit_type_gate_wraithwalkers: "幽灵行者"
 combat_unit_type_gate_wraithwalkers_desc: "掌握暗影魔法的轻步兵，具备短暂隐身与近乎无声的机动能力——尤擅侦察与伏击战术。"
 combat_unit_type_gate_rune_guard_infantry: "防护符文步兵"
 combat_unit_type_gate_rune_guard_infantry_desc: "刻有防护符文的重甲单位，对物理与魔法攻击均有极强抗性，适合防御或稳步推进。"
 combat_unit_type_gate_thaumaturgic_commandos: "奥术突击队"
 combat_unit_type_gate_thaumaturgic_commandos_desc: "精通战斗与法术的精英小队，既能执行破坏任务，又能进行短距离空间跃迁，还能施展覆盖整个战场的强大魔法。"
 combat_unit_type_gate_mage_artillery: "法师火炮"
 combat_unit_type_gate_mage_artillery_desc: "受过专门训练的特殊法师，能够在战场上施展破坏力巨大的仪式魔法。"
 combat_unit_type_gate_mana_artillery: "魔能火炮"
 combat_unit_type_gate_mana_artillery_desc: "魔能火炮通过附魔加农炮发射灌注原始魔能的炮弹，弹体撞击目标时会释放奥秘能量冲击波。这种能量能无视传统护甲防御，对敌军阵线造成毁灭性打击，完美融合了魔法工艺与工业化火力的双重优势。"
 gate_combat_unit_type_dragon_spawn: "龙人"
 gate_combat_unit_type_dragon_spawn_desc: "TODO"
