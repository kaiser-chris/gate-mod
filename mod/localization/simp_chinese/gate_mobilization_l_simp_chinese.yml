l_simp_chinese:
# Groups
 magical_support: "魔法支持"
 magical_support_desc: "你的军队在战场上所能施展的魔法。"
 gate_magic_user_regulation: "魔法规章"
 gate_magic_user_regulation_desc: "战场上不受管控的[concept_gate_magic_users]不仅可能造成毁灭性影响，还会导致大量平民伤亡。" #deepl:2204960761
# Mobilizations
 mobilization_option_gate_ritual_magic: "仪式魔法"
 mobilization_option_gate_ritual_magic_desc: "技艺高超的法师能在战场上造成毁灭性的打击。" #deepl:1886079850
 mobilization_option_gate_healing_circles: "治疗法阵"
 mobilization_option_gate_healing_circles_desc: "这些技术最初源于神圣的仪式，如今其应用范围已扩展至战区、救灾现场，甚至城市诊所，这证明了魔法既能成为治愈的力量，也能成为毁灭的力量。" #deepl:1382523111
 mobilization_option_gate_battlefield_wards: "战场结界"
 mobilization_option_gate_battlefield_wards_desc: "要建立一个战场护符，需要一位技艺高超的法师，通常还需一名助手协助管理复杂的魔力阵列，并在战斗压力下保持专注。这些护符虽然威力强大，但也并非没有局限——猛烈的火力或持续的魔法攻击可能会导致其过载，从而引发突然崩溃。尽管如此，其战略价值不容置疑，能够将原本难以守住的阵地转变为坚固的堡垒。" #deepl:2899054739
 mobilization_option_gate_scrying: "战术占卜" #deepl:446820983
 mobilization_option_gate_scrying_desc: "战术占卜将这门古老的技艺升华为战场利器，使指挥官能够以更快的速度和更高的精度，穿透距离、烟雾与阴影进行观察。曾经作为“隐眼”仪式的技艺，如今已成为侦察、锁定目标并掌控战局走向的实用手段。" #deepl:1332627732
 mobilization_option_gate_no_regulations: "受制裁的浩劫" #deepl:1076014691
 mobilization_option_gate_no_regulations_desc: "[concept_gate_magic_users] 在几乎没有任何监管的情况下被放任自流，其权力被视为胜利的代价。" #deepl:2575681122
 mobilization_option_gate_basic_regulations: "基本条例" #deepl:866036724
 mobilization_option_gate_basic_regulations_desc: "[concept_gate_magic_users] 他们效忠军队，但其权力受到足够约束，从而避免了公开的灾难。" #deepl:3825241518
 mobilization_option_gate_strict_regulations: "严格的规定" #deepl:1398427907
 mobilization_option_gate_strict_regulations_desc: "[concept_gate_magic_users] 受到严密监视，其权力仅在受到严格限制的情况下才被允许行使。" #deepl:3240202520
