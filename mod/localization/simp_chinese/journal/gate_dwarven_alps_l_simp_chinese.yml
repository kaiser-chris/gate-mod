 pb_gate_german_integration_desc: "进度：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|0%]#!（[JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/100）%"
