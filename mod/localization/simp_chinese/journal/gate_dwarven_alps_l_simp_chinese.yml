 pb_gate_german_integration_support_progess: "我们的整合工作"
 pb_gate_german_integration_support_desc_pro: "支持"
 pb_gate_german_integration_support_desc_anti: "反对"
 pb_gate_german_integration_support_state_peace: "低[concept_turmoil]的[Concept('concept_incorporated_state', '$concept_incorporated_states$')]"
 pb_gate_german_integration_support_state_turmoil: "高[concept_turmoil]的[Concept('concept_incorporated_state', '$concept_incorporated_states$')]"
 gate_dwarven_alps.1.t: "魔法联盟" #deepl:759580272
 gate_dwarven_alps.1.d: "[SCOPE.sCountry('loc_raetia_scope').GetName] 使用“[SCOPE.sCountry('loc_swiss_scope').GetName]”锻造了一把奥术[concept_alliance]。" #deepl:471135945
 gate_dwarven_alps.1.f: "在冰霜啃噬的$GATE_MK$峰峦间，矮人们从隐秘的锻造坊中现身，肩负着比群山本身更为古老的秘密。在古老石像守卫的注视下，他们与瑞士的使者会面，眼中闪烁着警惕与希望交织的光芒。为了分享他们的玄奥知识，矮人们寻求与地表居民结盟以获得力量。 双方以紧握的双手缔结盟约，将山峦与山谷紧密联结，这一联盟注定将重塑两个世界的命运。" #deepl:1658510880
 gate_dwarven_alps.1.a: "我们将共享这片山脉。" #deepl:1035871269
 gate_dwarven_alps.2.t: "矮人隧道全图" #deepl:2756466823
 gate_dwarven_alps.2.d: "将#v 、$state_trait_gate_dwarven_tunnels$、#!的特性添加到[SCOPE.sState('digging_state').GetName]中。" #deepl:1641800128
 gate_dwarven_alps.2.f: "经过不懈的努力和精湛的工程技艺，错综复杂的矮人隧道网络已然建成，将[SCOPE.sState('digging_state').GetName]王国完全纳入了我们的疆域。这些地下通道不仅巩固了我们的主权，更成为了贸易、防御和探索的重要动脉。昔日镐头敲击的回响与矮人石匠的歌声，已然让位于熙熙攘攘、充满商贸与团结气息的通道，这象征着我国日益深厚的实力与日益广阔的疆域。" #deepl:1149495808
 gate_dwarven_alps.2.a: "这里将永远是我们的家。" #deepl:3381860407
 gate_dwarven_alps.3.t: "阿尔卑斯山的主人" #deepl:1603304319
 gate_dwarven_alps.3.d: "所有阿尔卑斯山脉沿线的国家均已处于我们的控制之下。" #deepl:2128780974
 gate_dwarven_alps.3.f: "终于，整个阿尔卑斯山脉都归我们了，我们定要留在这里！" #deepl:2678563017
 gate_dwarven_alps.3.a: "阿尔卑斯山是我们的。" #deepl:127135170
 gate_dwarven_alps.4.t: "德国人口统计" #deepl:3568626407
 gate_dwarven_alps.4.d: "将 [SCOPE.sCulture('loc_south_german_scope').GetName] 和 [SCOPE.sCulture('loc_alemannic_scope').GetName] 的培养物添加为 [concept_primary_cultures]。" #deepl:307164883
 gate_dwarven_alps.4.f: "在巍峨的高山峰峦的阴影下，$GATE_MK$的矮人们齐聚一堂，他们的斧头和铁锤在阳光下闪烁着坚定不移的决心。 那些在这崎岖高地开垦出新生的德国移民，如今迎来了人生的新篇章。随着一道正式诏令的颁布，矮人们伸出了融合之手，将古老的传统与山民勤劳的精神相融合。当凛冽的寒风在他们周围呼啸时，一座新的联盟在群山深处铸就，它融合了不同的文化，并塑造了一个未来——在那里，每一块石头与每一个故事都将交织在一起。" #deepl:1054912044
 gate_dwarven_alps.4.a: "我们迟早要把他们变成矮人。" #deepl:2953530722
 gate_dwarven_alps.5.t: "整合瑞士"
 gate_dwarven_alps.5.d: "我们已完全整合[SCOPE.sCountry('loc_swiss_scope').GetName]。"
 gate_dwarven_alps.5.f: "在阿尔卑斯山脉的腹地，群峰直插云霄。$GATE_MK$与$SWI$的领袖并肩立于古老的殿堂之中，他们的声音在石砌穹顶下回荡。矮人国王的王冠闪烁着地核之光，庄严宣告两国人民合而为一。$SWI$将以矮人为主导，将磐石的力量与血肉的坚韧融为一体。山呼万岁，两个国度就此铸成一体，开创繁荣与力量并存的新纪元，魔法与力量将在这个纪元至高无上、主宰一切。"
 gate_dwarven_alps.5.a: "我们将共享这片山脉。"
 gate_dwarven_german_integration.1.t: "穷人之声"
 gate_dwarven_german_integration.1.d: "我们的许多德语公民发现自己被排除在我们的财富之外。"
 gate_dwarven_german_integration.1.f: "信使带来了令人不安的消息：山谷地区的德语公民正深陷贫困的泥潭。农田歉收、粮仓空虚、举家逃往矮人堡垒阴影下寻求庇护的故事，回荡在厅堂之间。他们曾经骄傲的声音，此刻正因绝望而颤抖。如今抉择的重担落在这个国家的领袖肩上——是伸出援手拯救这些子民，还是任凭他们的哀嚎回荡在群山之间？这个决定不仅将决定受难者的命运，更将重塑$GATE_MK$脆弱的团结。"
 gate_dwarven_german_integration.1.a: "还不是因为他们太懒了！"
 gate_dwarven_german_integration.1.b: "我们必须帮助他们！"
 modifier_gate_dwarven_help_germans: "救济说德语的兄弟"
 modifier_gate_dwarven_german_work_program: "德意志人的工作计划"
 gate_dwarven_german_integration.2.t: "顽固的行会师傅"
 gate_dwarven_german_integration.2.d: "一些$dwarven$行会师傅正在利用他们的传统权利拒绝德语公民的加入。"
 gate_dwarven_german_integration.2.f: "信使带来了令人不安的消息：山谷地区的德语公民正深陷贫困的泥潭。农田歉收、粮仓空虚、举家逃往矮人堡垒阴影下寻求庇护的故事，回荡在厅堂之间。他们曾经骄傲的声音，此刻正因绝望而颤抖。如今抉择的重担落在这个国家的领袖肩上——是伸出援手拯救这些子民，还是任凭他们的哀嚎回荡在群山之间？这个决定不仅将决定受难者的命运，更将重塑$GATE_MK$脆弱的团结。"
 gate_dwarven_german_integration.2.a: "这是他们的权利。"
 gate_dwarven_german_integration.2.b: "传统需要改变。"
 gate_dwarven_german_integration.3.t: "文化和谐节"
 gate_dwarven_german_integration.3.d: "文化节促进了矮人和德意志[Concept('concept_culture', '$concept_cultures$')]之间的融合。"
 gate_dwarven_german_integration.3.f: "$GATE_MK$的街道因$dwarven$工艺与德意志艺术的交融而生机勃勃。摊位上摆满阿尔卑斯山风味佳肴与矮人精酿啤酒，矮人与德意志民谣的旋律在空中交织。在这一天，隔阂悄然消融，各族群共庆携手同行的未来，在欢声笑语中播撒信任与理解的种子。"
 gate_dwarven_german_integration.3.a: "很好！"
 gate_dwarven_german_integration.4.t: "共享行会创新"
 gate_dwarven_german_integration.4.d: "矮人和德意志文化的融合增加了我们的[concept_gate_magic_innovation]。"
 gate_dwarven_german_integration.4.f: "在一次开创性的合作中，矮人行会与德意志工匠将双方专长相结合，共同探索魔法创新的新边界。工坊里洋溢着蓬勃活力，奥术理论与实用技艺相遇，迸发出有望重塑两者传统根基的新构想。这一合作项目标志着双方正通过共同创造迈向团结。"
 gate_dwarven_german_integration.4.a: "我们将站在魔法的最前沿。"
 gate_dwarven_german_integration.5.t: "破坏融合工作"
 gate_dwarven_german_integration.5.d: "一些$dwarven$传统主义者破坏了我们的融合计划。"
 gate_dwarven_german_integration.5.f: "在一场暗中发起的抵抗行动中，一伙主张维护传统的矮人破坏了各项融合计划，声称其自身文化遗产的存续正面临威胁。这一事件在多元族群间引发猜疑，使敏雷蒂亚统一各族群的工作变得更加复杂。"
 gate_dwarven_german_integration.5.a: "严惩不贷。"
 gate_dwarven_german_integration.5.b: "我们束手无策。"
 gate_dwarven_german_integration.6.t: "破坏融合工作"
 gate_dwarven_german_integration.6.d: "一些德意志传统主义者破坏了我们的融合计划。"
 gate_dwarven_german_integration.6.f: "局势日趋紧张，起因是一个由德语公民组成的秘密组织以“担忧自身文化认同面临消亡威胁”为由，蓄意破坏多项社会融合政策。他们的行径不仅进一步破坏了社会互信，更凸显出在将多元文化传统熔铸成统一国家认同的过程中所面临的艰巨挑战。"
 gate_dwarven_german_integration.6.a: "严惩不贷。"
 gate_dwarven_german_integration.6.b: "我们束手无策。"
