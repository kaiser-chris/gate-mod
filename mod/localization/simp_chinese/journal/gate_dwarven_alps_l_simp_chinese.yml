l_simp_chinese:
 je_gate_dwarven_alps: "阿尔卑斯山之主"
 je_gate_dwarven_alps_lobby: "$je_gate_dwarven_alps_reason$"
 je_gate_dwarven_alps_status: "这片山脉将成为我们的新家园。"
 je_gate_dwarven_alps_reason: "$GATE_MK$的终极目标是将阿尔卑斯地区统一在他们的旗帜之下，这一抱负使瑞士成为其核心关注对象。与许多倾向于武力征服的国家不同，$GATE_MK$的矮人族群更加推崇外交手段，力求通过和平说服使瑞士自愿加入他们的阵营。他们设想的并非一国对另一国的统治，而是共享繁荣与文化交融的平等伙伴关系。\n$gate_journal_delimiter$\n为实现这一愿景，$GATE_MK$深知必须证明自身具备公正治理与文化融合的能力。其现有德语人口的成功同化不仅关乎内政稳定，更是一项至关重要的实证。瑞士必须确信，在任何形式的联合中，自己都将作为与矮人族利益对等的合作伙伴存在，而非屈从于附属地位。"
 je_gate_dwarven_integration_of_germans: "整合德意志人"
 je_gate_dwarven_integration_of_germans_reason: "深藏在阿尔卑斯山脉中的矮人王国$GATE_MK$，正经历着前所未有的变革。自从与德语邻邦结成联盟，一种融合矮人古老传统与巴伐利亚人文风俗的阿尔卑斯新认同正在成形。矮人公会开始与人类议会共同议事，锻造锤的铿锵声里开始回荡巴伐利亚的新旋律。\n$gate_journal_delimiter$\n但融合之路布满荆棘。矮人对动摇百年传统的改革激烈抵抗，人类则在以石砌厅堂与森严行会等级为主导的社会中无所适从。不满的低语在双方阵营中愈发响亮——人类担忧文化被矮人洪流吞没，矮人则抱怨妥协让步正稀释血脉传承。在冰川投下的阴影里，脆弱的联盟如同未开采的矿脉，随时可能被古老骄傲与崭新盟约的重压碾得粉碎。"
 je_gate_dwarven_integration_of_germans_success: "将于我们的德意志公民被整合时完成"
 je_gate_dwarven_integration_of_germans_failure: "若整合失去公众支持将会失败"
 je_gate_dwarven_alps_button_switzerland_exists: "[SCOPE.sCountry('loc_swiss_scope').GetName]存在。"
 je_gate_dwarven_alps_button_switzerland_magic: "向$SWI$提议缔结魔法同盟"
 je_gate_dwarven_alps_button_switzerland_magic_desc: "我们愿意将[concept_gate_magic_knowledge]与[SCOPE.sCountry('loc_swiss_scope').GetName]交换，以换取[concept_alliance]。" #deepl:347998969
 je_gate_dwarven_alps_button_switzerland_magic_already: "[SCOPE.sCountry('loc_swiss_scope').GetName] #bold  难道不知道 #! 已经掌握了魔法吗？" #deepl:1433899868
 je_gate_dwarven_alps_button_switzerland_integrate: "集成 $SWI$" #deepl:990036817
 je_gate_dwarven_alps_button_switzerland_integrate_desc: "将 [SCOPE.sCountry('loc_swiss_scope').GetName] 集成到 [SCOPE.sCountry('loc_raetia_scope').GetName] 中。" #deepl:2954477084
 je_gate_dwarven_alps_integrate_germans: "德国人口统计" #deepl:3568626407
 je_gate_dwarven_alps_integrate_germans_desc: "启动将[SCOPE.sCulture('loc_south_german_scope').GetName]和[SCOPE.sCulture('loc_alemannic_scope').GetName]文化整合为[concept_primary_cultures]的进程。此举可能会激怒部分民众。" #deepl:1214659788
 decision_gate_dwarven_tunnels: "挖掘矮人隧道" #deepl:2525967142
 decision_gate_dwarven_tunnels_desc: "为山区州添加$state_trait_gate_dwarven_tunnels$属性。" #deepl:1116110579
 decision_gate_dwarven_tunnels_cooldown_tt: "过去6个月内未访问过 #v 、$state_trait_gate_dwarven_tunnels$ 和 #!" #deepl:1465771874
