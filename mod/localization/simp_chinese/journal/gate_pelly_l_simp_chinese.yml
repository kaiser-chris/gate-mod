l_simp_chinese:
# Events
 gate_pelly.1.t: "冷血谋杀" #deepl:1602546968
 gate_pelly.1.d: "[TopScope.sS('murder_state').GetName]发生了一起不同寻常的谋杀案。有人发现，[TopScope.sCha('clone').GetPrimaryRoleTitle] [TopScope.sCha('clone').GetFullName] 的替身被枪杀身亡。两人的外貌相似度简直令人毛骨悚然。枪手身份不明，目前仍在逃。" #deepl:648320810
 gate_pelly.1.f: "一名目击者称，枪手身穿风衣，头戴帽子。他认为枪手肯定生病了，因为露出的那点皮肤泛着青绿色。他还表示，枪手可能是外国人，因为他在枪手杀害受害者后听到对方说了一句奇怪的话。" #deepl:1637002757
 gate_pelly.1.a: "真奇怪。" #deepl:3250626623
 gate_pelly.2.t: "在逃杀人犯" #deepl:1753045682
 gate_pelly.2.d: "经过长时间的调查，我们的警员终于锁定了凶手的藏身之处，但他却在警方赶到前逃走了。调查人员在藏身之处发现了一张被撕下的日记页。" #deepl:795823668
 gate_pelly.2.f: "“雨声很贴心地掩盖了动静。我戴上那顶帽子，是为了让人以我希望的方式看到我，尽管无论怎样，黑夜都会认出我。香烟只抖动了一下，我就任其熄灭。没必要抽完它。汽车在该来的时候来了，慢悠悠的，漫不经心，我从黑暗中走出来，冷静得就像我手里的左轮手枪一样。\n \n 三声枪响。\n \n 枪声比我预想的更清脆。路上的尸体看起来像福特，这正是至今仍让我感到好笑的地方。一个人或许能在城里的盛会上藏身，但那样的脸庞可以被模仿，而且模仿得很拙劣。尽管如此，街上的那个人正是我此行的目标。\n \n 当我确信他已断气时，我也随之倒下。\"\n \n - 发现的日记页，署名“P.”" #deepl:1722889360
 gate_pelly.2.a: "真奇怪。" #deepl:3250626623
 gate_pelly.3.t: "凶手潜逃至国外" #deepl:295570707
 gate_pelly.3.d: "我们的调查人员成功锁定了嫌疑人的位置，但他逃脱了。他似乎已经离开该国，不知所踪。" #deepl:4261509167
 gate_pelly.3.f: "“嫌疑人已被锁定，但未能将其逮捕。在试图接近时，他跳跃了超出人类已知极限的距离，从而逃脱。鉴于这一超乎常人的动作，调查人员推断该对象很可能是某种施法者。此后他已逃离本国，目前推定已超出我们的追捕范围。”\n \n - 摘自案件档案 1.13.5 LS" #deepl:3085779159
 gate_pelly.3.a: "至少已经结束了。" #deepl:2486173353
