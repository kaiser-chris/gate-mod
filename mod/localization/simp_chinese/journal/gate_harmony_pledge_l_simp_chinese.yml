 je_gate_harmony_pledge_reason: "在侏儒的土地上，和谐并非偶然，而是精心构建的架构。《和谐誓约》常被外人误认为是一种温和的哲学，实则是一项周密的设计：由法律、习俗和隐秘的矫正措施构成的网状体系，旨在约束这个充满无限极端特质的民族。\n \n 若不加以约束，侏儒们便会走向辉煌或毁灭、放纵或清苦、团结或绚烂的混乱。 《誓约》并非否认这种天性，而是将其引导至正轨。制度予以引导，传统提供锚点，每一项法令都在调整着维系社会运转的微妙平衡。\n \n 然而，平衡从来都不是一成不变的。突如其来的激情、新生的思想，或是意料之外的危机，都可能在瞬间打破平衡。因此，地精们既密切关注着世界，也同样密切审视着自身，不断调整，不断修正，确保他们的放纵能成为力量的源泉，而非导致崩溃的根源。" #deepl:4236478007
