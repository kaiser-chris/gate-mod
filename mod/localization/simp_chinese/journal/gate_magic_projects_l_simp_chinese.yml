 je_gate_project_change_domain_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName] 目前正在开发 #bold  $je_gate_project_change_domain$ #!. \n $gate_journal_delimiter$ \n $je_gate_project_change_domain_description$" #deepl:3121880822
 je_gate_project_change_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 这体现了我们社会对魔法的看法，并将为我国带来巨大的推动力。该项目将使我们能够更改当前的 [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]。#r  我们只能更改一次 [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 域名！#!" #deepl:1371592778
