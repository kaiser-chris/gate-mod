 je_gate_project_domain_reason: "[concept_gate_magic_researcher][GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]正在研究#bold $je_gate_project_domain$#!。\n$gate_journal_delimiter$\n$je_gate_project_domain_description$"
 je_gate_project_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]代表了我们社会的魔法观念，并为我们的国家提供巨大增益。此项目将让我们能够选择一个额外的[concept_gate_magic_ethic]。"
