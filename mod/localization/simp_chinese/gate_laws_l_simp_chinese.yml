l_simp_chinese:
# Orcish Hegemony
 lawgroup_gate_orcish_hegemony: "$orcish$霸权制"
 lawgroup_gate_orcish_hegemony_desc: "$lawgroup_gate_orcish_hegemony$构建了一个残酷无情的社会体系，权力与等级制度渗透生活的每个角落。对兽人而言，征服不仅是与生俱来的权柄，更是铭刻在血脉中的生存法则。异族皆被烙上奴役印记，名姓遭褫夺，自由成幻梦，沦为侍奉绿皮暴君的活体工具。即便在兽人族群内部，单纯的肌肉力量亦非通行证——职业种姓制度将每个个体禁锢在既定轨道，社会齿轮在森严管控中精密咬合。"
 law_gate_orcish_hegemony_enforced: "霸权强制施行"
 law_gate_orcish_hegemony_enforced_desc: "$orcish$[concept_culture]的社会霸权被强制施行。"
 law_gate_orcish_hegemony_not_enforced: "霸权未强制施行"
 law_gate_orcish_hegemony_not_enforced_desc: "$orcish$[concept_culture]的社会霸权未被强制施行，其他文化得以融入我们的社会。"
# Elven Supremacy
 lawgroup_gate_elven_supremacy: "$elven$至上制"
 lawgroup_gate_elven_supremacy_desc: "精灵至上制构建了一种僵化的社会秩序，精灵独揽着不可撼动的权力、威望与魔法垄断。其他种族虽被编织进社会肌理，却被禁锢于森严的等级桎梏之中——神职圣坛禁止他们踏足，贵族纹章拒绝为他们镌刻，魔法秘典更永不对异族开启。这种建立在“精灵血统先天优越”信条上的制度，犹如双生荆棘冠冕，既以精金锁链固守精灵的永恒王座，又从他族被压弯的脊梁上榨取血汗浇灌权杖的宝石。"
 law_gate_elven_supremacy_religious_preaching: "宣教至上制"
 law_gate_elven_supremacy_religious_preaching_desc: "$elven$尊权是通过教义实现的。"
 law_gate_elven_supremacy_enforced: "强制施行至上制"
 law_gate_elven_supremacy_enforced_desc: "$elven$至上制由国家强制施行。"
 law_gate_elven_supremacy_not_enforced: "不强制施行至上制"
 law_gate_elven_supremacy_not_enforced_desc: "$elven$至上制未被强制施行。"
# New Samadore
 law_gate_gnomish_harmony: "侏儒和谐"
 law_gate_gnomish_harmony_desc: "秉承侏儒在多元中培育团结的天赋，这部公民法将多元文化奉为社会的基石。一切宗教信仰与文化传统皆被接纳与融合，交织成绚丽多彩的多传统挂毯。在合作与互敬的精神指引下，侏儒和谐化差异为力量，让每一种声音都能在国家的共鸣中寻得属于自己的和声。"
 EFFECTS_ON_ACCEPTANCE_law_gate_gnomish_harmony: "#tooltippable #tooltip:$BREAKDOWN_TAG$ 人群将过着相似的生活，即使未被接纳也不会有多少负面影响#!#!"
 law_gate_gnomish_integration: "侏儒融合"
 law_gate_gnomish_integration_desc: "基于尊重与合作的原则，侏儒融合政策摒弃征服，注重联结。这一殖民政策强调通过对话、共同繁荣和相互尊重，将其他文化自愿纳入本国。通过优先融合而非统治，该政策致力于建立持久的纽带，使殖民地转变为繁荣的伙伴，而非被征服的土地。尽管过程中不乏复杂性，但侏儒融合政策展现了一种以和谐与共同成长为导向的殖民愿景。"
# Monster Hunting
 lawgroup_gate_monster_hunting: "魔物狩猎"
 lawgroup_gate_monster_hunting_desc: "防止[Concept('concept_gate_monster_attack','$concept_gate_monster_attacks$')]的魔物狩猎制度。"
 law_gate_no_organized_monster_hunting: "无组织化魔物狩猎"
 law_gate_no_organized_monster_hunting_desc: "该国无组织化力量猎杀魔物，[Concept('concept_gate_monster_attack','$concept_gate_monster_attacks$')]将频繁发生。"
 law_gate_private_monster_hunters: "私营魔物猎人"
 law_gate_private_monster_hunters_desc: "该国授权并雇佣个人或公司猎杀魔物。"
 law_gate_dedicated_monster_hunters: "专职魔物猎人"
 law_gate_dedicated_monster_hunters_desc: "该国拥有经过标准化训练的专职魔物猎人。"
 law_gate_militarized_monster_hunters: "军事化魔物猎人"
 law_gate_militarized_monster_hunters_desc: "给予你的魔物猎人军事装备和军事训练，可显著提升其执行任务的效率。"
# Arcane Organization
 lawgroup_gate_magic_users: "奥秘组织"
 lawgroup_gate_magic_users_desc: "我们应如何在社会中组织[concept_gate_magic]的使用。"
 law_gate_free_magic_users: "无组织"
 law_gate_free_magic_users_desc: "该国将[GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]视为普通公民，对[concept_gate_magic]不做监管。"
 law_gate_restricted_magic_users: "严格许可"
 law_gate_restricted_magic_users_desc: "[concept_gate_magic]受到国家严格监管。[GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]处于严密监控之下，仅持政府颁发许可证者方可施法。未经授权的[concept_gate_magic]使用将遭严惩，政府通过全面管控魔法活动以消除对其权威的威胁。"
 law_gate_noble_magic_users: "奥秘贵族"
 law_gate_noble_magic_users_desc: "该国视[GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]为天生的贵族阶层，赋予其超越普通公民的特权。"
 law_gate_druidic_circles: "德鲁伊结社"
 law_gate_druidic_circles_desc: "[GetPopType('gate_druids').GetName]通过与自然共鸣来驾驭动植物之力。借助圣林和自然节律的调和，他们能够治愈生灵、守护疆域、统御荒野。"
 law_gate_mage_guilds: "法师公会"
 law_gate_mage_guilds_desc: "该魔法体系以[GetPopType('gate_mages').GetName]主导的法师公会为核心。通过精湛技艺、附魔器具与奥秘法术，他们可以有力推动魔法工业的发展。"
 law_gate_arcane_bureau: "奥秘管理局"
 law_gate_arcane_bureau_desc: "由国家统一管理的机构，将[GetPopType('gate_mages').GetName]与[GetPopType('gate_druids').GetName]整合于同一组织之下。"
# Government Principles
 law_gate_vampire_monarchy: "永恒君主制"
 law_gate_vampire_monarchy_desc: "该国已接受[concept_gate_vampirism]，其君主被视为永恒不朽的存在。"
 law_gate_magocracy: "魔权制"
 law_gate_magocracy_desc: "一种治理形式，由国家中最强大的施法者（根据能力、地位或出身选出）终身统治，该统治者被授予$RULER_TITLE_GATE_ARCHWIZARD$或$RULER_TITLE_GATE_ARCHWITCH$称号。"
# Distribution of Power
 law_gate_arcane_council: "奥术委员会"
 law_gate_arcane_council_desc: "国家元首与一小群有影响力、未经选举的[GetPopType('gate_mages').GetName]和[GetPopType('gate_druids').GetName]共享权力与责任。"
