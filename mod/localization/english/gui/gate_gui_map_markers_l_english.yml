l_english:
 gg_map_marker_mana_density: "[State.AccessStateRegion.MakeScope.Var('mana_density').GetValue|0]%"
 gg_map_marker_mana_density_levels: "#header Levels:#!\n• Under #v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! no [concept_magical_phenomena] occur.\n• Between #v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! & #v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#! [concept_magical_phenomena] can happen.\n• Starting from #v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#! [concept_magical_phenomena] are common place."
 gg_map_marker_mana_density_tooltip: "#header [concept_mana_density] in [State.GetStateRegion.GetName]#!\nThe [concept_mana_density] in [State.GetStateRegion.GetName] is #v [State.GetStateRegion.MakeScope.Var('mana_density').GetValue|0]%#!.\n\n$gg_map_marker_mana_density_levels$"
 gg_map_marker_mana_density_gate_tooltip: "#header [concept_mana_density] in [State.GetStateRegion.GetName]#!\nThere is a [GetBuildingType('building_gate_alxa').GetName] which is increasing the surrounding [concept_mana_density].\n\n$gg_map_marker_mana_density_levels$"
 gg_map_marker_mana_density_gate_veiled_tooltip: "#header [concept_mana_density] in [State.GetStateRegion.GetName]#!\nThere is a source of mana which is increasing the surrounding [concept_mana_density].\n\n$gg_map_marker_mana_density_levels$"