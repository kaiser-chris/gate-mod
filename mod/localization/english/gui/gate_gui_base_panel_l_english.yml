l_english:
# Button
 gate_button_main: "gate_button_main"
 gate_button_main_desc: "$gg_panel_base_title$"
 gate_button_main_tooltip: "#header $gg_panel_base_title$#!\nShortcut: #V $gg_panel_base_title$#! (#V CTRL + T#!)"
 gg_panel_base_action: "Manaflow Panel"
# Panel
 gg_panel_base_title: "Manaflow"
 gg_panel_base_tab_general: "General"
 gg_panel_base_no_researcher: "No [concept_gate_magic_researcher]"
 gg_panel_base_no_researcher_tooltip: "#header No [concept_gate_magic_researcher]#!\n$alert_has_no_magic_researcher_alert_desc$\n\n$alert_has_no_magic_researcher_alert_hint$\n\n#instruction Click to open the $NATIONAL_CAST$ panel#!"
 gg_panel_base_no_researcher_blink: "#BOLD Hire a new Arcanist#!"
 gg_mana_saturation: "Mana Saturation"
 gg_mana_saturation_tooltip: "#header [concept_gate_mana_saturation]#!\nCurrently #v [GetGlobalVariable('global_mana_saturation').GetValue|1]%#! of earth is covered in Mana.\n\nMana is the foundation of all [concept_gate_magical_phenomena] and is used extensively in [concept_gate_magic_technology]."
 gg_header_magic_ethic: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]"
 gg_header_magic_countries: "Arcane Countries"
 gg_ethic_empty_slot: "Empty Domain Slot"
 gg_ethic_empty_slot_tooltip: "#header [concept_gate_magic_ethic]#!\nThis [concept_gate_magic_ethic] slot is empty and can be unlocked by fulfilling the following requirements.\n\n#title Unlocked#!\n$gg_ethic_empty_slot_tooltip_condition_one$\n$gg_ethic_empty_slot_tooltip_condition_two$\n$gg_ethic_empty_slot_tooltip_condition_three$"
 gg_ethic_empty_slot_tooltip_condition_one: "#indent_newline:3 [Select_CString(GetScriptedGui('sgui_gate_ethic_unlocked_magic_knowledge').IsShown(GuiScope.SetRoot(Country.MakeScope).End), '@green_checkmark_box!', '@simple_box!')] Learning [concept_gate_magic_knowledge]#!"
 gg_ethic_empty_slot_tooltip_condition_two: "#indent_newline:3 [Select_CString(GetScriptedGui('sgui_gate_ethic_unlocked_project').IsShown(GuiScope.SetRoot(Country.MakeScope).End), '@green_checkmark_box!', '@simple_box!')] The #bold $je_gate_project_domain$#! [concept_gate_project]#!"
 gg_ethic_empty_slot_tooltip_condition_three: "#indent_newline:3 [Select_CString(GetScriptedGui('sgui_gate_ethic_unlocked_magic_science').IsShown(GuiScope.SetRoot(Country.MakeScope).End), '@green_checkmark_box!', '@simple_box!')] Researching [GetTechnology('gate_magic_science').GetName]#!"
 gg_magic_countries_us: "Our Country"
 gg_magic_countries_relations: "$concept_relations$: #v [Country.GetRelationsWithDesc(GetPlayer)]#! (#v [Country.GetRelationsWith(GetPlayer)|0]#!)"
 gg_magic_countries_relations_region: "#header [DiplomaticAction.GetName]#!\n@red_cross! Can only be done when you have [concept_interest] in their [concept_strategic_region]."
 gg_header_magic_innovation: "Magic Innovation"
# Magic Innovation
 gg_magic_innovation_total: "Currently banked [concept_gate_magic_innovation]: #v @magic_innovation![GetPlayer.MakeScope.Var('magic_innovation').GetValue|0] / [GetGlobalVariable('magic_innovation_bank_max').GetValue|0]#!"
 gg_magic_innovation_warning_calc: "Any [concept_gate_magic_innovation] we are not using will be #v lost#!."
 gg_monthly_magic_innovation: "We are generating #tooltip:gg_monthly_magic_innovation_tooltip @magic_innovation!$gg_monthly_magic_innovation_value$#! [concept_gate_magic_innovation] each month."
 gg_monthly_magic_innovation_no_magic: "We are not producing any [concept_gate_magic_innovation].\nWe need to research [concept_gate_magic_knowledge] first."
 gg_monthly_magic_innovation_value: "#bold [Country.MakeScope.ScriptValue('gate_magic_innovation')|g]#!"
 gg_monthly_magic_innovation_tooltip: "#header [concept_gate_magic_innovation]#!\nWe are generating #bold [AccessMetaPlayer.AccessPlayedOrObservedCountry.MakeScope.ScriptValue('gate_magic_innovation')|g]#! [concept_gate_magic_innovation] each month:\n[AccessMetaPlayer.AccessPlayedOrObservedCountry.AccessModifier.GetBreakdownFor('country_gate_magical_innovation_add').GetBreakdown]\n\nWith a multiplier of [AccessMetaPlayer.AccessPlayedOrObservedCountry.AccessModifier.GetValueWithBreakdownFor('country_gate_magical_innovation_mult')]\n\nUp to a maximum of [AccessMetaPlayer.AccessPlayedOrObservedCountry.MakeScope.ScriptValue('gate_magic_innovation_max')|v] [concept_gate_magic_innovation] per month:\n[AccessMetaPlayer.AccessPlayedOrObservedCountry.MakeScope.ScriptValue('gate_magic_innovation_max')|+=] [GetMetaPlayer.GetPlayedOrObservedCountry.GetName]\n  [AccessMetaPlayer.AccessPlayedOrObservedCountry.MakeScope.ScriptValue('gate_magic_innovation_max_base')|+=] Base Value\n  [AccessMetaPlayer.AccessPlayedOrObservedCountry.MakeScope.ScriptValue('gate_magic_innovation_max_literacy')|+=] [concept_literacy]\n  [AccessMetaPlayer.AccessPlayedOrObservedCountry.AccessModifier.GetValueWithBreakdownFor('country_gate_magical_innovation_max_add')] Modifiers"
# Projects
 gg_projects_no_active_project: "Our [concept_gate_magic_researcher] is currently idle."
 gg_projects_invalid_arcanist: "Our [concept_gate_project] is stalled until we hire a new [concept_gate_magic_researcher]."
 gg_projects_active_project: "Our [concept_gate_magic_researcher] is currently working on #v [GetPlayer.MakeScope.Var('gate_magic_project').GetJournalEntry.GetName]#!."
 gg_projects_active_project_desc: "[SelectLocalization(GetScriptedGui('sgui_gate_has_researcher').IsValid(GuiScope.SetRoot(GetPlayer.MakeScope).End), 'gg_projects_active_project', 'gg_projects_invalid_arcanist')]"
 gg_projects_progress_months: "[GetPlayer.MakeScope.Var('gate_magic_project').GetJournalEntry.CalcCurrentGoalValue|v0] of [GetPlayer.MakeScope.Var('gate_magic_project').GetJournalEntry.GetTotalGoalValue|v0] months"
 gg_projects_progress_construction: "[GetPlayer.MakeScope.Var('gate_magic_project').GetJournalEntry.CalcCurrentGoalValue|v0] of [GetPlayer.MakeScope.Var('gate_magic_project').GetJournalEntry.GetTotalGoalValue|v0K] [concept_construction]"
# Arcanist Stats
 gg_arcanist_statistics_header: "Statistics"
 gg_arcanist_statistics_flavor: "Our [concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetPrimaryRoleTitle] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName] has been in his [concept_character_role] for [LabelingHelper.GetDaysLocWithoutTooltip(FixedPointToInt(GetPlayer.MakeScope.Var('gate_magic_researcher').ScriptValue('gate_character_hired_days')))]."
 gg_arcanist_statistics_experience: "[GetPlayer.GetCustom('gg_mr_magic_researcher_experience_custom_loc')] ([Character.MakeScope.Var('magic_experience').GetValue|v0])"
 gg_arcanist_statistics_status: "Status"
 gg_arcanist_statistics_popularity: "#tooltippable_name #tooltip:[Character.GetTooltipTag],POPULARITY_BREAKDOWN [LabelingHelper.GetLabelForPopularityCFixedPoint(Character.GetPopularity)]#!#! (#tooltippable #tooltip:[Character.GetTooltipTag],POPULARITY_BREAKDOWN [Character.GetPopularity|0]#!#!)"
 gg_arcanist_statistics_prominence: "#tooltippable_name #tooltip:[Character.GetTooltipTag],PROMINENCE_BREAKDOWN [LabelingHelper.GetLabelForProminenceCFixedPoint(Character.GetProminence)]#!#! (#tooltippable #tooltip:[Character.GetTooltipTag],PROMINENCE_BREAKDOWN [Character.GetProminence|0]#!#!)"