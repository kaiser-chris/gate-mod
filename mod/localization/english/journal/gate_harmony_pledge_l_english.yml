# Events
 gate_harmony_pledge.1.t: "Enthusiasm Without Boundaries"
 gate_harmony_pledge.1.d: "A [GetCulture('gnomish').GetName] person in [TopScope.sS('event_state').GetName] caused public outrage. This public outrage will decrease [concept_assimilation] if not handled correctly."
 gate_harmony_pledge.1.f: "In a crowded square, a gnome, utterly captivated, subjects an unfortunate guest to a torrent of questions. Personal, technical, philosophical, and increasingly invasive, the inquiry unfolds with cheerful intensity and no regard for propriety. What is, to one, genuine fascination becomes, to others, a public breach of comfort."
 gate_harmony_pledge.1.a: "They were just curious."
 gate_harmony_pledge.1.b: "Condemn this behavior."
 gate_harmony_pledge.2.t: "The Ledger Rewritten"
 gate_harmony_pledge.2.d: "A new management style improves [concept_bureaucracy] output, but also stifles [concept_innovation]."
 gate_harmony_pledge.2.f: "Our civil service has successfully implemented new, highly sophisticated systems of oversight and allocation. Administrative efficiency has peaked, and bureaucratic waste is virtually nonexistent. However, academic and cultural advisors report that this relentless structural optimization is stifling initiative, causing independent research and creative pursuits to stall across the country."
 gate_harmony_pledge.2.a: "Forbid this new management style."
 gate_harmony_pledge.2.b: "Damper the worst effects."
 gate_harmony_pledge.2.c: "Embrace the potential."
 gate_harmony_pledge.3.t: "Refinement Without End"
 gate_harmony_pledge.3.d: "This refinement reduces [GetBuildingType('building_trade_center').GetName] [concept_throughput] while also raising [GetBuildingGroup('bg_light_industry').GetName] [concept_throughput]."
 gate_harmony_pledge.3.f: "Dispatches from our manufacturing sectors indicate an unprecedented surge in artisan activity. Workshops are operating at maximum capacity, driving domestic production output to new heights. However, trade ministers warn that commercial distribution is being neglected in this fervor; finished goods are stockpiling in warehouses rather than reaching local or foreign markets."
 gate_harmony_pledge.3.a: "Order a minimum allocation of sales staff."
 gate_harmony_pledge.3.b: "Damper the worst effects."
 gate_harmony_pledge.3.c: "Embrace the potential."
 gate_harmony_pledge.4.t: "Construction Drive"
 gate_harmony_pledge.4.d: "A surge in architectural fascination leads to [concept_construction] output increases, while [GetBuildingGroup('bg_agriculture').GetName] output declines around the country."
 gate_harmony_pledge.4.f: "Reports from across the country indicate a coordinated surge in architectural and civic works. Planners and builders are pursuing sweeping redesigns with unusual intensity, and construction output has risen sharply as a result. However, accompanying assessments note a decline in agricultural attention, with fewer laborers assigned to the fields and early signs of strain on food reserves."
 gate_harmony_pledge.4.a: "Get them into the fields."
 gate_harmony_pledge.4.b: "Damper the worst effects."
 gate_harmony_pledge.4.c: "Embrace the potential."
 gate_harmony_pledge.5.t: "An Excess of Theory"
 gate_harmony_pledge.5.d: "The focus on theoretical knowledge boosts [concept_innovation] but stifles [concept_construction]."
 gate_harmony_pledge.5.f: "Reports from our academic institutions indicate a massive surge in theoretical research and discovery. Scholars are producing new theories at an unprecedented rate, rapidly accelerating our national knowledge base. However, provincial governors warn that practical implementation is being neglected; key infrastructure and public works projects are experiencing severe delays as intellectual focus shifts entirely toward abstraction."
 gate_harmony_pledge.5.a: "Reorient research funding to practical applications."
 gate_harmony_pledge.5.b: "Damper the worst effects."
 gate_harmony_pledge.5.c: "Embrace the potential."
 gate_harmony_pledge.6.t: "Abstract Wealth"
 gate_harmony_pledge.6.d: "New financial instruments increase [concept_investment_pool] contribution, but decreases maximum [concept_cash_reserves] of our industry."
 gate_harmony_pledge.6.f: "Reports from the financial districts show a sudden, intense obsession with complex economic instruments. Bankers and guild leaders are trading speculative contracts and investments at a dizzying pace, drastically increasing state revenue and capital flow. However, physical industries warn of a severe capital drain; funds are being diverted entirely into paper wealth, causing tangible manufacturing and heavy industry to stall."
 gate_harmony_pledge.6.a: "Increase the mandated minimum reserve contributions."
 gate_harmony_pledge.6.b: "Damper the worst effects."
 gate_harmony_pledge.6.c: "Embrace the potential."
 gate_harmony_pledge.7.t: "Subterranean Fixation"
 gate_harmony_pledge.7.d: "A fixation with the [GetBuildingGroup('bg_extraction').GetName] industry increases [concept_throughput], but also leads to a decline in [concept_throughput] of the [GetBuildingGroup('bg_plantations').GetName] industry."
 gate_harmony_pledge.7.f: "Dispatches from the frontier indicate a massive, coordinated acceleration in resource extraction. Miners and engineers have implemented aggressive new excavation techniques, flooding our stockpiles with raw ores and minerals. However, provincial magistrates warn that this unchecked digging is disrupting local ecosystems; arable land is being torn up and water sources diverted, leading to a sharp decline in agricultural yields from our plantations."
 gate_harmony_pledge.7.a: "Force our extraction industries to preserve surrounding arable land."
 gate_harmony_pledge.7.b: "Damper the worst effects."
 gate_harmony_pledge.7.c: "Embrace the potential."
 gate_harmony_pledge.8.t: "Cash Crop Fever"
 gate_harmony_pledge.8.d: "A fixation with the [GetBuildingGroup('bg_plantations').GetName] industry increases [concept_throughput], but also leads to a decline in [concept_throughput] of the [GetBuildingGroup('bg_agriculture').GetName] industry."
 gate_harmony_pledge.8.f: "Reports from the agricultural provinces indicate a sweeping obsession with lucrative export crops. Drawn by the sudden, fervent belief that plantation farming guarantees immense wealth, landowners and rural communities are eagerly tearing up staple food crops to plant spices, coffee, and rubber. While trade ministers report that our export revenues are soaring, local magistrates warn that village markets are beginning to empty, raising severe concerns about impending food shortages."
 gate_harmony_pledge.8.a: "Set a minimum level of food production per farm."
 gate_harmony_pledge.8.b: "Damper the worst effects."
 gate_harmony_pledge.8.c: "Embrace the potential."
 gate_harmony_pledge.9.t: "Agrarian Security"
 gate_harmony_pledge.9.d: "A fixation with the [GetBuildingGroup('bg_agriculture').GetName] industry increases [concept_throughput], but also leads to a decline in [concept_throughput] of the [GetBuildingGroup('bg_plantations').GetName] industry."
 gate_harmony_pledge.9.f: "A reactionary movement has taken hold across the rural territories, driven by an intense, collective fixation on food security and self-reliance. Farmers and local leaders are systematically reducing output of commercial plantations to maximize the yields of root vegetables and grain. While our national granaries are overflowing and domestic sustenance is improving, plantation output has cratered."
 gate_harmony_pledge.9.a: "Increase plantation output by disincentivising food production."
 gate_harmony_pledge.9.b: "Damper the worst effects."
 gate_harmony_pledge.9.c: "Embrace the potential."
 gate_harmony_pledge.10.t: "Woven Monument"
 gate_harmony_pledge.10.d: "A cultural monument will increase our [concept_gate_harmony_pledge_society]."
 gate_harmony_pledge.10.f: "A beautiful, spontaneous collaboration has emerged among our artisans. Human carvers and gnomish engineers have obsessively devoted themselves to constructing a grand new public pavilion. The structure perfectly marries the deeply spiritual, flowing woodwork of native human traditions with the intricate, mathematical clockwork of gnomish design. This architectural marvel stands as a physical manifestation of the Harmony Pledge, inspiring a wave of civic pride and cultural prestige across the nation."
 gate_harmony_pledge.10.a: "Wonderful."
 gate_harmony_pledge.11.t: "Unwanted Inquiry"
 gate_harmony_pledge.11.d: "This cultural incident will reduce [concept_conversion] to the [GetReligion('gate_harmony_pledge').GetNameNoIcon] if not handled with care."
 gate_harmony_pledge.11.f: "We have received furious complaints from human spiritual leaders regarding a recent ancestral rite. A group of gnomish scholars, driven by their intense and unregulated curiosity, attended the solemn ceremony but treated it as an interactive puzzle. They interrupted prayers with rapid-fire questions, attempted to take measurements of sacred relics, and loudly debated the properties of the ceremonial fires. Though meant without malice, this aggressive secular fascination has deeply offended traditionalists and strained societal harmony."
 gate_harmony_pledge.11.a: "This is bad."
 gate_harmony_pledge.11.b: "Condemn this behavior."
 gate_harmony_pledge.12.t: "Abandoning the Pledge"
 gate_harmony_pledge.12.d: "Enacting [TopScope.sL('atheism_law').GetName] will lead to us abandoning the [concept_gate_harmony_pledge]. This will have catastrophic ramifications."
 gate_harmony_pledge.12.f: "Reports from the assembly reveal a growing coalition of radical magistrates demanding a complete abandonment of the Harmony Pledge. Arguing that our meticulous societal tuning is a cage that stifles true potential, they demand we allow our natural extremes to flourish unchecked. Advisors warn that even entertaining this motion will have catastrophic short-term ramifications."
 gate_harmony_pledge.12.a: "Abandoning it is for the best."
 gate_harmony_pledge.12.b: "Let us think about this."
 gate_harmony_pledge.13.t: "Reclaiming the Pledge"
 gate_harmony_pledge.13.d: "We have readopted the teachings of the [concept_gate_harmony_pledge]."
 gate_harmony_pledge.13.f: "The exhaustion of unchecked extremes has finally broken the nation's fever. Across the provinces, citizens and magistrates alike are demanding a return to the deliberate design of the Harmony Pledge."
 gate_harmony_pledge.13.a: "We pledge ourself to harmony."
 gate_harmony_pledge.14.t: "Land Rush"
 gate_harmony_pledge.14.d: "The land rush will lead to higher [concept_pop_growth], but will also increase [concept_generated_pollution] massively."
 gate_harmony_pledge.14.f: "Empowered by high-yield gnomish agricultural tools, human agrarian families are rapidly expanding their homesteads deeper into the jungle. Driven by a uniquely human desire to secure vast landholdings and leave substantial inheritances for their large families, they are clearing lush territory at a staggering rate. While this ambition is creating a massive boom in population growth and raw resource extraction, it is wildly throwing off our territorial planning and threatening the ecological balance the Pledge seeks to maintain."
 gate_harmony_pledge.14.a: "Establish protected nature zones."
 gate_harmony_pledge.14.b: "Damper the worst effects."
 gate_harmony_pledge.14.c: "Embrace the potential."
 gate_harmony_pledge.15.t: "Animistic Engineering"
 gate_harmony_pledge.15.d: "Animistic believes reduce [concept_conversion] to the [GetReligion('gate_harmony_pledge').GetNameNoIcon] and also increases [Concept('concept_radical', '$concept_radicalism$')] for our [GetCulture('gnomish').GetName] workers."
 gate_harmony_pledge.15.f: "Human laborers have begun integrating gnomish industrial machinery directly into their animistic belief systems, viewing massive steam engines and clockwork looms as vessels for powerful local spirits. Factory floors are now adorned with lush floral offerings, and machines are meticulously painted with sacred geometries. This beautiful cultural synthesis has created fierce loyalty and unity among the workforce. However, gnomish engineers are tearing their hair out, as human operators absolutely refuse to run the machines on "inauspicious" days or at optimal, spirit-angering speeds."
 gate_harmony_pledge.15.a: "Forbid the practice."
 gate_harmony_pledge.15.b: "Damper the worst effects."
 gate_harmony_pledge.15.c: "Embrace the potential."
 gate_harmony_pledge.16.t: "Mandated Chaos"
 gate_harmony_pledge.16.d: "[TopScope.sCha('event_character').GetFullName] has founded the [TopScope.sPM('event_movement').GetNameNoIcon]."
 gate_harmony_pledge.16.f: "Reports have reached the capital of a newly formed political movement led by a gnomish ideologue openly advocating a fusion of absolute anarchy and uncompromising authoritarian control. In public declarations, the faction calls for the complete dissolution of the state and all formal institutions, while simultaneously outlining the need for a permanent, militarized enforcement apparatus to preserve this “pure” lawlessness."
 gate_harmony_pledge.16.a: "What?"