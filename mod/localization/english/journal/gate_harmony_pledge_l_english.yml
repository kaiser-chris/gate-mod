l_english:
 je_gate_harmony_pledge: "$gate_harmony_pledge$"
 je_gate_harmony_pledge_reason: "In gnomish lands, harmony is no accident, it is architecture. The Harmony Pledge, oft mistaken by outsiders as gentle philosophy, is in truth a careful design: a lattice of laws, customs, and quiet corrections meant to temper a people of boundless extremes.\n\nLeft unchecked, gnomes surge towards brilliance or ruin, indulgence or austerity, unity or splendid chaos. The Pledge does not deny this nature; it channels it. Institutions nudge, traditions anchor, and each decree shifts the delicate balance upon which society rests.\n\nYet balance is never permanent. Sudden passions, new ideas, or unforeseen crises can tip the scales in an instant. And so the gnomes watch themselves as closely as they watch the world, ever adjusting, ever correcting, ensuring that their excess fuels their strength, rather than their collapse."
 pb_gate_harmony_pledge_economy: "Economic Harmony"
