# Events
 gate_harmony_pledge.1.t: "Enthusiasm Without Boundaries"
 gate_harmony_pledge.1.d: "A [GetCulture('gnomish').GetName] person in [TopScope.sS('event_state').GetName] caused public outrage. This public outrage will decrease [concept_assimilation] if not handled correctly."
 gate_harmony_pledge.1.f: "In a crowded square, a gnome, utterly captivated, subjects an unfortunate guest to a torrent of questions. Personal, technical, philosophical, and increasingly invasive, the inquiry unfolds with cheerful intensity and no regard for propriety. What is, to one, genuine fascination becomes, to others, a public breach of comfort."
 gate_harmony_pledge.1.a: "They were just curious."
 gate_harmony_pledge.1.b: "Condemn this behavior."
 gate_harmony_pledge.2.t: "The Ledger Rewritten"
 gate_harmony_pledge.2.d: "A new management style improves [concept_bureaucracy] output, but also stifles [concept_innovation]."
 gate_harmony_pledge.2.f: "Our civil service has successfully implemented new, highly sophisticated systems of oversight and allocation. Administrative efficiency has peaked, and bureaucratic waste is virtually nonexistent. However, academic and cultural advisors report that this relentless structural optimization is stifling initiative, causing independent research and creative pursuits to stall across the country."
 gate_harmony_pledge.2.a: "Forbid this new management style."
 gate_harmony_pledge.2.b: "Damper the worst effects."
 gate_harmony_pledge.2.c: "Embrace the potential."
 gate_harmony_pledge.3.t: "Refinement Without End"
 gate_harmony_pledge.3.d: "This refinement reduces [GetBuildingType('building_trade_center').GetName] [concept_throughput] while also raising [GetBuildingGroup('bg_light_industry').GetName] [concept_throughput]."
 gate_harmony_pledge.3.f: "Dispatches from our manufacturing sectors indicate an unprecedented surge in artisan activity. Workshops are operating at maximum capacity, driving domestic production output to new heights. However, trade ministers warn that commercial distribution is being neglected in this fervor; finished goods are stockpiling in warehouses rather than reaching local or foreign markets."
 gate_harmony_pledge.3.a: "Order a minimum allocation of sales staff."
 gate_harmony_pledge.3.b: "Damper the worst effects."
 gate_harmony_pledge.3.c: "Embrace the potential."
 gate_harmony_pledge.4.t: "Construction Drive"
 gate_harmony_pledge.4.d: "A surge in architectural fascination leads to [concept_construction] output increases, while [GetBuildingGroup('bg_agriculture').GetName] output declines around the country."
 gate_harmony_pledge.4.f: "Reports from across the country indicate a coordinated surge in architectural and civic works. Planners and builders are pursuing sweeping redesigns with unusual intensity, and construction output has risen sharply as a result. However, accompanying assessments note a decline in agricultural attention, with fewer laborers assigned to the fields and early signs of strain on food reserves."
 gate_harmony_pledge.4.a: "Get them into the fields."
 gate_harmony_pledge.4.b: "Damper the worst effects."
 gate_harmony_pledge.4.c: "Embrace the potential."
 gate_harmony_pledge.5.t: "An Excess of Theory"
 gate_harmony_pledge.5.d: "The focus on theoretical knowledge boosts [concept_innovation] but stifles [concept_construction]."
 gate_harmony_pledge.5.f: "Reports from our academic institutions indicate a massive surge in theoretical research and discovery. Scholars are producing new theories at an unprecedented rate, rapidly accelerating our national knowledge base. However, provincial governors warn that practical implementation is being neglected; key infrastructure and public works projects are experiencing severe delays as intellectual focus shifts entirely toward abstraction."
 gate_harmony_pledge.5.a: "Reorient research funding to practical applications."
 gate_harmony_pledge.5.b: "Damper the worst effects."
 gate_harmony_pledge.5.c: "Embrace the potential."
 gate_harmony_pledge.6.t: "Abstract Wealth"
 gate_harmony_pledge.6.d: "New financial instruments increase [concept_investment_pool] contribution, but decreases maximum [concept_cash_reserves] of our industry."
 gate_harmony_pledge.6.f: "Reports from the financial districts show a sudden, intense obsession with complex economic instruments. Bankers and guild leaders are trading speculative contracts and investments at a dizzying pace, drastically increasing state revenue and capital flow. However, physical industries warn of a severe capital drain; funds are being diverted entirely into paper wealth, causing tangible manufacturing and heavy industry to stall."
 gate_harmony_pledge.6.a: "Increase the mandated minimum reserve contributions."
 gate_harmony_pledge.6.b: "Damper the worst effects."
 gate_harmony_pledge.6.c: "Embrace the potential."
 gate_harmony_pledge.7.t: "Subterranean Fixation"
 gate_harmony_pledge.7.d: "A fixation with the [GetBuildingGroup('bg_extraction').GetName] industry increases [concept_throughput], but also leads to a decline in [concept_throughput] of the [GetBuildingGroup('bg_plantations').GetName] industry."
 gate_harmony_pledge.7.f: "Dispatches from the frontier indicate a massive, coordinated acceleration in resource extraction. Miners and engineers have implemented aggressive new excavation techniques, flooding our stockpiles with raw ores and minerals. However, provincial magistrates warn that this unchecked digging is disrupting local ecosystems; arable land is being torn up and water sources diverted, leading to a sharp decline in agricultural yields from our plantations."
 gate_harmony_pledge.7.a: "Force our extraction industries to preserve surrounding arable land."
 gate_harmony_pledge.7.b: "Damper the worst effects."
 gate_harmony_pledge.7.c: "Embrace the potential."
