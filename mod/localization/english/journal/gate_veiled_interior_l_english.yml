l_english:
 je_gate_veiled_interior: "The Veiled Interior"
 je_gate_veiled_interior_reason: "Beyond the settled coasts of New Samadore lies the Veiled Interior, a vast expanse of dense jungle and rising highlands that has thus far resisted all meaningful incursion. The first [GetCulture('gnomish').GetName] arrivals came by way of the coastal [GetBuildingType('building_gate_eastern_new_guinea').GetName], and from there, settlement spread along navigable shores and riverways. Yet the deeper interior remains obscured, its terrain uncharted and its conditions poorly understood."
 je_gate_veiled_interior_lobby: "$je_gate_veiled_interior_reason$"
 je_gate_veiled_interior_tooltip: "#header $je_gate_veiled_interior$#!\n$je_gate_veiled_interior_reason$"
 je_gate_veiled_interior_status_expedition: "We have sent an expedition into the interior."
 je_gate_veiled_interior_status_veiled: "We do not know anything about the interior."
 je_gate_veiled_interior_status_early_contact: "We made contact with the highlands people."
 je_gate_veiled_interior_status_diplomacy: "We are negotiating for the interior joining us."
 je_gate_veiled_interior_phase_veiled: "Phase: #v Veiled#!"
 je_gate_veiled_interior_phase_early_contact: "Phase: #v Early Contact#!"
 je_gate_veiled_interior_phase_diplomacy: "Phase: #v Diplomacy#!"
 sb_gate_veiled_interior_expedition: "Start Expedition"
 sb_gate_veiled_interior_expedition_desc: "Start an expedition into the New Guinean interior."
# Modifiers
 modifier_veiled_interior_lifted: "Insufficient Infrastructure"
# Effects
 je_gate_veiled_interior_effect_phase_change_early_contact: "#tooltip:[GetRawTextTooltipTag('je_gate_veiled_interior_tooltip')] #yellow [TopScope.sJE('journal_entry').GetName]#!#! advances towards the #v Early Contact#! phase"
 je_gate_veiled_interior_effect_phase_change_diplomacy: "#tooltip:[GetRawTextTooltipTag('je_gate_veiled_interior_tooltip')] #yellow [TopScope.sJE('journal_entry').GetName]#!#! advances towards the #v Diplomacy#! phase"
# Events
 gate_veiled_interior.1.t: "A shared future"
 gate_veiled_interior.1.d: "The [GetCulture('melanesian').GetName] people of the New Guinean highland join [TopScope.GetRootScope.GetCountry.GetName]."
 gate_veiled_interior.1.f: "What lay beyond the canopy was not empty, nor always welcoming. Early encounters were marked by loss and unease, and not all gestures of peace were returned in kind. Even so, dialogue continued. Now, the highland communities have chosen to enter our fold, transforming a troubled frontier into a shared future."
 gate_veiled_interior.1.a: "Towards a shared future."
 gate_veiled_interior.1.a.tooltip: "Roughly #v 1M#! [GetCulture('melanesian').GetName] people will join our nation."
 gate_veiled_interior.2.t: "People of the Interior"
 gate_veiled_interior.2.d: "We have found a large settlement in the New Guinean interior."
 gate_veiled_interior.2.f: "After weeks beneath the canopy, an expedition has returned with startling news. Deep in the highlands, they encountered a sizable settlement, its people organized and its surroundings carefully shaped. The Veiled Interior is no void, but a lived-in world of its own."
 gate_veiled_interior.2.a: "Fascinating."
