 je_gate_veiled_interior_phase_early_contact: "Phase: #v Early Contact#!"
 je_gate_veiled_interior_phase_diplomacy: "Phase: #v Diplomacy#!"
 sb_gate_veiled_interior_expedition: "Start Expedition"
 sb_gate_veiled_interior_expedition_desc: "Start an expedition into the New Guinean interior."
 sb_gate_veiled_interior_expedition_possible: "We do #bold not#! have an active expedition in the field"
 sb_gate_veiled_interior_scout: "Scout the Interior"
 sb_gate_veiled_interior_scout_desc: "Now that we have a reliable path to the interior we should scout the area."
 sb_gate_veiled_interior_scout_possible: "We do #bold not#! have an active scouting party in the field"
