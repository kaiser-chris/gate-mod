l_english:
 je_gate_veiled_interior: "The Veiled Interior"
 je_gate_veiled_interior_reason: "Beyond the settled coasts of New Samadore lies the Veiled Interior, a vast expanse of dense jungle and rising highlands that has thus far resisted all meaningful incursion. The first [GetCulture('gnomish').GetName] arrivals came by way of the coastal [GetBuildingType('building_gate_eastern_new_guinea').GetName], and from there, settlement spread along navigable shores and riverways. Yet the deeper interior remains obscured, its terrain uncharted and its conditions poorly understood."
 je_gate_veiled_interior_lobby: "$je_gate_veiled_interior_reason$"
 je_gate_veiled_interior_tooltip: "#header $je_gate_veiled_interior$#!\n$je_gate_veiled_interior_reason$"
 je_gate_veiled_interior_status_expedition: "We have sent an expedition into the interior."
 je_gate_veiled_interior_status_veiled: "We do not know anything about the interior."
 je_gate_veiled_interior_status_scouting: "We have sent a scout party into the interior."
 je_gate_veiled_interior_status_early_contact: "We have found people in the interior."
 je_gate_veiled_interior_status_diplomacy: "We are trying to get the interior to join us using diplomacy."
