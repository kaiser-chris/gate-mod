# Events: Veiled and Early Contact
 gate_veiled_interior.2.t: "People of the Interior"
 gate_veiled_interior.2.d: "We have found a #v large settlement#! in the New Guinean interior."
 gate_veiled_interior.2.f: "After weeks beneath the canopy, an expedition has returned with startling news. Deep in the highlands, they encountered a sizable settlement, its people organized and its surroundings carefully shaped. The Veiled Interior is no void, but a lived-in world of its own."
 gate_veiled_interior.2.a: "Fascinating."
 gate_veiled_interior.3.t: "Missing Expedition"
 gate_veiled_interior.3.d: "The expedition has not returned and is now considered #v lost#!."
 gate_veiled_interior.3.f: "Contact with the inland expedition has been lost. Supplies were sufficient and the route well planned, yet no word has come back. Whether they are delayed, lost, or met with something unforeseen remains unknown."
 gate_veiled_interior.3.a: "Damnation!"
 gate_veiled_interior.4.t: "Crocodile Attack"
 gate_veiled_interior.4.d: "The expedition was forced to #v return#! because of an animal attack."
 gate_veiled_interior.4.f: "Reports confirm that our expedition was forced to withdraw after a fatal attack by a saltwater crocodile along an inland river crossing. The loss was immediate, and the party deemed further progress too dangerous. The waterways of the interior are proving as perilous as the jungle itself."
 gate_veiled_interior.4.a: "He will be remembered."
 gate_veiled_interior.5.t: "Ambush in the Interior"
 gate_veiled_interior.5.d: "The expedition was forced to #v flee#! because of an ambush."
 gate_veiled_interior.5.f: "The inland expedition has returned in disorder after a sudden attack by unknown inhabitants. The party reports ambushes from concealed positions and coordinated strikes that forced an immediate retreat. No attempt at contact could be made."
 gate_veiled_interior.5.a: "There are people in the interior!"
 gate_veiled_interior.6.t: "Diseased Expedition"
 gate_veiled_interior.6.d: "A disease outbreak force the expedition to #v return#!."
 gate_veiled_interior.6.f: "An inland expedition has been forced to turn back after disease spread rapidly through the party. What began as fever and fatigue soon rendered several members unable to continue. With supplies strained and no remedy at hand, the expedition was abandoned before deeper progress could be made."
 gate_veiled_interior.6.a: "Get them to a healer."
 gate_veiled_interior.7.t: "Confusing Jungle"
 gate_veiled_interior.7.d: "The expedition became disoriented and was forced to #v return#!."
 gate_veiled_interior.7.f: "The surveying party has returned after becoming hopelessly disoriented within the interior. Dense canopy and unreliable landmarks rendered navigation impossible, and repeated attempts to retrace their route failed. With provisions running low, the expedition withdrew, having mapped little beyond confusion itself."
 gate_veiled_interior.7.a: "Fools."
 gate_veiled_interior.8.t: "A million people!"
 gate_veiled_interior.8.d: "Our scouts estimate there are roughly #v one million#! [GetCulture('melanesian').GetName] people in the interior!"
 gate_veiled_interior.8.f: "Reports from the interior have overturned all prior assumptions. Following the discovery of the first settlement, further exploration now indicates a dense network of communities throughout the highlands. The population is far from marginal; estimates suggest it numbers in the hundreds of thousands, perhaps even approaching a million."
 gate_veiled_interior.8.a: "Send the diplomatic corps!"
# Events: Negotiations
 gate_veiled_interior.101.t: "A Shift in Perspective"
 gate_veiled_interior.101.d: "Our negotiations with the interior advance to the #v $je_gate_veiled_interior_diplomacy_alignment$#! phase."
 gate_veiled_interior.101.f: "Initial contact was met with open dismissal, the highland representatives regarding our envoys as distant curiosities rather than serious partners. That attitude shifted as demonstrations began. Gnomish instruments, unfamiliar techniques, and controlled displays of magic made clear the scale of advancement beyond the interior. When presented alongside accurate maps showing their lands fully enclosed by our coasts, skepticism gave way to sober recognition. The interior now agrees to proceed with formal negotiations."
 gate_veiled_interior.101.a: "Finally."
 gate_veiled_interior.102.t: "Terms Forged Through Friction"
 gate_veiled_interior.102.d: "Our negotiations with the interior advance to the #v $je_gate_veiled_interior_diplomacy_implementation$#! phase."
 gate_veiled_interior.102.f: "Negotiations have been long and often strained. Cultural practices unfamiliar to our institutions, alongside decentralized systems of authority, complicated every stage of alignment. Integrating these into a codified and balanced state required not only compromise, but innovation. Now, after many revisions, both delegations have agreed on a structure that can hold. The alignment phase concludes with a shared plan for integration."
 gate_veiled_interior.102.a: "Lets implement this framework."
 gate_veiled_interior.103.t: "A shared future"
 gate_veiled_interior.103.d: "The [GetCulture('melanesian').GetName] people of the New Guinean interior highland join [TopScope.GetRootScope.GetCountry.GetName]."
 gate_veiled_interior.103.f: "What lay beyond the canopy was not empty, nor always welcoming. Early encounters were marked by loss and unease, and not all gestures of peace were returned in kind. Even so, dialogue continued. Now, the highland communities have chosen to enter our fold, transforming a troubled frontier into a shared future."
 gate_veiled_interior.103.a: "Towards a shared future."
 gate_veiled_interior.103.a.tooltip: "Roughly #v one million#! [GetCulture('melanesian').GetName] people will join our nation."
 gate_veiled_interior.104.t: "Disappearance of an Envoy"
 gate_veiled_interior.104.d: "One of our negotiating party failed to return from the interior, this will potentially #v stall#! our talks."
 gate_veiled_interior.104.f: "The sudden vanishing of Principal Envoy Wilben has brought all diplomatic progress to a grinding halt. He was last seen traveling with a minimal escort to verify a jurisdictional claim with a remote highland chieftain. Given the interior's history of extreme cultural practices and the grisly rumors now circulating through the gnomish capital we will need to investigate this situation."
 gate_veiled_interior.104.a: "The negotiations have to continue."
 gate_veiled_interior.104.b: "Investigate the matter."
 gate_veiled_interior.105.t: "Military Presence Dispute"
 gate_veiled_interior.105.d: "Disagreements over the stationing of military forces have #v stalled#! the talks."
 gate_veiled_interior.105.f: "What began as a procedural matter has hardened into a central point of contention. New Samadore insists that a limited military presence is necessary to secure transit routes, protect administrative personnel, and ensure a stable transition during integration. Representatives of the interior see this differently. To them, even a “temporary” deployment signals the erosion of their autonomy and the imposition of foreign control under the guise of order. Several chiefs have warned that armed gnomish forces on their lands would be taken as an act of occupation, not partnership."
 gate_veiled_interior.105.a: "Lets pay them."
 gate_veiled_interior.105.b: "Focus the negotiations on this point."
 gate_veiled_interior.106.t: "Outrage in the Assembly"
 gate_veiled_interior.106.d: "Negotiating away some of those loopholes will take considerable time and will #v stall#! further progress."
 gate_veiled_interior.106.f: "Details of the draft plans have leaked to the Assembly, and the political backlash has been immediate and fierce. Legal purists and traditionalists are horrified by the concessions offered to the interior chiefs, particularly the legislative loopholes designed to tolerate their more gruesome cultural rites under the banner of the [GetReligion('gate_harmony_pledge').GetNameNoFormatting]. Debates on the Assembly floor have devolved into shouting matches, with hardline representatives accusing the diplomatic corps of compromising the very soul of [TopScope.GetRootScope.GetCountry.GetNameNoFormatting]."
 gate_veiled_interior.106.a: "Ignore the outrage."
 gate_veiled_interior.106.b: "Renegotiate the contentious points."
 gate_veiled_interior.107.t: "A Malady in the Highlands"
 gate_veiled_interior.107.d: "Negotiations have to wait until the outbreak has been dealt with and are therefor #v stalled#!."
 gate_veiled_interior.107.f: "Reports of a virulent sickness sweeping through several key highland settlements have brought talks to an abrupt halt. The interior chiefs have sealed their borders, turning to traditional rites and rejecting early offers of gnomish medical assistance out of suspicion that the outbreak is a curse brought by the outsiders. Meanwhile, [TopScope.GetRootScope.GetCountry.GetNameNoFormatting]'s administration has imposed a strict quarantine to prevent the contagion from reaching the densely populated coasts."
 gate_veiled_interior.107.a: "That is a problem."
 gate_veiled_interior.108.t: "Words Lost in Translation"
 gate_veiled_interior.108.d: "Language barries have slowed down the talks, we can #v stall#! the talks to find a proper solution or power through at a lower speed."
 gate_veiled_interior.108.f: "What first appeared as minor confusion has grown into a serious obstacle. The languages of the interior, highly localized and rich in context, have proven resistant to precise translation into the standardized legal and diplomatic terms of [TopScope.GetRootScope.GetCountry.GetNameNoFormatting]. Key concepts have no exact equivalents, and repeated attempts to bridge the gap have produced contradictions and unintended concessions."
 gate_veiled_interior.108.a: "Our diplomats can learn the language on the job."
 gate_veiled_interior.108.b: "Take the time to write a proper dictionary."
 gate_veiled_interior.109.t: "Lines on the Map"
 gate_veiled_interior.109.d: "Clashing territorial claims between the chiefs and our surveyors have lead to a #v stall#! in the negotiations."
 gate_veiled_interior.109.f: "The cartographers of [TopScope.GetRootScope.GetCountry.GetNameNoFormatting] pride themselves on absolute precision, but their topographical surveys clash sharply with the realities of the highlands. As administrators attempted to draw formal districts for the integration plan, glaring discrepancies emerged. The interior chiefs define territory not by coordinates or fixed borders, but by shifting seasonal landmarks, ancestral hunting grounds, and complex blood ties. Consequently, several vital resource veins and transit passes are now fiercely contested by multiple chiefs, or inadvertently zoned as state property by our surveyors. With accusations of land theft brewing and local leaders refusing to surrender their domains to arbitrary lines on paper, negotiations have stalled until a shared geography can be agreed upon."
 gate_veiled_interior.109.a: "Pay them off."
 gate_veiled_interior.109.b: "Pause the negotiations until this can be solved."
 gate_veiled_interior.110.t: "Rousing Speech Captivates the Interior"
 gate_veiled_interior.110.d: "This afternoon, [SCOPE.sCharacter('orator_ig_leader_scope').GetFullName], leader of the [SCOPE.gsInterestGroup('orator_ig_scope').GetName], delivered a fiery speech advocating for the integration of the interior into [TopScope.GetRootScope.GetCountry.GetNameNoFormatting]."
 gate_veiled_interior.110.f: "Making an appearance before the chiefs of the interior in [SCOPE.sCharacter('orator_ig_leader_scope').GetCountry.GetCapital.GetCityHubName]'s assembly, [SCOPE.sCharacter('orator_ig_leader_scope').GetFullNameNoFormatting]'s powerful rhetoric left even the most embittered chiefs impressed. Excerpts from the speech are already being circulated across [ROOT.GetCountry.GetNameNoFormatting], fanning support for the integration."
 gate_veiled_interior.110.a: "This should ease the path to integration greatly."
 gate_veiled_interior.110.b: "Performances like these reflect well on [SCOPE.sCharacter('orator_ig_leader_scope').GetFullNameNoFormatting] and [SCOPE.sCharacter('orator_ig_leader_scope').GetHerHis] cause."
 gate_veiled_interior.111.t: "Popular Playwright Endorses Integration"
 gate_veiled_interior.111.d: "In the midst of the negotiations surrounding the integration of the interior, one of the country's leading playwrights, has staged a widely acclaimed play whose politically laden theme makes no secret of the author's desire for the integration to happen."
 gate_veiled_interior.111.f: ""The man's viewpoints may be somewhat partisan, but sir, you cannot argue with his prose!""
 gate_veiled_interior.111.a: "The integration will be on everyone's lips now."
 gate_veiled_interior.111.b: "Let us ensure the play gets a wider, international audience."
 gate_veiled_interior.112.t: "Address Goes Awry"
 gate_veiled_interior.112.d: "What was meant as a routine speech about the merits of integrating the interior to the chiefs by [SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullName] has quickly devolved into a public relations disaster for the integration."
 gate_veiled_interior.112.f: "Fumbling [SCOPE.sCharacter('publicaddress_ig_leader_scope').GetHerHis] way through a series of poorly presented talking points, [SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullNameNoFormatting]'s arguments have been viciously and convincingly picked apart by the chiefs. The question on everyone's lips now is merely if this mishap was due to the inherent failings of integration or can be chalked down to the political incompetence of the [SCOPE.gsInterestGroup('publicaddress_ig_scope').GetNameNoFormatting]."
 gate_veiled_interior.112.a: "[SCOPE.sCharacter('publicaddress_ig_leader_scope').GetFullNameNoFormatting] must take the blame for this setback."
 gate_veiled_interior.113.t: "Crooked Connections"
 gate_veiled_interior.113.d: "Frustrated with the lengthy process surrounding the integration of the interior, [SCOPE.sCharacter('underhanded_instigator_leader_scope').GetFullName] of the [SCOPE.gsInterestGroup('underhanded_instigator_ig_scope').GetName] has approached us with an offer to expedite the process, utilizing [SCOPE.sCharacter('underhanded_instigator_leader_scope').GetHerHis] personal connections within the interior."
 gate_veiled_interior.113.f: ""A few words in the right ears is all I am asking for. Everything within the bounds of the law, of course, although I cannot guarantee our opponents in this matter will view such actions with much glee.""
 gate_veiled_interior.113.a: "Grant [SCOPE.sCharacter('underhanded_instigator_leader_scope').GetHerHim] permission, time is of the essence."
 gate_veiled_interior.113.b: "No, we do this by the book, or not at all."
 gate_veiled_interior.114.t: "Cultural Contributions"
 gate_veiled_interior.114.d: "The debates around the integration have sparked discussion at the Art Academy in [SCOPE.sState('degenerate_art_state').GetName] about whether artistic movements influenced by artists of the interior have a place in the [ROOT.GetCountry.GetAdjectiveNoFormatting] art world."
 gate_veiled_interior.114.f: ""In contemporary sculpture, painting and music alike, the corrupting influence of these so-called 'artists' can be felt. That this is taught in our schools and displayed in our museums is a slap in the face of the [ROOT.GetCountry.GetAdjectiveNoFormatting] soul. For the feelings and values of our people to be protected from interior filth, it must be purged!""
 gate_veiled_interior.114.a: "It is distinctly un-[ROOT.GetCountry.GetAdjectiveNoFormatting]!"
 gate_veiled_interior.114.b: "Their work is part of our artistic legacy."