 gate_dragon_himalaya.1.d: "A dragon has awakened in [TopScope.sC('dragon_country').GetCapital.GetName] and some locals are already worshipping them. The domain of this dragon is called [TopScope.sC('dragon_country').GetName]."
 gate_dragon_himalaya.1.f: "TODO"
 gate_dragon_himalaya.1.a: "Fascinating."
 gate_dragon_himalaya.1.b: "Concerning."
 gate_dragon_himalaya.2.t: "Scaled Messanger"
 gate_dragon_himalaya.2.d: "A messenger from [TopScope.sC('dragon_country').GetName] demands us to cede their 'homeland' to them."
 gate_dragon_himalaya.2.f: "TODO"
 gate_dragon_himalaya.2.a: "Ludicrous! Send them away."
 gate_dragon_himalaya.2.b: "Tactfully refuse."
 gate_dragon_himalaya.2.c: "Accept."