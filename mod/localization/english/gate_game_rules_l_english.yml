l_english:
 gate_rule_mod_tooltip: "#header $dlc_magic_gate$#!\n$dlc_magic_gate_desc$"
 gate_rule_mod_prefix: "#tooltip:[GetRawTextTooltipTag('gate_rule_mod_tooltip')] @gate_mod_logo! #yellow Manaflow#!:#!"
# Magic Starting Countries
 rule_gate_magic_start: "$gate_rule_mod_prefix$ $concept_gate_magic_knowledge$ at Game Start"
 setting_gate_deactivate_magic_start: "Historical"
 setting_gate_deactivate_magic_start_desc: "Only [Concept('concept_country', '$concept_countries$')] with relevant history will start with [concept_gate_magic_knowledge]."
 setting_gate_activate_magic_start_player: "Player Country + Historical"
 setting_gate_activate_magic_start_player_desc: "All player [Concept('concept_country', '$concept_countries$')], as well as [Concept('concept_country', '$concept_countries$')] with relevant history will start with [concept_gate_magic_knowledge]."
 setting_gate_activate_magic_start_all: "All Countries"
 setting_gate_activate_magic_start_all_desc: "All [Concept('concept_country', '$concept_countries$')] will start with [concept_gate_magic_knowledge]."
# Tutorials
 rule_gate_tutorials: "$gate_rule_mod_prefix$ Tutorials"
 setting_gate_tutorials_on: "On"
 setting_gate_tutorials_on_desc: "Tutorials are activated."
 setting_gate_tutorials_off: "Off"
 setting_gate_tutorials_off_desc: "Tutorials are deactivated."