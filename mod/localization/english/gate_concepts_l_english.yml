l_english:
 concept_gate_planet: "$gate_planet$"
 concept_gate_planet_desc: "Ankaris, a realm of untamed magic and ancient wonders, is a world where towering mountains cradle dwarven halls, verdant forests shelter elven kingdoms, and endless plains echo with the clash of orcish warbands. Beneath its beauty lies a turbulent history shaped by mana’s wild currents, a force that binds its peoples and landscapes in both harmony and conflict."
 concept_gate_magic_knowledge: "Arcane Knowledge"
 concept_gate_magic_knowledge_desc: "$concept_gate_magic_knowledge$ is a collection of technologies that can not be researched directly but only be acquired by researching magic itself with your [concept_gate_magic_researcher].\n\nThese technologies are:\n• [GetTechnology('gate_magic_understanding_production').GetName]\n• [GetTechnology('gate_magic_understanding_society').GetName]\n• [GetTechnology('gate_magic_understanding_military').GetName]"
 concept_gate_mana_saturation: "Mana Saturation"
 concept_gate_mana_saturation_desc: "Mana Saturation is the average [concept_gate_mana_density] around the world."
 concept_gate_magic_innovation: "Magic Innovation"
 concept_gate_magic_innovation_desc: "@magic_innovation!$concept_gate_magic_innovation$ is produced mainly through our [concept_gate_magic_researcher] and the [GetBuildingType('building_gate_magic_research_institute').GetName]. The [GetBuildingType('building_gate_alxa').GetName], [GetBuildingType('building_gate_mage_tower').GetName], [GetBuildingType('building_gate_magic_academy').GetName] and [GetBuildingType('building_university').GetName] $concept_buildings$ can also contribute to our monthly magical innovation generation."
 concept_gate_magic_technology: "Magic Technology"
 concept_gate_magic_technologies: "Magic Technologies"
 concept_gate_magic_technology_desc: "$concept_gate_magic_technology$ covers all magical innovation in the fields of $PRODUCTION_NO_CONCEPT$, $MILITARY$, and $SOCIETY$. $concept_gate_magic_technologies$ have nation-wide effects, which can range from changing the [Concept('concept_country','$concept_country_possessive$')] operating parameters via [Concept('concept_modifier','$concept_modifiers$')] to unlocking new [Concept('concept_production_method','$concept_production_methods$')], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')], [Concept('concept_decree','$concept_decrees$')], and [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')].\n\nProgress is made towards new $concept_gate_magic_technologies$ through [concept_gate_magic_innovation].\n\nThe amount of progress required in a $concept_gate_magic_technology$ to acquire it depends on its [Concept('concept_technology_era','$concept_technology_era_short$')]. $concept_technology_era_ahead_of_time_penalty_desc$"
 concept_gate_monster_attack: "Monster Attack"
 concept_gate_monster_attacks: "Monster Attacks"
 concept_gate_monster_attack_desc: "Starting from a medium amount of [concept_gate_mana_density] local fauna and flora may mutate and attack civilians."
 concept_gate_monster_horde: "Monster Horde"
 concept_gate_monster_hordes: "Monster Hordes"
 concept_gate_monster_horde_desc: "Starting from a medium amount of [concept_gate_mana_density] local fauna and flora may mutate in huge numbers and attack civilians brutally."
 concept_gate_mana_density: "Mana Density"
 concept_gate_mana_density_mana: "Mana"
 concept_gate_mana_density_desc: "Since the Magic Gates opened, mana is spewing onto Earth. Applications of [concept_gate_magic_knowledge] on Earth has further increased the amount of mana in the atmosphere. Should the $concept_gate_mana_density$ in a state reach its maximum, [concept_gate_magical_phenomena] will become common place. Until then different levels of $concept_gate_mana_density$ in a state will lead to unpredictable changes and events.\n\n#header Mana Density Levels:#!\n• Low Mana Density starts from #v [GuiScope.ScriptValue('gate_low_mana_density_threshhold')]%#!\n• Medium Mana Density starts from #v [GuiScope.ScriptValue('gate_medium_mana_density_threshhold')]%#!\n• High Mana Density starts from #v [GuiScope.ScriptValue('gate_high_mana_density_threshhold')]%#!"
 concept_gate_magical_phenomena: "Magical Phenomena"
 concept_gate_magical_phenomena_desc: "Magical phenomena are events driven by the increased [concept_gate_mana_density] in a state. They range from benign over helpful to terrifying."
 concept_gate_magic_researcher: "Arcanist"
 concept_gate_magic_researchers: "Arcanists"
 concept_gate_magic_researcher_desc: "A countries Arcanist leads the [GetBuildingType('building_gate_magic_research_institute').GetName] and steers its [concept_gate_magic_innovation]. They lead [Concept('concept_gate_project','$concept_gate_projects$')] and help us improve magical industries and the usage of magic in society."
 concept_gate_character_experience_simple: "Experience"
 concept_gate_character_experience: "Character Experience"
 concept_gate_character_experience_desc: "Certain characters like our [concept_gate_magic_researcher] can earn experience in their work. Characters of higher levels are better in their job and increase results of their daily work.\n\n#header Experience Levels:#!#indent_newline:1 \n• $gg_character_experience_basic$#!#indent_newline:1 \n• $gg_character_experience_experienced$#!#indent_newline:1 \n• $gg_character_experience_expert$#!"
 concept_gate_magic: "Magic"
 concept_gate_magic_desc: "Magic is the act of shaping mana into an effect on the world. It is used by [concept_gate_magic_users] to produce wonderful, but also devastating effects."
 concept_gate_magic_user: "Spellcaster"
 concept_gate_magic_users: "Spellcasters"
 concept_gate_magic_users_desc: "Spellcasters are [Concept('concept_pop','$concept_pops$')] that wield arcane powers in their daily lives.\n\n#header Pops:#!\n• [GetPopType('gate_mages').GetName]\n• [GetPopType('gate_druids').GetName]"
 concept_gate_magic_ethic: "Arcane Domain"
 concept_gate_magic_ethics: "Arcane Domains"
 concept_gate_magic_ethic_desc: "$concept_gate_magic_ethics$ are a defining [concept_country] modifier.\nThey represent how a country plans to use magic."
 concept_gate_mbudye_council: "Mbudye Council"
 concept_gate_mbudye_council_desc: "The $concept_gate_mbudye_council$ stands as the heart of the Lunda's historical and spiritual identity. Comprising wise men and women, they serve as keepers of sacred traditions, interpreters of political principles, and guardians of ancestral memory. In the face of the Arcturian Dominion's efforts to spread the Golden Blessing, the council has been both a bulwark of resistance and a bridge for dialogue. Balancing the weight of history with the pressures of change, the Mbudye navigate a turbulent era where faith and power intertwine."
 concept_gate_bambudye: "Bambudye"
 concept_gate_bambudye_desc: "The Bambudye, a clandestine society born of Lunda resilience, operates in the shadows, defying the Arcturian Dominion's rule. Rooted in ancient traditions, they blend mysticism with cunning strategy, fighting to preserve their people's autonomy and cultural identity. To the oppressed, they are symbols of hope and rebellion; to the elves, they are elusive insurgents sowing chaos in a fragile order. Their influence runs deep, whispered in hushed tones, a constant reminder that the Lunda spirit cannot be easily subdued."
 concept_gate_vampirism: "Vampirism"
 concept_gate_vampirism_desc: "A dark covenant between blood and power, Vampirism offers eternal life at a price. Those who embrace the curse gain unnatural strength, heightened senses, and a thirst that binds them to the shadows. In the veins of the afflicted, mana and hunger entwine, forging beings both feared and revered. Embracing Vampirism means to become a [GetCulture('vampire').GetName]."
 concept_gate_ley_line: "Ley Line"
 concept_gate_ley_lines: "Ley Lines"
 concept_gate_ley_lines_desc: "Invisible to most but vital to the arcane, ley lines are currents of raw mana that flow beneath the land. Where they converge, mana surges, turning regions into potent magical hotspots and amplifying all nearby spellwork."
 concept_gate_mana_well: "Mana Well"
 concept_gate_mana_well_desc: "A mana well is a tap on a [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]. Mana wells can produce an almost unlimited amount of $gate_mana$.\n\nBut they can lead #v instability#! in the local [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')], which may lead to #v accidents#!."
 concept_gate_expedition: "Expedition to $gate_planet$"
 concept_gate_expedition_desc: "When we have control over a [GetBuildingType('building_gate_alxa').GetName] and have developed our control over them with [GetTechnology('gate_expeditions').GetName], we can start an Expedition to [concept_gate_planet]."
 concept_gate_expedition_location: "Expedition Location"
 concept_gate_expedition_location_desc: "" #TODO
 concept_gate_expedition_leader: "Expedition Leader"
 concept_gate_expedition_leaders: "Expedition Leaders"
 concept_gate_expedition_leader_desc: "The leader of our [concept_gate_expedition]. Depending on our leader we can do different [concept_gate_expedition_activities] on [concept_gate_planet].\n\nThere are three types of leaders:\n• [concept_gate_expedition_leader_militarist]\n• [concept_gate_expedition_leader_politician]\n• [concept_gate_expedition_leader_industrialist]"
 concept_gate_expedition_leader_militarist: "Militarist"
 concept_gate_expedition_leader_militarist_desc: "A $concept_gate_expedition_leader_militarist$ is focused on controlling the people on [concept_gate_planet] through force."
 concept_gate_expedition_leader_politician: "Politician"
 concept_gate_expedition_leader_politician_desc: "A $concept_gate_expedition_leader_politician$ is focused on creating diplomatic ties with the people on [concept_gate_planet]."
 concept_gate_expedition_leader_industrialist: "Industrialist"
 concept_gate_expedition_leader_industrialist_desc: "An $concept_gate_expedition_leader_industrialist$ is focused on developing new trade routes with the people on [concept_gate_planet]."
 concept_gate_expedition_budget: "Expedition Budget"
 concept_gate_expedition_budget_desc: "The $concept_gate_expedition_budget$ is used to start new [concept_gate_expedition_activities] on [concept_gate_planet]. When it runs out our [concept_gate_expedition] will come to an end."
 concept_gate_expedition_activity: "Expedition Activity"
 concept_gate_expedition_activities: "Expedition Activities"
 concept_gate_expedition_activities_desc: "Every interaction on the [concept_gate_expedition_map] is considered a [Concept('concept_gate_expedition_activities','$concept_gate_expedition_activity$')]."
 concept_gate_expedition_map: "Expedition Map"
 concept_gate_expedition_map_desc: "The $concept_gate_expedition_map$ needs to be uncovered piece by piece through scouting. The map itself is constant between multiple expeditions."
 concept_gate_project: "Arcanist Project"
 concept_gate_projects: "Arcanist Projects"
 concept_gate_project_desc: "Guided by our nation's foremost magical minds, Arcanist Projects channel arcane theory into practical innovation. These focused research efforts unlock magical enhancements that uplift industry, society, and infrastructure, forging a path toward a more enchanted future."
 concept_gate_magic_country: "Arcane Country"
 concept_gate_magic_countries: "Arcane Countries"
 concept_gate_magic_country_desc: "Countries that have acquired [concept_gate_magic_knowledge]."
 concept_gate_arcane_council: "$io_gate_arcane_council$"
 concept_gate_arcane_council_desc: "The $io_gate_arcane_council$ is an [concept_com_international_organization] meant to regulate and restrict [concept_gate_magic_users]. Its primary goal is to prevent international incidents and it is headed by a [concept_gate_arcane_council_high_mage]."
 concept_gate_arcane_council_high_mage: "$io_gate_arcane_council_leader_title$"
 concept_gate_arcane_council_high_mage_desc: "The $io_gate_arcane_council_leader_title$ leads the [concept_gate_arcane_council] [concept_com_international_organization]. They are elected from all member countries [Concept('concept_gate_magic_researcher','$concept_gate_magic_researchers$')]."
 concept_gate_harmony_pledge: "Harmony Pledge"
 concept_gate_harmony_pledge_desc: "In these lands, harmony is not a happy accident of character, but a work of deliberate design. The [concept_gate_harmony_pledge] began as a gnomish answer to a distinctly gnomish nature: a people of intensity, prone to brilliance and obsession, indulgence and austerity, sudden enthusiasms and sudden reversals. It did not seek to deny those instincts, but to give them shape.\n\nOver time, that design grew beyond its origin. What began as a framework for gnomes became the foundation of a broader society, shared by many peoples who found strength in its careful balance. Laws, institutions, and traditions serve not as shackles, but as instruments with weights and counterweights in the ongoing craft of living together. Each impulse is given its place, each excess its channel, so that the energies of the individual might strengthen the resilience of the whole.\n\nIn this, their civilization is itself an invention: not inherited whole, but continually tuned, adjusted, and refined by all who live within it. To live under the [concept_gate_harmony_pledge] is to become part of that work—to stand not merely as subject or neighbor, but as one of the many hands shaping a society wise enough to contain multitudes.\n\nThe [concept_gate_harmony_pledge] divides itself into three facets:#indent_newline:2 \n• [concept_gate_harmony_pledge_society]#!#indent_newline:2 \n• [concept_gate_harmony_pledge_economy]#!#indent_newline:2 \n• [concept_gate_harmony_pledge_legislative]#!"
 concept_gate_harmony_pledge_society: "Societal Harmony"
 concept_gate_harmony_pledge_society_desc: "The Harmony Pledge binds not only action, but belief. In a land of many cultures and faiths, unity is not demanded through sameness, but cultivated through careful balance. Traditions are given space, differences acknowledged, and shared ground deliberately maintained, so that no voice grows so dominant as to silence the rest, nor so distant as to fall beyond the whole."
 concept_gate_harmony_pledge_economy: "Economic Harmony"
 concept_gate_harmony_pledge_economy_desc: "The Harmony Pledge extends even into the rhythm of work and wealth. No industry is left to swell unchecked, nor allowed to wither in neglect. Surges of brilliance are tempered, excess redirected, and imbalance corrected, so that prosperity does not come as a fleeting peak, but as a sustained and shared equilibrium across the whole."
 concept_gate_harmony_pledge_legislative: "Legislative Harmony"
 concept_gate_harmony_pledge_legislative_desc: "The Harmony Pledge governs not only society and economy, but the motion of power itself. Political movements rise with conviction and urgency, often pulling the state toward bold reforms or rigid doctrines. Yet none are meant to endure unchecked. Through counterweights, compromise, and careful correction, extremes are tempered and influence redistributed, ensuring that governance remains a living balance, not the triumph of any single moment or ideology."
 concept_gate_harmony_pledge_order: "Order"
 concept_gate_harmony_pledge_order_desc: "Order is the careful architecture of laws, traditions, and institutions that gives shape to ambition and anchors the nation. The [concept_gate_harmony_pledge] relies on this structure to keep the diverse community resilient. However, absolute order is a suffocating weight. When pursued to the extreme, it becomes a rigid, mathematical tyranny that crushes spontaneity, stifles cultural expression, and turns a living, breathing society into a stagnant machine."
 concept_gate_harmony_pledge_chaos: "Chaos"
 concept_gate_harmony_pledge_chaos_desc: "Chaos is the spark of unbridled invention and sudden passion, the raw energy that drives both brilliance and ruin. Within the [concept_gate_harmony_pledge], it is welcomed as the necessary fuel for progress and cultural vitality. But left unchecked, it rejects all boundaries, dissolving society into a disjointed frenzy where fleeting obsessions and sudden shifts tear down the foundations of the community faster than they can be built."
 concept_gate_harmony_pledge_stratified: "Stratified"
 concept_gate_harmony_pledge_stratified_desc: "Stratification is the condition wherein a society has entrenched priviliges which accrue to a select group of people without them having earned it through any intrinsic value. It is the social aspect of [concept_gate_harmony_pledge_order]."
 concept_gate_harmony_pledge_antinomian: "Antinomian"
 concept_gate_harmony_pledge_antinomian_desc: "Antinomianism is the condition wherein a society rejects shared norms, duties, and obligations as limits upon individual action, leaving no stable basis for trust, restraint, or collective action. It is the social aspect of [concept_gate_harmony_pledge_chaos]."
 concept_gate_harmony_pledge_cartelised: "Cartelised"
 concept_gate_harmony_pledge_cartelised_desc: "Cartelisation is the condition wherein an economy has concentrated access to growth in protected incumbents, monopolies, and rent-seeking interests, allowing them to profit from control rather than productive value. It is the economic aspect of [concept_gate_harmony_pledge_order]."
 concept_gate_harmony_pledge_febrile: "Febrile"
 concept_gate_harmony_pledge_febrile_desc: "Febrility is the condition wherein an economy is driven by repeated surges of enthusiasm, panic, reinvention, and reversal, leaving people unable to reliably plan, invest, or expect stable returns. It is the economic aspect of [concept_gate_harmony_pledge_chaos]."
 concept_gate_harmony_pledge_despotic: "Despotic"
 concept_gate_harmony_pledge_despotic_desc: "A Despotic state is one which concentrates its capacity into direct command by the ruler or central apparatus, allowing forceful action where its attention is focused while weakening the systems that enable action through law, delegation, trust, and institutions. It is the state aspect of [concept_gate_harmony_pledge_order]."
 concept_gate_harmony_pledge_anaemic: "Anaemic"
 concept_gate_harmony_pledge_anaemic_desc: "An Anaemic state is one which possesses formal authority but lacks the institutional strength, reach, resources, or legitimacy to reliably implement its decisions, leaving progress vulnerable to obstruction, neglect, and non-compliance. It is the state aspect of [concept_gate_harmony_pledge_chaos]."
 concept_gate_harmony_pledge_citizens: "Civitans"
 concept_gate_harmony_pledge_citizens_desc: "People with the status of [GetAcceptanceStatus('second_rate_citizen').GetName] or better who are afforded full legal rights in a state governed under the Harmony Pledge."
