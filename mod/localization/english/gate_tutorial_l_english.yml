l_english:
# Tutorial: Magic Research
 lesson_gate_magic_research_1: "What are [Concept('concept_gate_magic_technology', '$concept_gate_magic_technologies$')]?"
 lesson_gate_magic_research_1_desc: "$concept_gate_magic_technologies$ are separate type of research done in the #v $gg_panel_base_title$#! panel."
 lesson_gate_magic_research_1_continue: "Open the #v $gg_panel_base_title$#! panel to continue."

 lesson_gate_magic_research_2: "$lesson_gate_magic_research_1$"
 lesson_gate_magic_research_2_desc: "[concept_gate_magic_innovation] is different from normal [concept_innovation] in that it is accumulated until used or a maximum is reached. You can find the current amount of accumulated [concept_gate_magic_innovation] in the $gg_panel_base_title$ panel."
 lesson_gate_magic_research_2_continue: "Open the #v $gg_panel_base_title$#! panel to see your [concept_gate_magic_innovation]."

 lesson_gate_magic_research_3: "$lesson_gate_magic_research_1$"
 lesson_gate_magic_research_3_desc: "[Concept('concept_gate_magic_technology', '$concept_gate_magic_technologies$')] come in three distinct flavors: #v $PRODUCTION_NO_CONCEPT$#!, #v $MILITARY$#! and #v $SOCIETY$#!"
 lesson_gate_magic_research_3_continue: "Open the #v $PRODUCTION_NO_CONCEPT$#! tab in the #v $gg_panel_base_title$#! panel to continue."

 lesson_gate_magic_research_4: "$lesson_gate_magic_research_1$"
 lesson_gate_magic_research_4_desc: "[Concept('concept_gate_magic_technology', '$concept_gate_magic_technologies$')] follow the normal cost structure of normal technologies and are separated by eras. Different than normal [Concept('concept_gate_magic_technology', '$concept_gate_magic_technologies$')] need to be unlocked with your accumulated [concept_gate_magic_innovation]."
 lesson_gate_magic_research_4_continue: "Open the #v $PRODUCTION_NO_CONCEPT$#! tab in the #v $gg_panel_base_title$#! panel to see your the technologies."