l_english:
 io_gate_arcane_council: "Arcane Council"
 io_gate_arcane_council_reason: "In a world where [concept_gate_magic] is common and powerful [concept_gate_magic_users] can move freely between states, nations have found it necessary to cooperate. The [concept_gate_arcane_council] was created to coordinate international rules and limitations on arcane practice."
 io_gate_arcane_council_election: "A [concept_gate_arcane_council_high_mage] is elected for his whole career. When the existing [concept_gate_arcane_council_high_mage] retires or dies new elections will be held. The [concept_magic_researcher] of all member [Concept('concept_country','$concept_countries$')] are eligible for election.\n\nOur [concept_magic_researcher] has an election score of #tooltippable #tooltip:[GetRawTextTooltipTag('io_gate_arcane_council_election_score_tooltip')] [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]#!#! and we will probably [GetPlayer.GetCustom('gate_arcane_council_election_indicator')] the next election."
 io_gate_arcane_council_election_indicator_loss: "#r lose#!"
 io_gate_arcane_council_election_indicator_win: "#g win#!"
 io_gate_arcane_council_election_score_tooltip: "The total [concept_gate_arcane_council_high_mage] election score of our [concept_magic_researcher] is [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v+] due to:#indent_newline:3 \n[GetPlayer.MakeScope.GetScriptValueDesc('gate_arcane_council_election_score')]#!"
 io_gate_arcane_council_status_election: "The organization is currently electing its new [concept_gate_arcane_council_high_mage]."
 io_gate_arcane_council_leader_title: "High Mage"
 sb_gate_arcane_council_research_cooperation: "Start Research Cooperation"
 sb_gate_arcane_council_research_cooperation_desc: "Use our [concept_influence] to promote a joint research initiative among all members."
 modifier_gate_arcane_council_base: "Basic Arcane Regulations"
 modifier_gate_arcane_council_research_cooperation: "Research Cooperation"
 modifier_gate_arcane_council_research_cooperation_cost: "Research Cooperation Cost"
 decision_gate_found_arcane_council: "Found the $io_gate_arcane_council$"
 decision_gate_found_arcane_council_desc: "Found the [concept_gate_arcane_council]."
 decision_gate_join_arcane_council: "Join the $io_gate_arcane_council$"
 decision_gate_join_arcane_council_desc: "Join the [concept_gate_arcane_council]."
 decision_gate_leave_arcane_council: "Leave the $io_gate_arcane_council$"
 decision_gate_leave_arcane_council_desc: "Leave the [concept_gate_arcane_council]."
 gate_arcane_council_event_hint: "Regulating [concept_gate_magic] internationally through an [concept_gate_arcane_council] could prevent future incidents like this."
 gate_arcane_council.1.t: "Foreign Magic, Domestic Consequences"
 gate_arcane_council.1.d: "A visiting [Concept('concept_gate_magic_users','$concept_gate_magic_user$')] from [TopScope.sC('source_country').GetName] has lost control in [TopScope.sS('target_state').GetName] and caused [concept_devastation].\n\n$gate_arcane_council_event_hint$"
 gate_arcane_council.1.f: "A visiting Spellcaster from [TopScope.sC('source_country').GetNameNoFormatting] has lost control in a confrontation with [GetPlayer.GetAdjectiveNoFormatting] locals. The resulting magical blast devastated nearby streets and has already sparked unrest among citizens, merchants, and administrators alike. If handled poorly, this incident could damage public order at home and relations with [TopScope.sC('source_country').GetNameNoFormatting] in equal measure."
 gate_arcane_council.1.a: "Demand answers from [TopScope.sC('source_country').GetNameNoFlag]."
 gate_arcane_council.1.b: "Ignore the incident."
 gate_arcane_council.2.t: "Blight of the Outsider"
 gate_arcane_council.2.d: "A druid [Concept('concept_gate_magic_users','$concept_gate_magic_user$')] from [TopScope.sC('source_country').GetName] has caused the [GetHarvestConditionType('drought').GetName] [concept_harvest_condition] in [TopScope.sS('target_state').GetName].\n\n$gate_arcane_council_event_hint$"
 gate_arcane_council.2.f: "A druid from [TopScope.sC('source_country').GetNameNoFormatting] is believed to have brought ruin to the fields of [TopScope.sS('target_state').GetNameNoFormatting]. Fields that promised abundance only weeks ago now stand barren and gray, yet early reports suggest this may have been the work of a lone zealot rather than an official act of state. That distinction may matter in diplomacy, but it offers little comfort to farmers watching their livelihood die in the soil."
 gate_arcane_council.2.a: "Demand answers from [TopScope.sC('source_country').GetNameNoFlag]."
 gate_arcane_council.2.b: "Ignore the incident."
 gate_arcane_council.3.t: "High Mage Elections"
 gate_arcane_council.3.d: "[TopScope.sCha('new_high_mage').GetFullName] of [TopScope.sCha('new_high_mage').GetCountry.GetName] has been elected as the new [concept_gate_arcane_council_high_mage] for the [concept_gate_arcane_council]."
 gate_arcane_council.3.f: ""
 gate_arcane_council.3.a: "Good."
 gate_arcane_council_election_score_no_researcher: "No [concept_magic_researcher]"
 gate_arcane_council_election_score_experience: "[concept_gate_character_experience]"
 gate_arcane_council_election_score_trait_bound_name: "[GetCharacterTrait('gate_arcanist_bound_name').GetName] [concept_character_trait]"
 gate_arcane_council_election_score_trait_magic_sight: "[GetCharacterTrait('gate_arcanist_magic_sight').GetName] [concept_character_trait]"
 gate_arcane_council_election_score_trait_magic_voice: "[GetCharacterTrait('gate_arcanist_magic_voice').GetName] [concept_character_trait]"