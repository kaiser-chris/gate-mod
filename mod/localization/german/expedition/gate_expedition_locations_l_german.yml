# Placeholder
 expedition_location_gate_name: "Tor zur Erde" #deepl:3615238498
 expedition_location_gate_desc: "Das magische Tor, durch das wir gekommen sind. Es ist unsere Verbindung zurück zur Erde." #deepl:4142067516
 expedition_location_gate_flavor: "Expeditionslogbuch - Torgrenze, Ankaris Side\n\n#lore Wir haben es geschafft. Zum ersten Mal drücken unsere Stiefel auf den Boden von Ankaris jenseits der Schwelle des Tores, das nun uns gehört. Die Luft ist dick von Restmagie und Rauch, der sich längst gelegt hat. Gleich hinter dem Torbogen liegen die skelettartigen Überreste eines Feldlagers: eingestürzte Zelte, zerbrochene Kisten, zerschmetterte arkane Batterien. Die Siegel des Feindes sind in verrostete Rüstungen und verbrannte Banner eingebrannt, aber es gibt keine Leichen mehr. Was auch immer hier geschah, es endete in der Flucht - oder schlimmer. Das Land ist still. Keine Späher, keine Wachen, nicht einmal aasige Bestien. Nur der Wind bewegt sich, pfeift durch hohle Rahmen und wirbelt Asche in die Luft wie Geister. Das Tor ist sicher, aber die Stille ist beunruhigend. Wir halten jetzt die Schwelle, aber Ankaris beobachtet uns.#!" #deepl:55294925
 expedition_location_village_name: "Dorf" #deepl:1217930007
 expedition_location_village_desc: "Ein kleines [concept_gate_planet] Dorf. Wie wollen wir mit ihnen umgehen?" #deepl:2671302898
 expedition_location_village_flavor: "Scout-Bericht - Vorläufige Dorfbeurteilung, Expedition Ankaris Log\n\n#lore Das Dorf liegt eingebettet in natürliches Gelände und fügt sich nahtlos in seine Umgebung ein. Es scheint weitgehend autark zu sein, mit kultiviertem Land und seltsamen domestizierten Kreaturen, die unseren Gelehrten unbekannt sind. Die Gebäude sind niedrig und praktisch, viele sind mit organischen Materialien verstärkt, die schwach mit dem umgebenden Mana pulsieren. Die Einheimischen haben sich uns noch nicht genähert, obwohl sie uns hinter schimmernden magischen Schutzwällen beobachten, die zwischen Dächern und Bäumen gespannt sind. Überall in der Gegend sind schwache Spuren von Verzauberung zu sehen - eher subtil und weit verbreitet als konzentriert - was entweder auf eine tiefe Verbundenheit mit ihrem Land oder auf eine vorsichtige Zurückhaltung schließen lässt. Es wurde kein direkter Kontakt hergestellt. Weitere Beobachtung empfohlen.#!" #deepl:2870528207
 expedition_location_castle_name: "Schloss" #deepl:3677277491
 expedition_location_castle_desc: "Ein [concept_gate_planet] Schloss. Wie wollen wir mit ihnen interagieren?" #deepl:2508247163
 expedition_location_castle_flavor: "Scout Report - Fortified Hold, Ankaris Expedition Log\n\n#lore Unser Vorauskommando ist auf eine gut erhaltene Burg gestoßen, die sich auf einem niedrigen Bergrücken über der nahen Ebene erhebt. Die Festung scheint vollständig bewohnt und in ausgezeichnetem Zustand zu sein, mit glattem Mauerwerk, sauberen Zinnen und frisch geflogenen Bannern, die ein unserer Heraldik unbekanntes Siegel zeigen. Das Gelände zeigt Anzeichen regelmäßiger Patrouillen und disziplinierter Instandhaltung, und um die äußeren Mauern herum ist ein kleines Dorf entstanden, das wahrscheinlich als Stützpunkt für die Garnison und den Hof des Herrschers dient. Es gibt keine Anzeichen von Konflikten oder Unruhen - im Gegenteil, die Gegend strahlt Stabilität und Ordnung aus. Der zentrale Bergfried wird von einer gläsernen Kuppel gekrönt, die nachts ein sanftes magisches Leuchten ausstrahlt, was auf die Anwesenheit arkaner Berater oder Wächter schließen lässt. Die Burg scheint der Sitz einer lokalen Macht zu sein, möglicherweise eines Adligen oder Gouverneurs, und könnte sich als wertvoll für diplomatische Verhandlungen erweisen.#!" #deepl:3148481969
 expedition_location_town_name: "Stadt" #deepl:967788374
 expedition_location_town_desc: "Eine Stadt [concept_gate_planet]. Wie wollen wir mit ihnen umgehen?" #deepl:811850490
 expedition_location_town_flavor: "Scout Report - Unbekannte Stadtsiedlung, Expedition Ankaris Log\n\n#lore Erste Erkundungen haben eine größere Siedlung in einem flachen Tal ausgemacht, die von geschichteten Steinmauern und Holzpalisaden umgeben ist, die mit lokalen Mineralien verstärkt wurden. Die Stadt scheint autark zu sein, mit terrassierten Feldern, windbetriebenen Mühlen und mehreren erhöhten Wachposten. Im Gegensatz zu den kleineren Dörfern, an denen wir vorbeigekommen sind, weist dieser Ort Anzeichen einer durchdachten Organisation auf - breite Straßen, Bezirkseinteilungen und ein zentraler Turm, der in der Nacht schwach mit arkaner Energie leuchtet. An den Toren ist Bewegung zu erkennen, und die Bevölkerung scheint wachsam, aber nicht offen feindselig zu sein. An den Wällen hängen mehrere Banner, deren Bedeutung noch unbekannt ist. Es wurde kein direkter Kontakt aufgenommen, aber die Größe und die Struktur lassen vermuten, dass diese Stadt als lokaler Handelsknotenpunkt oder sogar als regionaler Sitz von Einfluss dienen könnte.#!" #deepl:3500098157


 expedition_location_kaelmont_harbor_name: "Hafen von Kaelmont" #deepl:1260914929
 expedition_location_kaelmont_harbor_desc: ""
 expedition_location_kaelmont_harbor_flavor: "Aufklärungsbericht – Hafen von Kaelmont, vorläufige Küstenbeurteilung, Logbuch der Ankaris-Expedition \n \n #lore  Die Stadt erhebt sich stufenweise aus einer natürlichen Tiefwasserbucht, wobei sich ihre Steinkais und Holzpfeiler eng an die Kurve der geschützten Bucht schmiegen. Die kürzlich reparierten Verteidigungsmauern weisen Brandspuren und Bruchstellen auf, die auf den Einsatz von Belagerungsmaschinen und magischen Angriffen hindeuten. Der Verkehr im Hafen ist ungebrochen: Segelschiffe und mit Mana angetriebene Boote fahren in gewohnter Regelmäßigkeit ein und aus, was darauf hindeutet, dass der Handel trotz der jüngsten Konflikte wieder aufgenommen wurde. Die lokale Architektur bevorzugt massive Steinsockel mit Holzoberstöcken, von denen einige durch sichtbare Runeneinlagen verstärkt sind, die in der Dämmerung schwach leuchten. Die öffentliche Ordnung scheint stabil; Wachpatrouillen sind diszipliniert, und Hafenbeamte führen Inspektionen mit methodischer Effizienz durch. Die Haltung gegenüber Außenstehenden ist vorsichtig, aber nicht feindselig – mehrere Hafenarbeiter wurden beobachtet, von denen nur wenige bereit waren, über den grundlegenden geschäftlichen Austausch hinaus Kontakt aufzunehmen. #!" #deepl:2898752998
 expedition_location_kaelmont_harbor_sgui: "Expeditionsort: Hafen von Kaelmont" #deepl:3205318893
 expedition_location_shadowfen_marshes_name: "Schattenmoore" #deepl:3322250556
 expedition_location_shadowfen_marshes_desc: ""
 expedition_location_shadowfen_marshes_flavor: "Aufklärungsbericht – Shadowfen-Sümpfe, Erkundung des ehemaligen Goblin-Lagers, Expeditionsprotokoll von Ankaris \n \n #lore  Der Sumpf erstreckt sich über ein tiefes Becken aus stehenden Wasserläufen und mit Schilf überwucherten Tümpeln, das in ewigen Nebel gehüllt ist. In unregelmäßigen Abständen ragen zerfallene Palisaden aus grobem Holz und Knochen aus dem Morast – Überreste ausgedehnter Befestigungsanlagen, die mittlerweile zur Hälfte vom Schlamm verschluckt wurden. Fetische aus geschnitztem Holz, Zähnen und verrostetem Metall hängen an toten Ästen, von denen viele noch immer instabile schamanische Energien ausstrahlen, die selbst für ungeübte Sinne wahrnehmbar sind. Der Boden ist tückisch; unsichtbare Senkgruben und Taschen verdorbenen Manas erschweren die Fortbewegung und drohen, Menschen und Tiere gleichermaßen zu verstricken. Gelegentlich schweben glühwürmchenähnliche Lichtpunkte über der Wasseroberfläche, die in der Nähe alter Ritualstätten heller aufleuchten, bevor sie wieder erlöschen. Es wurde keine organisierte Goblinpräsenz festgestellt, doch Spuren und Fährten deuten auf Aasfresser und möglicherweise vereinzelte Überlebende hin. Eine ausgedehnte Erkundung ist ohne magische Unterstützung und spezielle Ausrüstung nicht ratsam. Das Gebiet ist als gefährlich eingestuft; nähern Sie sich mit äußerster Vorsicht. #!" #deepl:3716168922
 expedition_location_shadowfen_marshes_sgui: "Expeditionsort: Shadowfen-Sümpfe" #deepl:2886152630
 expedition_location_thornhaven_name: "Bibliothek Thornhaven" #deepl:2889098929
 expedition_location_thornhaven_desc: ""
 expedition_location_thornhaven_flavor: "Spionagebericht – Bibliothek von Thornhaven, Beobachtung der Gelehrtenfestung, Expeditionsprotokoll von Ankaris \n \n #lore  Thornhaven thront auf einem felsigen Hügel, wobei seine Außenmauern mit dem Naturstein verschmelzen und so eine nahtlose Verteidigungshülle bilden. Der Komplex wirkt teils wie eine Festung, teils wie ein Kloster: schmale Fenster, verstärkte Tore und nach innen gerichtete Innenhöfe, die von klösterlichen Laubengängen umgeben sind. Türme mit Schieferdächern beherbergen Beobachtungsstationen und vermutlich arkane Labore – subtile Strahlen strukturierten Manas schießen gelegentlich gen Himmel, bevor sie sich auflösen. In Sichtweite bewegen sich in Roben gehüllte Gestalten zielstrebig entlang von Brüstungen und Terrassen, in Abständen begleitet von bewaffneten Gefolgsleuten, deren Rüstungen dasselbe Siegel tragen wie die Banner der Bibliothek. Die Magie in der Umgebung ist allgegenwärtig, wird jedoch streng kontrolliert; Schutzzauber bedecken Türen, Fenster und sogar Fußwege, was auf einen starken Fokus auf Sicherheit und Eindämmung hindeutet. Es wird keine aktive Feindseligkeit gezeigt, doch erste Annäherungsversuche wurden mit höflicher, distanzierter Anerkennung und der klaren Erwartung beantwortet, dass Grenzen respektiert werden. #!" #deepl:3827972942
 expedition_location_thornhaven_sgui: "Expeditionsort: Thornhaven" #deepl:1547988032
 expedition_location_shattered_spine_name: "Die zerbrochene Wirbelsäule" #deepl:2368636830
 expedition_location_shattered_spine_desc: ""
 expedition_location_shattered_spine_flavor: "Scout-Bericht – Die zerbrochene Wirbelsäule, Vermessung anomalen Geländes, Ankaris-Expeditionsprotokoll \n \n #lore  Die zerbrochene Wirbelsäule erstreckt sich am Horizont als zerklüftetes Band aus zerbrochenen Bergrücken und kristallinen Felsvorsprüngen, als wäre das Land selbst von einer kolossalen Kraft getroffen und zersplittert worden. Felsformationen winden sich in unmöglichen Winkeln, schweben gelegentlich der Schwerkraft trotzend in der Luft und werden von unsichtbaren Energien an Ort und Stelle gehalten. Die Vegetation ist spärlich und verzerrt: geschwärzte Bäume strahlen ein schwaches Leuchten aus, und widerstandsfähige Sträucher tragen glasartige Dornen, die vor Restenergie summen. Die Luft schmeckt metallisch, und Kompasse verlieren bereits kurz nach dem Betreten des Gebiets ihre Zuverlässigkeit. Isolierte Taschen konzentrierter Mana manifestieren sich als flackernde Trugbilder oder lokale Verzerrungen von Klang und Licht. Es wurden keine dauerhaften Behausungen beobachtet, doch Anzeichen früherer Expeditionen – verlassene Lager, zerbrochene Werkzeuge und versengte Lichten – deuten auf sporadische Vorstöße von Schatzsuchern und Gelehrten hin. Längerer Aufenthalt führt bei den Mitarbeitern zu Erschöpfung und Orientierungslosigkeit. #!" #deepl:2193838243
 expedition_location_shattered_spine_sgui: "expedition_location_shattered_spine"
 expedition_location_silverwood_name: "The Silverwood"
 expedition_location_silverwood_desc: ""
 expedition_location_silverwood_flavor: "Scout-Bericht – Das Silberwaldgebiet, Erkundung des Elfengebiets, Expeditionsprotokoll von Ankaris \n \n #lore  Das Blätterdach des Silberwaldes bildet ein lückenloses Gewebe aus ineinander verschlungenen Ästen, das das Sonnenlicht in wechselnde Muster aus Silber und Grün filtert. Die Bäume ragen in außergewöhnliche Höhen empor, ihre Stämme sind mit lebenden Plattformen, Brücken und Behausungen umrankt, die sich so nahtlos in das Laubwerk einfügen, dass sie aus der Ferne kaum zu unterscheiden sind. Die Luft ist schwer vom Duft blühender Reben und trägt eine unterschwellige Strömung strukturierter Naturmagie in sich: Manaströme fließen durch Wurzeln und Äste wie Baumsaft und sind selbst am Waldrand spürbar. Die Tierwelt zeigt ungewöhnliche Gelassenheit gegenüber Erkundungstrupps und beobachtet diese ohne Furcht, als würde sie durch unsichtbare Aufsicht beruhigt. Die Anwesenheit der Elfen ist eher zu erahnen als offensichtlich – gelegentliche Bewegungsblitze hoch in den Ästen, leise Musik im Wind und die subtile Anpassung von Pfaden, die Außenstehende von besonders heiligen Hainen wegführen. Es kam zu keinen feindseligen Handlungen, doch es ist offensichtlich, dass jeder Schritt überwacht wird. #!" #deepl:1919018679
 expedition_location_silverwood_sgui: "expedition_location_silverwood"
 expedition_location_crescent_bay_name: "Crescent Bay Handelsposten" #deepl:906168465
 expedition_location_crescent_bay_desc: ""
 expedition_location_crescent_bay_flavor: "Scout-Bericht – Crescent Bay Trading Post, Erkundung des Handelszentrums, Logbuch der Ankaris-Expedition \n \n #lore  Crescent Bay schmiegt sich an einen bescheidenen Naturhafen, dessen Ufer von Anlegestellen unterschiedlicher Bauart und Qualität gesäumt ist – einige sind robust und gut gepflegt, andere baufällig und offensichtlich nur provisorisch. Die Siedlung selbst besteht aus mehreren, übereinanderliegenden Erweiterungen: ursprüngliche Steinlagerhäuser nahe dem Wasser, dahinter dicht gedrängte spätere Holzkonstruktionen und Segeltuchmarkisen, die sich zu Freiluftmärkten erstrecken. Flaggen, Totems und bemalte Symbole verschiedener Kulturen wehen über den Ständen und zeugen von einer großen Vielfalt an besuchenden Händlern und einheimischen Kunden. Die Atmosphäre ist geschäftig, aber unter Kontrolle; Streitigkeiten werden schnell von neutralen Aufsehern geschlichtet, deren Armbinden und subtile Bindungszauber Respekt einflößen. Magie ist in praktischen Formen präsent – mit Schutzzaubern versehene Schließfächer, temperaturstabilisierte Lagerräume, Übersetzungszauber –, wird aber selten zur Schau gestellt. Die Bewohner zeigen eine geübte Gleichgültigkeit gegenüber Neuankömmlingen und behandeln alle als potenzielle Kunden statt als Bedrohung oder Kuriosität. #!" #deepl:3176239294
 expedition_location_crescent_bay_sgui: "Expeditionsort: Crescent Bay" #deepl:986831799
 expedition_location_ashcrest_ruins_name: "Die Ruinen von Ashcrest" #deepl:1965952850
 expedition_location_ashcrest_ruins_desc: ""
 expedition_location_ashcrest_ruins_flavor: "Erkundungsbericht – Ruinen von Ashcrest, Vermessung der verlassenen Stadt, Expeditionsprotokoll von Ankaris \n \n #lore  Ashcrest liegt auf einem weiten Plateau mit Blick auf ein Tal; seine einst prächtigen Alleen sind heute von vom Wind verwehtem Staub und wuchernder Vegetation überwuchert. Mehrstöckige Steingebäude, von denen viele noch stehen, weisen aufwendige Reliefs und eingelassene Kanäle auf, die auf integrierte magische Systeme hindeuten – die heute in den meisten Fällen ruhen oder zerstört sind. Auf den zentralen Plätzen stehen zerbrochene Obelisken und ausgetrocknete Brunnen, deren Becken schwache Spuren alter Verzauberungen tragen. Die Stille des Ortes ist auffällig; es wurden keine ständigen Bewohner gesichtet, und selbst das Tierleben scheint innerhalb der Stadtgrenzen spärlich zu sein. Messgeräte registrieren eine geringe magische Hintergrundstrahlung, beständig, aber nicht feindselig, als würden Reste der früheren Macht der Stadt weiterhin in die Umgebung sickern. Verstreute persönliche Gegenstände – Keramik, Werkzeuge, Kleidungsfetzen – deuten eher auf eine hastige Flucht als auf einen allmählichen Niedergang hin. #!" #deepl:4055177605
 expedition_location_ashcrest_ruins_sgui: "Expeditionsort: Ashcrest-Ruinen" #deepl:205406364
