 GATE_MAGES_QUALIFICATIONS_DESC: "Nur Bevölkerungsgruppen mit ausreichendem „[concept_literacy]“ können zu „#v “, „$gate_mages$“ und „#!“ werden. Das Potenzial steigt mit mehr „[concept_literacy]“ und „[concept_wealth]“. Bevölkerungsgruppen, deren „[concept_culture]“ auf „[concept_discrimination]“ trifft, benötigen dafür viel mehr Zeit. „#v “, „$aristocrats$“, „#!“ sowie „#v “, „$academics$“ und „#!“ haben es besonders leicht, zu „#v “, „$gate_mages$“ und „#!“ zu werden. Ein „[GetBuildingType('building_gate_magic_academy').GetName]“ und „[concept_building]“ erleichtern zudem die Ausbildung neuer „#v “, „$gate_mages$“ und „#!“." #deepl:2957248348
