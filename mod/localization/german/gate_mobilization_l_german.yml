l_german:
# Groups
 magical_support: "Magische Unterstützung" #deepl:2283461376
 magical_support_desc: "Die Magie, die deine Armee auf das Schlachtfeld bringen kann." #deepl:3611060708
 gate_magic_user_regulation: "Magische Regelung" #deepl:3965815999
 gate_magic_user_regulation_desc: "Unkontrollierte „[concept_gate_magic_users]“ auf dem Schlachtfeld können verheerende Auswirkungen haben, aber auch zu erheblichen zivilen Opfern führen." #deepl:2204960761
# Mobilizations
 mobilization_option_gate_ritual_magic: "Rituelle Magie" #deepl:2231295034
 mobilization_option_gate_ritual_magic_desc: "Geschickte Magier können auf dem Schlachtfeld verheerende Ergebnisse erzielen." #deepl:1886079850
 mobilization_option_gate_healing_circles: "Heilungszirkel" #deepl:3409982344
 mobilization_option_gate_healing_circles_desc: "Ursprünglich für sakrale Rituale entwickelt, hat sich ihr Einsatz auf Kriegsgebiete, Katastrophenhilfe und sogar städtische Kliniken ausgeweitet, was beweist, dass Magie sowohl eine heilende als auch eine zerstörende Kraft sein kann." #deepl:1382523111
 mobilization_option_gate_battlefield_wards: "Schlachtfeld Wards" #deepl:1508708592
 mobilization_option_gate_battlefield_wards_desc: "Die Erschaffung eines Battlefield Wards erfordert einen erfahrenen Magier, der oft von einem Assistenten begleitet wird, um die komplexen Mana-Arrays zu verwalten und sich unter dem Druck des Kampfes zu konzentrieren. Die Schutzwälle selbst sind zwar mächtig, aber nicht uneingeschränkt - intensive Feuerkraft oder anhaltende magische Angriffe können sie überlasten und zu einem plötzlichen Zusammenbruch führen. Dennoch ist ihr strategischer Wert unbestreitbar, da sie ansonsten unhaltbare Positionen in befestigte Festungen verwandeln." #deepl:2899054739
 mobilization_option_gate_scrying: "Taktische Wahrsagerei" #deepl:446820983
 mobilization_option_gate_scrying_desc: "Die taktische Wahrsagung verfeinert diese alte Kunst zu einem Instrument für das Schlachtfeld und ermöglicht es Befehlshabern, mit größerer Geschwindigkeit und Präzision durch Entfernungen, Rauch und Schatten zu blicken. Was einst ein Ritual der verborgenen Augen war, ist zu einem praktischen Mittel der Aufklärung, Zielerfassung und Steuerung des Kriegsgeschehens geworden." #deepl:1332627732
 mobilization_option_gate_no_regulations: "Sanktionierte Zerstörung" #deepl:1076014691
 mobilization_option_gate_no_regulations_desc: "[concept_gate_magic_users] werden unter nur sehr lockerer Aufsicht entfesselt, wobei ihre Macht als Preis für den Sieg hingenommen wird." #deepl:2575681122
 mobilization_option_gate_basic_regulations: "Grundlegende Vorschriften" #deepl:866036724
 mobilization_option_gate_basic_regulations_desc: "[concept_gate_magic_users] Sie stehen im Dienst der Armee, doch ihre Macht wird ausreichend im Zaum gehalten, um eine offene Katastrophe zu verhindern." #deepl:3825241518
 mobilization_option_gate_strict_regulations: "Strenge Vorschriften" #deepl:1398427907
 mobilization_option_gate_strict_regulations_desc: "[concept_gate_magic_users] werden streng überwacht, ihre Macht wird nur unter strengen Auflagen gewährt." #deepl:3240202520
