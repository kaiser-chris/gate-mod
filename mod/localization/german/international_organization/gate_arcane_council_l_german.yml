 sb_gate_arcane_council_forbid_basic_regulations_desc: "Verbieten Sie den Mitgliedern die Nutzung der Websites [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName], [GetMobilizationOption('mobilization_option_gate_basic_regulations').GetName] und [concept_mobilization_option]." #deepl:1353173836
 sb_gate_arcane_council_cancel_regulations: "Aufhebung der Vorschriften für das Schlachtfeld" #deepl:2138714939
 sb_gate_arcane_council_cancel_regulations_desc: "Erlauben Sie den Mitgliedern, die Domains [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName] und [GetMobilizationOption('mobilization_option_gate_basic_regulations').GetName] [concept_mobilization_option] wieder zu nutzen." #deepl:4008094272
