 gate_arcane_council_event_hint: "Eine internationale Regulierung von „[concept_gate_magic]“ durch eine „[concept_gate_arcane_council]“ könnte künftige Vorfälle dieser Art verhindern." #deepl:767825992
 gate_arcane_council.1.t: "Magie aus fremden Ländern, Folgen im eigenen Land" #deepl:2618697781
 gate_arcane_council.1.d: "Ein Besucher von [Concept('concept_gate_magic_users','$concept_gate_magic_user$')] ([TopScope.sC('source_country').GetName]) hat in [TopScope.sS('target_state').GetName] die Kontrolle verloren und [concept_devastation] verursacht. \n \n $gate_arcane_council_event_hint$" #deepl:1275259305
 gate_arcane_council.1.f: "Ein Zauberer aus „[TopScope.sC('source_country').GetNameNoFormatting]“, der sich hier aufhält, hat bei einer Auseinandersetzung mit Einheimischen aus „[GetPlayer.GetAdjectiveNoFormatting]“ die Kontrolle verloren. Die dadurch ausgelöste magische Explosion hat die umliegenden Straßen verwüstet und bereits Unruhe unter Bürgern, Händlern und Verwaltungsbeamten gleichermaßen ausgelöst. Bei unsachgemäßer Handhabung könnte dieser Vorfall sowohl die öffentliche Ordnung im eigenen Land als auch die Beziehungen zu „[TopScope.sC('source_country').GetNameNoFormatting]“ gleichermaßen beeinträchtigen." #deepl:1079261975
 gate_arcane_council.1.a: "Fordern Sie Antworten von [TopScope.sC('source_country').GetNameNoFlag] ein." #deepl:2732754887
 gate_arcane_council.1.b: "Ignoriere den Vorfall." #deepl:1652035745
 gate_arcane_council.1.c: "Konzentrieren wir uns auf den Wiederaufbau." #deepl:38167414
 gate_arcane_council.2.t: "Der Fluch des Fremden" #deepl:4133570612
 gate_arcane_council.2.d: "Ein Druiden-[Concept('concept_gate_magic_users','$concept_gate_magic_user$')]us von [TopScope.sC('source_country').GetName] hat die [GetHarvestConditionType('drought').GetName] [concept_harvest_condition] in [TopScope.sS('target_state').GetName] ausgelöst. \n \n $gate_arcane_council_event_hint$" #deepl:3839380
 gate_arcane_council.2.f: "Es wird vermutet, dass ein Druide aus „[TopScope.sC('source_country').GetNameNoFormatting]“ den Feldern von „[TopScope.sS('target_state').GetNameNoFormatting]“ den Untergang gebracht hat. Felder, die noch vor wenigen Wochen Überfluss versprachen, liegen nun öde und grau da; erste Berichte deuten jedoch darauf hin, dass dies eher das Werk eines einzelnen Fanatikers als eine offizielle staatliche Maßnahme gewesen sein könnte. Dieser Unterschied mag in der Diplomatie von Bedeutung sein, bietet den Bauern jedoch wenig Trost, die zusehen müssen, wie ihre Lebensgrundlage im Boden verdorrt." #deepl:1987967690
 gate_arcane_council.2.a: "Fordern Sie Antworten von [TopScope.sC('source_country').GetNameNoFlag] ein." #deepl:2732754887
 gate_arcane_council.2.b: "Ignoriere den Vorfall." #deepl:1652035745
 gate_arcane_council.2.c: "Wir konzentrieren uns darauf, unseren Landwirten zu helfen." #deepl:2871400520
