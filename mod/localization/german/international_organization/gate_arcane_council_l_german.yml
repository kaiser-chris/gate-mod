l_german:
 io_gate_arcane_council: "Arkaner Rat" #deepl:899135299
 io_gate_arcane_council_reason: "In einer Welt, in der „[concept_gate_magic]“ weit verbreitet ist und mächtige „[concept_gate_magic_users]“ sich frei zwischen den Staaten bewegen können, haben die Nationen erkannt, dass eine Zusammenarbeit notwendig ist. Die „[concept_gate_arcane_council]“ wurde gegründet, um internationale Regeln und Beschränkungen für die Ausübung der Arkanwissenschaften zu koordinieren." #deepl:1916466954
 io_gate_arcane_council_election: "Ein „[concept_gate_arcane_council_high_mage]“ wird für die gesamte Dauer seiner Amtszeit gewählt. Wenn der amtierende „[concept_gate_arcane_council_high_mage]“ in den Ruhestand tritt oder verstirbt, finden Neuwahlen statt. Die „[concept_gate_magic_researcher]“ aller Mitglieds-„[Concept('concept_country','$concept_countries$')]“ sind wählbar. [AddLocalizationIf(GetPlayer.MakeScope.Var('gate_joined_mage_council').IsSet, 'io_gate_arcane_council_election_involved')]" #deepl:272868124
 io_gate_arcane_council_election_involved: "\n \n Unser „[concept_gate_magic_researcher]“ hat eine Wahlbewertung von #tooltippable  #tooltip: [GetRawTextTooltipTag('io_gate_arcane_council_election_score_tooltip')] [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v] #! #! und wir werden wahrscheinlich [GetPlayer.GetCustom('gate_arcane_council_election_indicator')] bei der nächsten Wahl." #deepl:2891667291
 io_gate_arcane_council_election_indicator_loss: "#r  #! verlieren" #deepl:3926816450
 io_gate_arcane_council_election_indicator_win: "#g  Win#!" #deepl:3291145026
 io_gate_arcane_council_election_score_tooltip: "Die Gesamtpunktzahl unserer „[concept_gate_magic_researcher]“-Wahl auf [concept_gate_arcane_council_high_mage] lautet [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v], und zwar aufgrund von:#indent_newline:3 \n [GetPlayer.MakeScope.GetScriptValueDesc('gate_arcane_council_election_score')] #!" #deepl:2154648864
 io_gate_arcane_council_status_election: "Die Organisation wählt derzeit ihren neuen Vorsitzenden ([concept_gate_arcane_council_high_mage])." #deepl:2521965666
 io_gate_arcane_council_leader_title: "Hoher Magier" #deepl:3032438028
 io_gate_arcane_council_leader_tooltip: "#header  [concept_gate_arcane_council_high_mage] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] #! \n [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] „[JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetName]“ ist die aktuelle Website [concept_gate_arcane_council_high_mage] der Organisation „[concept_gate_arcane_council]“. \n \n Sie haben eine Wahlbewertung von [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.MakeScope.ScriptValue('gate_arcane_council_election_score')|v] und werden wahrscheinlich [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetCustom('gate_arcane_council_election_indicator')] bei der nächsten Wahl." #deepl:175225360
