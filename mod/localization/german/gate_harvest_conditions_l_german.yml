l_german:
 gate_mana_storm: "Mana-Sturm" #deepl:1883620151
 gate_mana_storm_desc: "$gate_mana_storm$ ist ein „[concept_gate_magical_phenomena]“. \n \n Der Himmel brodelt vor unnatürlicher Energie, während wildes Mana die Atmosphäre durchflutet und chaotische Wetterphänomene auslöst. Gewitter knistern vor arkanen Blitzen, Winde heulen mit unheimlichem Dröhnen, und der Regen schimmert in schwachen magischen Farbtönen. Unvorhersehbar und unberechenbar formt ein Manasturm das Land neu und hinterlässt eine Mischung aus Ehrfurcht und Verwüstung." #deepl:516216347
 gate_mana_bloom: "Mana-Blüte" #deepl:1564168140
 gate_mana_bloom_desc: "$gate_mana_bloom$ ist ein „[concept_gate_magical_phenomena]“. \n \n Eine Welle grünen Manas durchströmt die Region und erfüllt das Land mit unnatürlicher Lebenskraft. Pflanzen wachsen rasend schnell, Felder bringen reiche Ernten hervor, und die wilde Flora gedeiht in lebhafter Fülle. Doch das Phänomen ist flüchtig; seine Magie schwindet so schnell, wie sie gekommen ist, und hinterlässt nur ein leises Flüstern von einer verzauberten Ernte." #deepl:917763974
 gate_monster_attack: "Monster-Angriffe" #deepl:2502313577
 gate_monster_attack_desc: "$gate_monster_attack$ ist ein „[concept_gate_magical_phenomena]“. \n \n Monsterangriffe durch mutierte Pflanzen oder Tiere aufgrund erhöhter „[concept_gate_mana_density]“." #deepl:729855230
 gate_monster_horde: "Monsterhorden" #deepl:477795905
 gate_monster_horde_desc: "$gate_monster_horde$ ist ein „[concept_gate_magical_phenomena]“. \n \n Monsterangriffe durch mutierte Pflanzen oder Tiere aufgrund erhöhter „[concept_gate_mana_density]“." #deepl:1728702157
 gate_mana_condensation: "Mana-Kondensation" #deepl:846666364
 gate_mana_condensation_desc: "$gate_mana_condensation$ ist ein „[concept_gate_magical_phenomena]“. \n \n $gate_mana_condensation$ führt zu hohen Manakonzentrationen. Während die meisten Menschen von hohen Manakonzentrationen profitieren, leiden einige unter starkem Fieber oder sterben sogar." #deepl:3938896842
