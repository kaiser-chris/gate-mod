 je_gate_harmony_pledge: "$gate_harmony_pledge$" #deepl:1767427134
 je_gate_harmony_pledge_reason: "In den Ländern der Gnome ist Harmonie kein Zufall, sondern das Ergebnis bewusster Gestaltung. Das Harmonie-Gelöbnis, das von Außenstehenden oft als sanfte Philosophie missverstanden wird, ist in Wahrheit ein sorgfältig ausgearbeitetes Konzept: ein Geflecht aus Gesetzen, Bräuchen und stillen Korrekturen, das dazu dient, ein Volk von grenzenlosen Extremen zu zügeln. \n \n Unkontrolliert stürzen sich Gnome entweder in Glanz oder Ruin, in Genusssucht oder Strenge, in Einheit oder herrliches Chaos. Das Gelübde leugnet diese Natur nicht; es lenkt sie. Institutionen geben Anstöße, Traditionen bieten Halt, und jedes Dekret verschiebt das empfindliche Gleichgewicht, auf dem die Gesellschaft ruht. \n \n Doch das Gleichgewicht ist niemals von Dauer. Plötzliche Leidenschaften, neue Ideen oder unvorhergesehene Krisen können die Waage augenblicklich kippen lassen. Und so beobachten die Gnome sich selbst ebenso genau wie sie die Welt beobachten, passen sich ständig an, korrigieren ständig und stellen sicher, dass ihre Exzesse ihre Stärke nähren, anstatt ihren Untergang." #deepl:4236478007
