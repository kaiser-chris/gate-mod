l_german:
# Events
 gate_pelly.1.t: "Kaltblütiger Mord" #deepl:1602546968
 gate_pelly.1.d: "In „[TopScope.sS('murder_state').GetName]“ hat sich ein ungewöhnlicher Mordfall ereignet. Ein Doppelgänger von [TopScope.sCha('clone').GetPrimaryRoleTitle] [TopScope.sCha('clone').GetFullName] wurde erschossen aufgefunden. Die Ähnlichkeit im Aussehen ist mehr als unheimlich. Der Schütze ist weiterhin unbekannt und auf freiem Fuß." #deepl:648320810
 gate_pelly.1.f: "Ein Zeuge berichtete, der Schütze habe einen Trenchcoat und einen Hut getragen. Er glaubt, der Schütze müsse krank gewesen sein, da die wenigen sichtbaren Hautstellen einen grünlichen Schimmer aufwiesen. Er berichtete außerdem, der Schütze könnte Ausländer sein, da er hörte, wie dieser nach dem Mord an dem Opfer einen seltsamen Satz aussprach." #deepl:1637002757
 gate_pelly.1.a: "Seltsam." #deepl:3250626623
 gate_pelly.2.t: "Mörder auf der Flucht" #deepl:1753045682
 gate_pelly.2.d: "Nach langwierigen Ermittlungen gelang es unseren Beamten, das Versteck des Mörders ausfindig zu machen, doch er floh, bevor die Polizei ihn festnehmen konnte. Die Ermittler fanden in dem Versteck eine herausgerissene Tagebuchseite." #deepl:795823668
 gate_pelly.2.f: "„Der Regen war so freundlich, den Lärm zu übertönen. Ich trug den Hut, um so gesehen zu werden, wie ich gesehen werden wollte, obwohl die Nacht mich ohnehin erkannt hätte. Die Zigarette zuckte nur einmal, bevor ich sie ausgehen ließ. Es gab keinen Grund, sie zu Ende zu rauchen. Das Auto kam, als es kam, langsam und unachtsam, und ich trat aus der Dunkelheit hervor, so kühl wie der Revolver in meiner Hand. \n \n Drei Schüsse. \n \n Der Knall war klarer, als ich erwartet hatte. Der Körper auf der Straße sah aus wie Ford, und das ist der Teil, der mich immer noch amüsiert. Ein Mann mag sich in einem Festsaal am anderen Ende der Stadt verstecken, aber ein Gesicht wie dieses lässt sich kopieren, und zwar schlecht. Dennoch war der auf der Straße derjenige, wegen dem ich gekommen war. \n \n Als ich sicher war, dass er den Löffel abgegeben hatte, tat ich es ihm gleich.\n \n – Wiedergefundene Tagebuchseite, signiert mit „P.“" #deepl:1722889360
 gate_pelly.2.a: "Seltsam." #deepl:3250626623
 gate_pelly.3.t: "Der Mörder floh ins Ausland" #deepl:295570707
 gate_pelly.3.d: "Unsere Ermittler konnten den Aufenthaltsort des Verdächtigen ausfindig machen, doch er entkam. Er scheint das Land verlassen zu haben und wie vom Erdboden verschluckt zu sein." #deepl:4261509167
 gate_pelly.3.f: "„Der Verdächtige wurde ausfindig gemacht, konnte jedoch nicht festgenommen werden. Während des Versuchs, sich ihm zu nähern, entkam er, indem er eine unüberwindbare Distanz übersprang, die jenseits aller bekannten menschlichen Fähigkeiten liegt. Angesichts dieser übermenschlichen Bewegung kommen die Ermittler zu dem Schluss, dass es sich bei der Person wahrscheinlich um einen Zauberer irgendeiner Art handelte. Er ist inzwischen aus dem Land geflohen und gilt nun als außer Reichweite.“\n \n – Auszug aus der Akte 1.13.5 LS" #deepl:3085779159
 gate_pelly.3.a: "Wenigstens ist es vorbei." #deepl:2486173353
