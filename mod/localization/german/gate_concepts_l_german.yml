l_german:
 concept_gate_planet: "$gate_planet$" #deepl:3800007297
 concept_gate_planet_desc: "Ankaris, ein Reich ungezähmter Magie und uralter Wunder, ist eine Welt, in der hoch aufragende Berge Zwergenhallen wiegen, grüne Wälder Elfenkönigreiche beherbergen und endlose Ebenen vom Aufeinanderprallen orkischer Kriegsbanden widerhallen. Hinter ihrer Schönheit verbirgt sich eine turbulente Geschichte, die von den wilden Strömungen des Manas geprägt wurde, einer Kraft, die ihre Völker und Landschaften sowohl in Harmonie als auch in Konflikt miteinander verbindet." #deepl:315355017
 concept_gate_magic_knowledge: "Arkanes Wissen" #deepl:1484082450
 concept_gate_magic_knowledge_desc: "$concept_gate_magic_knowledge$ ist eine Sammlung von Technologien, die nicht direkt erforscht werden können, sondern nur durch die Erforschung der Magie selbst mit deinem „[concept_gate_magic_researcher]“ erworben werden können. \n \n Diese Technologien sind: \n• [GetTechnology('gate_magic_understanding_production').GetName] \n• [GetTechnology('gate_magic_understanding_society').GetName] \n• [GetTechnology('gate_magic_understanding_military').GetName]" #deepl:3297141748
 concept_gate_mana_saturation: "Mana-Sättigung" #deepl:1203188312
 concept_gate_mana_saturation_desc: "Die Manasättigung ist der weltweite Durchschnitts[concept_gate_mana_density]." #deepl:3945304303
 concept_gate_magic_innovation: "Magische Innovation" #deepl:2673158403
 concept_gate_magic_innovation_desc: "@magic_innovation! $concept_gate_magic_innovation$ wird hauptsächlich über unsere „[concept_gate_magic_researcher]“ und die „[GetBuildingType('building_gate_magic_research_institute').GetName]“ erstellt. Auch die „[GetBuildingType('building_gate_alxa').GetName]“, „[GetBuildingType('building_gate_mage_tower').GetName]“, „[GetBuildingType('building_gate_magic_academy').GetName]“ und „[GetBuildingType('building_university').GetName]“ sowie „$concept_buildings$“ können zu unserer monatlichen magischen Innovationsgenerierung beitragen." #deepl:854759800
 concept_gate_magic_technology: "Magische Technologie" #deepl:2743819916
 concept_gate_magic_technologies: "Magische Technologien" #deepl:3081127401
 concept_gate_magic_technology_desc: "$concept_gate_magic_technology$ umfasst alle magischen Innovationen in den Bereichen $PRODUCTION_NO_CONCEPT$, $MILITARY$ und $SOCIETY$. $concept_gate_magic_technologies$ haben landesweite Auswirkungen, die von der Änderung der [Concept('concept_country','$concept_country_possessive$')] Betriebsparameter über [Concept('concept_modifier','$concept_modifiers$')] bis hin zur Erschließung neuer [Concept('concept_production_method','$concept_production_methods$')], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')], [Concept('concept_decree','$concept_decrees$')] und [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')] reichen können. \n \n Durch [concept_gate_magic_innovation] werden Fortschritte in Richtung neuer $concept_gate_magic_technologies$ erzielt. \n \n Der Umfang der Fortschritte, die in einem $concept_gate_magic_technology$ erforderlich sind, um diese zu erlangen, hängt von dessen [Concept('concept_technology_era','$concept_technology_era_short$')] ab. $concept_technology_era_ahead_of_time_penalty_desc$" #deepl:1500424236
 concept_gate_monster_attack: "Monster-Angriff" #deepl:3876006220
 concept_gate_monster_attacks: "Monster-Angriffe" #deepl:2502313577
 concept_gate_monster_attack_desc: "Ab einer mittleren Menge an „[concept_gate_mana_density]“ können sich die örtliche Fauna und Flora verändern und Zivilisten angreifen." #deepl:429299991
 concept_gate_monster_horde: "Monsterhorden" #deepl:477795905
 concept_gate_monster_hordes: "Monsterhorden" #deepl:183185344
 concept_gate_monster_horde_desc: "Bereits bei einer mittleren Menge von „[concept_gate_mana_density]“ können sich die einheimische Fauna und Flora in großer Zahl mutieren und Zivilisten brutal angreifen." #deepl:284662572
 concept_gate_mana_density: "Mana-Dichte" #deepl:906003755
 concept_gate_mana_density_mana: "Mana" #deepl:479230379
 concept_gate_mana_density_desc: "Seit sich die „Magic Gates“ geöffnet haben, strömt Mana auf die Erde. Durch den Einsatz von „[concept_gate_magic_knowledge]“ auf der Erde hat sich die Mana-Menge in der Atmosphäre weiter erhöht. Sollte die „$concept_gate_mana_density$“ in einem Gebiet ihr Maximum erreichen, wird „[concept_gate_magical_phenomena]“ zur Normalität werden. Bis dahin führen unterschiedliche Stufen der „$concept_gate_mana_density$“ in einem Gebiet zu unvorhersehbaren Veränderungen und Ereignissen. \n \n #header  Mana-Dichte-Stufen: #! \n• Niedrige Mana-Dichte beginnt bei #v  [GuiScope.ScriptValue('gate_low_mana_density_threshhold')] % #! \n• Mittlere Mana-Dichte beginnt bei #v  [GuiScope.ScriptValue('gate_medium_mana_density_threshhold')] % #! \n• Hohe Mana-Dichte beginnt bei #v  [GuiScope.ScriptValue('gate_high_mana_density_threshhold')] % #!" #deepl:3832376332
 concept_gate_magical_phenomena: "Magische Phänomene" #deepl:2882996657
 concept_gate_magical_phenomena_desc: "Magische Phänomene sind Ereignisse, die durch die erhöhte „[concept_gate_mana_density]“ in einem Zustand ausgelöst werden. Sie reichen von harmlos über nützlich bis hin zu furchterregend." #deepl:949228577
 concept_gate_magic_researcher: "Arkanist" #deepl:3183248554
 concept_gate_magic_researchers: "Arkanisten" #deepl:1992873455
 concept_gate_magic_researcher_desc: "Der Arkanist eines Landes leitet die „[GetBuildingType('building_gate_magic_research_institute').GetName]“ und lenkt deren „[concept_gate_magic_innovation]“. Er leitet die „[Concept('concept_gate_project','$concept_gate_projects$')]“ und unterstützt uns dabei, die magischen Industriezweige sowie den Einsatz von Magie in der Gesellschaft zu verbessern." #deepl:2808374269
 concept_gate_character_experience: "Charakter-Erfahrung" #deepl:356262571
 concept_gate_character_experience_desc: "Bestimmte Charaktere, wie beispielsweise unser „[concept_gate_magic_researcher]“, können bei ihrer Arbeit Erfahrungspunkte sammeln. Charaktere mit höheren Stufen sind in ihrem Beruf besser und steigern die Ergebnisse ihrer täglichen Arbeit. \n \n #header  Erfahrungsstufen: #! \n• $gg_character_experience_novice$ \n• $gg_character_experience_experienced$ \n• $gg_character_experience_master$" #deepl:3344800389
 concept_gate_magic: "Magie" #deepl:4074079286
 concept_gate_magic_desc: "Magie ist der Vorgang, bei dem Mana in eine Wirkung auf die Welt umgewandelt wird. Sie wird von den „[concept_gate_magic_users]“ genutzt, um wundersame, aber auch verheerende Effekte zu erzielen." #deepl:2137113481
 concept_gate_magic_user: "Zauberer" #deepl:1834431947
 concept_gate_magic_users: "Zauberer" #deepl:3672284924
 concept_gate_magic_users_desc: "Zauberer sind [Concept('concept_pop','$concept_pops$')], die in ihrem Alltag arkane Kräfte einsetzen. \n \n #header  Pops: #! \n• [GetPopType('gate_mages').GetName] \n• [GetPopType('gate_druids').GetName]" #deepl:1290617508
 concept_gate_magic_ethic: "Arkane Domäne" #deepl:2675000318
 concept_gate_magic_ethics: "Arkane Domänen" #deepl:3260934101
 concept_gate_magic_ethic_desc: "$concept_gate_magic_ethics$ sind ein entscheidender Modifikator für „[concept_country]“. \n Sie geben an, wie ein Land Magie einsetzen will." #deepl:1925093941
 concept_gate_mbudye_council: "Mbudye-Rat" #deepl:2965223500
 concept_gate_mbudye_council_desc: "Der Rat der Weisen ($concept_gate_mbudye_council$) bildet das Herzstück der historischen und spirituellen Identität der Lunda. Er setzt sich aus weisen Männern und Frauen zusammen, die als Hüter heiliger Traditionen, Deuter politischer Grundsätze und Bewahrer des Ahnengedächtnisses fungieren. Angesichts der Bemühungen des Arcturianischen Dominions, den „Goldenen Segen“ zu verbreiten, war der Rat sowohl ein Bollwerk des Widerstands als auch eine Brücke für den Dialog. Im Gleichgewicht zwischen dem Gewicht der Geschichte und dem Druck des Wandels navigieren die Mbudye durch eine turbulente Ära, in der Glaube und Macht miteinander verflochten sind." #deepl:3814700067
 concept_gate_bambudye: "Bambudye" #deepl:2074760867
 concept_gate_bambudye_desc: "Die Bambudye, eine Geheimgesellschaft, die aus der Widerstandsfähigkeit der Lunda hervorgegangen ist, operiert im Verborgenen und widersetzt sich der Herrschaft des Arkturianischen Dominions. Verwurzelt in uralten Traditionen, verbinden sie Mystik mit gerissener Strategie und kämpfen für die Bewahrung der Autonomie und kulturellen Identität ihres Volkes. Für die Unterdrückten sind sie Symbole der Hoffnung und der Rebellion; für die Elfen sind sie schwer fassbare Aufständische, die Chaos in eine zerbrechliche Ordnung säen. Ihr Einfluss sitzt tief, sie flüstern in gedämpften Tönen, eine ständige Erinnerung daran, dass der Geist der Lunda nicht leicht zu unterdrücken ist." #deepl:3149600512
 concept_gate_vampirism: "Vampirismus" #deepl:2028021353
 concept_gate_vampirism_desc: "Als dunkler Bund zwischen Blut und Macht bietet der Vampirismus ewiges Leben zu einem bestimmten Preis. Diejenigen, die sich dem Fluch hingeben, erlangen unnatürliche Stärke, geschärfte Sinne und einen Durst, der sie an die Schatten bindet. In den Adern der Betroffenen verflechten sich Mana und Hunger und formen Wesen, die sowohl gefürchtet als auch verehrt werden. Wer sich den Vampirismus zu eigen macht, wird zu einem [GetCulture('vampire').GetName]." #deepl:3120825910
 concept_gate_ley_line: "Ley-Linie" #deepl:910137709
 concept_gate_ley_lines: "Ley-Linien" #deepl:2253266362
 concept_gate_ley_lines_desc: "Für die meisten unsichtbar, aber für das Arkane von entscheidender Bedeutung, sind Ley-Linien Ströme von rohem Mana, die unter dem Land fließen. Wo sie zusammenlaufen, strömt das Mana in die Höhe, verwandelt die Regionen in mächtige magische Hotspots und verstärkt alle Zaubersprüche in der Nähe." #deepl:910414221
 concept_gate_mana_well: "Mana-Brunnen" #deepl:2373238792
 concept_gate_mana_well_desc: "Ein Mana-Brunnen ist eine Anzapfstelle auf [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]. Mana-Brunnen können eine fast unbegrenzte Menge an $gate_mana$ produzieren. \n\nSie können aber zu #v Instabilität#! in der lokalen [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')] führen, was zu #v Unfällen#! führen kann." #deepl:972959992
 concept_gate_expedition: "Expedition nach $gate_planet$" #deepl:3102698085
 concept_gate_expedition_desc: "Wenn wir die Kontrolle über eine [GetBuildingType('building_gate_alxa').GetName] haben und unsere Kontrolle über sie mit [GetTechnology('gate_expeditions').GetName] entwickelt haben, können wir eine Expedition zu [concept_gate_planet] starten." #deepl:1393633916
 concept_gate_expedition_location: "Ort der Expedition" #deepl:921117409
 concept_gate_expedition_location_desc: "" #TODO
 concept_gate_expedition_leader: "Expeditionsleiter" #deepl:1154052499
 concept_gate_expedition_leaders: "Expeditionsleiter" #deepl:1758522193
 concept_gate_expedition_leader_desc: "Der Leiter unserer [concept_gate_expedition]. Abhängig von unserem Anführer können wir verschiedene [concept_gate_expedition_activities] auf [concept_gate_planet] tun. \n\nEs gibt drei Arten von Anführern:\n- [concept_gate_expedition_leader_militarist]\n- [concept_gate_expedition_leader_politician]\n- [concept_gate_expedition_leader_industrialist]" #deepl:412098600
 concept_gate_expedition_leader_militarist: "Militaristisch" #deepl:3870761686
 concept_gate_expedition_leader_militarist_desc: "Eine $concept_gate_expedition_leader_militarist$ ist darauf ausgerichtet, die Menschen auf [concept_gate_planet] mit Gewalt zu kontrollieren." #deepl:3667884153
 concept_gate_expedition_leader_politician: "Politiker" #deepl:61234762
 concept_gate_expedition_leader_politician_desc: "A $concept_gate_expedition_leader_politician$ ist darauf ausgerichtet, diplomatische Beziehungen zu den Menschen auf [concept_gate_planet] aufzubauen." #deepl:3956538534
 concept_gate_expedition_leader_industrialist: "Industrieller" #deepl:1917081893
 concept_gate_expedition_leader_industrialist_desc: "Eine $concept_gate_expedition_leader_industrialist$ konzentriert sich auf die Entwicklung neuer Handelsrouten mit den Menschen auf [concept_gate_planet]." #deepl:3904451690
 concept_gate_expedition_budget: "Expedition Haushalt" #deepl:909302767
 concept_gate_expedition_budget_desc: "Die $concept_gate_expedition_budget$ wird verwendet, um neue [concept_gate_expedition_activities] auf [concept_gate_planet] zu starten. Wenn er abläuft, wird unser [concept_gate_expedition] beendet." #deepl:885277883
 concept_gate_expedition_activity: "Expedition Aktivität" #deepl:3789000274
 concept_gate_expedition_activities: "Expedition Aktivitäten" #deepl:3770752768
 concept_gate_expedition_activities_desc: "Jede Interaktion auf der Website [concept_gate_expedition_map] wird als [Concept('concept_gate_expedition_activities','$concept_gate_expedition_activity$')] betrachtet." #deepl:2580773096
 concept_gate_expedition_map: "Expeditionskarte" #deepl:98968531
 concept_gate_expedition_map_desc: "Die $concept_gate_expedition_map$ muss Stück für Stück durch Erkundung aufgedeckt werden. Die Karte selbst ist zwischen mehreren Expeditionen konstant." #deepl:722099874
 concept_gate_project: "Arcanist Project"
 concept_gate_projects: "Arcanist Projects"
 concept_gate_project_desc: "Unter der Leitung der besten Magieexperten unseres Landes werden in den Arkanistenprojekten arkane Theorien in praktische Innovationen umgesetzt. Diese gezielten Forschungsanstrengungen bringen magische Verbesserungen hervor, die die Industrie, die Gesellschaft und die Infrastruktur verbessern und den Weg in eine zauberhaftere Zukunft ebnen." #deepl:1406830406
 concept_gate_magic_country: "Arkanes Land" #deepl:2403103397
 concept_gate_magic_countries: "Arkane Länder" #deepl:2611929564
 concept_gate_magic_country_desc: "Länder, die „[concept_gate_magic_knowledge]“ erworben haben." #deepl:1929486853
 concept_gate_arcane_council: "$io_gate_arcane_council$" #deepl:1295515093
 concept_gate_arcane_council_desc: "Die Organisation für die Regulierung des Weltraumverkehrs ($io_gate_arcane_council$) ist eine Organisation zur Regulierung und Beschränkung des Weltraumverkehrs ([concept_gate_magic_users]). Ihr vorrangiges Ziel ist es, internationale Zwischenfälle zu verhindern, und sie wird von einem Generalsekretär ([concept_gate_arcane_council_high_mage]) geleitet." #deepl:3641084166
 concept_gate_arcane_council_high_mage: "$io_gate_arcane_council_leader_title$" #deepl:2352763780
 concept_gate_arcane_council_high_mage_desc: "Der Rat der Europäischen Union ($io_gate_arcane_council_leader_title$) leitet die Europäische Kommission ([concept_gate_arcane_council]) [concept_com_international_organization]. Die Mitglieder werden aus allen Mitgliedsländern gewählt [Concept('concept_gate_magic_researcher','$concept_gate_magic_researchers$')]." #deepl:139972148
