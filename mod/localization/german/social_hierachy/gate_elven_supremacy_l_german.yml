l_german:
 gate_elven_supremacy: "$elven$ Vorherrschaft" #deepl:3321457681
 gate_elven_supremacy_desc: "Die Vorherrschaft der Elfen setzt eine strenge gesellschaftliche Ordnung durch, in der die Elfen ein unanfechtbares Monopol auf Macht, Prestige und Magie besitzen. Andere Ethnien sind in das gesellschaftliche Gefüge eingebunden, aber auf untere Ränge beschränkt und von Positionen wie Geistlichen, Aristokraten oder Magieanwendern ausgeschlossen. Dieses System, das im Glauben an die angeborene Überlegenheit der Elfen verwurzelt ist, sichert die Vorherrschaft der Elfen und beutet gleichzeitig die Arbeitskraft und die Fähigkeiten der anderen aus." #deepl:4168647767
 gate_elven_supremacy_trigger_desc: "Jeder wird vom System beherrscht" #deepl:2639333999
