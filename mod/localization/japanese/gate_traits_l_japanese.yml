 gate_arcanist_magic_voice_desc: "This character has scorched his throat through the repeated invocation of forbidden formulae. In return, every word they utter carries unnatural resonance, making their spells easier to shape and their commands harder to ignore."
 gate_arcanist_bound_name: "Seal-Bound Name"
 gate_arcanist_bound_name_desc: "This character has sealed away part of their true name to protect themself from hostile [concept_gate_magic]. This grants resistance to curses, compulsions, and summoning rites, but leaves them socially diminished, as if some essential part of their identity can no longer fully reach others."
