l_japanese:
 gate_mana_storm: "Mana Storm"
 gate_mana_storm_desc: "$gate_mana_storm$ is a [concept_gate_magical_phenomena].\n\nThe skies churn with an unnatural energy as wild mana floods the atmosphere, unleashing chaotic weather patterns. Thunderstorms crackle with arcane lightning, winds howl with an eerie resonance, and rain shimmers with faint magical hues. Unpredictable and volatile, a Mana Storm reshapes the land in its wake, leaving awe and devastation intertwined."
 gate_mana_bloom: "Mana Bloom"
 gate_mana_bloom_desc: "$gate_mana_bloom$ is a [concept_gate_magical_phenomena].\n\nA surge of green mana suffuses the region, invigorating the land with unnatural vitality. Plants grow at an accelerated rate, fields yield bountiful harvests, and wild flora thrives in vibrant abundance. Yet, the phenomenon is fleeting, its magic fading as swiftly as it came, leaving behind whispers of an enchanted harvest."
 gate_monster_attack: "Monster Attacks"
 gate_monster_attack_desc: "$gate_monster_attack$ is a [concept_gate_magical_phenomena].\n\nMonster attacks from mutated flora or fauna through increased [concept_gate_mana_density]."
 gate_monster_horde: "Monster Horde"
 gate_monster_horde_desc: "$gate_monster_horde$ is a [concept_gate_magical_phenomena].\n\nMonster attacks from mutated flora or fauna through increased [concept_gate_mana_density]."
 gate_mana_condensation: "Mana Condensation"
 gate_mana_condensation_desc: "$gate_mana_condensation$ is a [concept_gate_magical_phenomena].\n\n$gate_mana_condensation$ leads to high mana concentrations. While most of the population receives a boost from high mana concentrations, some experience strong fever or even death."