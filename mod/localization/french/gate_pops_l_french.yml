l_french:
# Mages
 gate_mages: "@gate_mages! $gate_mages_no_icon$"
 gate_mages_only_icon: "@gate_mages!"
 gate_mages_no_icon: "Mages"
 gate_mages_desc: "Educated [concept_gate_magic_users] that are often from the wealthy elite. Their political interests are most often represented by the [GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameWithCountryVariant]."
 GATE_MAGES_QUALIFICATIONS_DESC: "Only pops with adequate [concept_literacy] can become #v $gate_mages$#!. Potential increases with greater [concept_literacy] and [concept_wealth]. Pops whose [concept_culture] faces [concept_discrimination] take a much longer time. #v $aristocrats$#! and #v $academics$#! have a particularly easy time becoming #v $gate_mages$#!. A [GetBuildingType('building_gate_magic_academy').GetName] [concept_building] will make training new #v $gate_mages$#! easier as well."
 gate_mages_qualifications_academy: "from our [GetBuildingType('building_gate_magic_academy').GetName]"
 pop_gate_mages: "$gate_mages$ [concept_profession]"
 building_employment_gate_mages_add: "$gate_mages$ Per Level"
 building_employment_gate_mages_add_desc: "Modifies the amount of $gate_mages$ a building can hire per level"
 building_employment_gate_mages_mult: "$building_employment_gate_mages_add$"
 building_employment_gate_mages_mult_desc: "$building_employment_gate_mages_add_desc$"
 building_gate_mages_shares_add: "$gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_add_desc: "An increase or decrease in an $gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_mult: "$gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_mult_desc: "An increase or decrease in an $gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_mortality_mult: "$state_gate_mages_mortality_mult$"
 building_gate_mages_mortality_mult_desc: "$state_gate_mages_mortality_mult_desc$"
 building_gate_mages_fertility_mult: "[Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')] of $gate_mages$"
 building_gate_mages_fertility_mult_desc: "An increase or decrease in the [Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')] of $gate_mages$"
 state_gate_mages_dependent_wage_mult: "$gate_mages$ Dependents Income"
 state_gate_mages_dependent_wage_mult_desc: "An increase or decrease in an $gate_mages$ Dependents Income"
 state_gate_mages_mortality_mult: "[Concept('concept_pop_growth', '$concept_pop_growth_mortality$')] of $gate_mages$"
 state_gate_mages_mortality_mult_desc: "An increase or decrease in the [Concept('concept_pop_growth', '$concept_pop_growth_mortality$')] of $gate_mages$"
 state_gate_mages_investment_pool_contribution_add: "$gate_mages$ [concept_investment_pool] contribution"
 state_gate_mages_investment_pool_contribution_add_desc: "How much of their profits $gate_mages$ will invest"
 state_gate_mages_investment_pool_efficiency_mult: "$gate_mages$ [concept_investment_pool] contribution efficiency"
 state_gate_mages_investment_pool_efficiency_mult_desc: "An increase or decrease to how much the invested profits from $gate_mages$ will contribute to the [concept_investment_pool]"
 country_gate_mages_pol_str_mult: "[concept_political_strength] of $gate_mages$"
 country_gate_mages_pol_str_mult_desc: "An increase or decrease in the [concept_political_strength] of $gate_mages$"
 country_gate_mages_voting_power_add: "[concept_political_strength] from the [concept_votes] of $gate_mages$"
 country_gate_mages_voting_power_add_desc: "An increase or decrease to amount of [concept_political_strength] gained from the [concept_votes] of $gate_mages$ in Elections"
