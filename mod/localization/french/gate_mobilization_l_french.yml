l_french:
# Groups
 magical_support: "Magical Support"
 magical_support_desc: "The magic your Army can bring to the battlefield."
 gate_magic_user_regulation: "Magic Regulation"
 gate_magic_user_regulation_desc: "Unregulated [concept_gate_magic_users] on the battlefield can have devastating impact, but also lead to major civilian losses."
# Mobilizations
 mobilization_option_gate_ritual_magic: "Ritual Magic"
 mobilization_option_gate_ritual_magic_desc: "Skilled mages can provide devastating results on the battlefield."
 mobilization_option_gate_healing_circles: "Healing Circles"
 mobilization_option_gate_healing_circles_desc: "Originally developed in sacred rituals, their use has expanded to warzones, disaster relief efforts, and even urban clinics, proving that magic can be as much a force for healing as for destruction."
 mobilization_option_gate_battlefield_wards: "Battlefield Wards"
 mobilization_option_gate_battlefield_wards_desc: "The creation of a Battlefield Ward requires a skilled mage, often accompanied by an assistant to manage the complex mana arrays and maintain focus under the pressures of combat. The wards themselves, though powerful, are not without limitations—intense firepower or sustained magical assault can overload them, causing sudden collapse. Still, their strategic value is undeniable, turning otherwise untenable positions into fortified strongholds."
 mobilization_option_gate_scrying: "Tactical Scrying"
 mobilization_option_gate_scrying_desc: "Tactical Scrying refines the old art into a battlefield instrument, allowing commanders to peer through distance, smoke, and shadow with greater speed and precision. What was once a ritual of hidden eyes has become a practical means of scouting, targeting, and controlling the flow of war."
 mobilization_option_gate_no_regulations: "Sanctioned Devastation"
 mobilization_option_gate_no_regulations_desc: "[concept_gate_magic_users] are unleashed with only the loosest oversight, their power accepted as the price of victory."
 mobilization_option_gate_basic_regulations: "Basic Regulations"
 mobilization_option_gate_basic_regulations_desc: "[concept_gate_magic_users] serve the army, but their power is kept under enough control to prevent open catastrophe."
 mobilization_option_gate_strict_regulations: "Strict Regulations"
 mobilization_option_gate_strict_regulations_desc: "[concept_gate_magic_users] are watched closely, their power permitted only under severe restraint."