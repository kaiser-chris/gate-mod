l_korean:
# Combat Unit Groups
 combat_unit_group_gate_magic_infantry: "비전 보병"
 combat_unit_group_gate_magic_infantry_desc: "군대의 중추입니다. 이 용감한 청년들은 조국을 위해 싸웁니다."
 combat_unit_group_gate_magic_artillery: "비전 포병"
 combat_unit_group_gate_magic_artillery_desc: "멀리서 적 진지를 공격해 혼란과 파괴를 초래합니다."
 combat_unit_group_gate_creatures: "생물"
 combat_unit_group_gate_creatures_desc: "전장에서 큰 혼란을 일으킬 수 있는 기이하고 강력한 야수들입니다."
# Combat Unit
 combat_unit_type_gate_mage_infantry: "마법 보병"
 combat_unit_type_gate_mage_infantry_desc: "구식 기사들이 마법사들을 호위합니다. 그들은 강력한 일격을 날릴 수 있지만, 현대식 무기와 전술로는 그들을 상대할 수 있습니다."
 combat_unit_type_gate_arcane_vangard: "비전 선봉대"
 combat_unit_type_gate_arcane_vangard_desc: "방어 마법으로 강화된 전방 부대로, 소형 화기의 사격을 막아내고 적의 마법 공격을 약화시킬 수 있습니다. 돌격을 주도하거나 방어선을 견고히 지키는 데 이상적입니다."
 combat_unit_type_gate_mana_rifle_infantry: "마나 소총 보병"
 combat_unit_type_gate_mana_rifle_infantry_desc: "마나 코어로 강화된 소총을 장비한 일반 보병으로, 사거리가 늘어나고 마법 및 기계 계열 적에 대한 관통력이 향상되었습니다."
 combat_unit_type_gate_wraithwalkers: "레이스워커"
 combat_unit_type_gate_wraithwalkers_desc: "그림자 마법이 가미된 경보병으로, 일시적인 투명화와 거의 소리가 나지 않는 이동이 가능해 정찰 및 매복 전술에 탁월합니다."
 combat_unit_type_gate_rune_guard_infantry: "룬 수호 보병"
 combat_unit_type_gate_rune_guard_infantry_desc: "방어용 룬이 새겨진 중장갑 부대로, 물리적 공격과 마법 공격 모두에 대한 내성을 갖추고 있어 방어 진지나 완만한 진군에 이상적입니다."
 combat_unit_type_gate_thaumaturgic_commandos: "비전 특공대"
 combat_unit_type_gate_thaumaturgic_commandos_desc: "전투와 주문술을 모두 훈련받은 정예 부대로, 파괴공작 임무를 수행하거나 짧은 거리를 순간이동하고, 전장 전체에 영향을 미치는 마법 부여를 사용할 수 있습니다."
 combat_unit_type_gate_mage_artillery: "마법 포병"
 combat_unit_type_gate_mage_artillery_desc: "전장에 막대한 파괴를 일으키는 의식을 시전하도록 특별히 훈련받은 마법사들입니다."
 combat_unit_type_gate_mana_artillery: "마나 포병"
 combat_unit_type_gate_mana_artillery_desc: "마나 포병은 마법이 부여된 대포의 힘을 활용해 원시 마나가 주입된 포탄을 발사합니다. 이 포탄은 충돌과 동시에 비전 에너지를 폭발시키며, 전통적인 장갑을 우회하고 적 전열에 큰 혼란과 피해를 입힙니다. 이는 마법 장인기술과 산업적 화력을 결합한 병기입니다."
 gate_combat_unit_type_dragon_spawn: "용의 자식"
 gate_combat_unit_type_dragon_spawn_desc: "미완성"
