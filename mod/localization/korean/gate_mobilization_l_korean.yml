l_korean:
# Groups
 magical_support: "마법 지원"
 magical_support_desc: "전장에서 군대가 활용할 수 있는 마법적 지원."
 gate_magic_user_regulation: "마법 규제"
 gate_magic_user_regulation_desc: "규제되지 않은 [concept_gate_magic_users]는 전장에서 파괴적인 영향을 미칠 수 있지만, 막대한 민간인 피해를 초래하기도 합니다."
# Mobilizations
 mobilization_option_gate_ritual_magic: "의식 마법"
 mobilization_option_gate_ritual_magic_desc: "숙련된 마법사는 전장에서 엄청난 위력을 발휘할 수 있습니다."
 mobilization_option_gate_healing_circles: "치유 모임"
 mobilization_option_gate_healing_circles_desc: "본래 신성한 의식에서 발전한 이들의 활용은 전장과 재난 구호 활동, 심지어 도시 진료소로까지 확대되었으며, 마법이 파괴만큼이나 치유의 힘이 될 수 있음을 입증하고 있습니다."
 mobilization_option_gate_battlefield_wards: "전장 수호대"
 mobilization_option_gate_battlefield_wards_desc: "전장 결계를 생성하려면 숙련된 마법사가 필요하며, 복잡한 마나 배열을 관리하고 전투의 압박 속에서도 집중을 유지하기 위해 보조자가 동행하는 경우가 많습니다. 결계 자체는 강력하지만 한계가 없는 것은 아닙니다. 강력한 화력이나 지속적인 마법 공격은 결계를 과부하시켜 갑작스러운 붕괴를 일으킬 수 있습니다. 그럼에도 그 전략적 가치는 부정할 수 없으며, 본래 유지하기 어려웠을 진지를 요새화된 거점으로 바꾸어 놓습니다."
 mobilization_option_gate_scrying: "전술적 점술"
 mobilization_option_gate_scrying_desc: "전술 원격시는 오래된 기술을 전장 도구로 정련한 것으로, 지휘관들이 거리와 연기, 그림자를 넘어 더 빠르고 정확하게 상황을 꿰뚫어 볼 수 있게 합니다. 한때 숨겨진 눈의 의식이었던 것은 이제 정찰과 표적 지정, 전장의 흐름 통제를 위한 실용적 수단이 되었습니다."
 mobilization_option_gate_no_regulations: "제재로 인한 참상"
 mobilization_option_gate_no_regulations_desc: "[concept_gate_magic_users]들은 가장 느슨한 감독만을 받은 채 전장에 투입되며, 그들의 힘은 승리를 위한 대가로 받아들여집니다."
 mobilization_option_gate_basic_regulations: "기본 규정"
 mobilization_option_gate_basic_regulations_desc: "[concept_gate_magic_users]들은 군에 복무하지만, 그들의 힘은 공개적인 재앙을 막을 수 있을 정도로 통제됩니다."
 mobilization_option_gate_strict_regulations: "엄격한 규정"
 mobilization_option_gate_strict_regulations_desc: "[concept_gate_magic_users]들은 엄격한 감시를 받으며, 그들의 힘은 강한 제약 아래에서만 허용됩니다."
