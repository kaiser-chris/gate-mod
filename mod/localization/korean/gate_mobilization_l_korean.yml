l_korean:
# Groups
 magical_support: "마법 지원"
 magical_support_desc: "전장에서 군대가 활용할 수 있는 마법적 지원."
 gate_magic_user_regulation: "마법 규제" #deepl:3965815999
 gate_magic_user_regulation_desc: "전장에서 통제되지 않은 비살상 무기([concept_gate_magic_users])는 치명적인 영향을 미칠 뿐만 아니라, 민간인 사상자도 대량으로 발생시킬 수 있다." #deepl:2204960761
# Mobilizations
 mobilization_option_gate_ritual_magic: "의식 마법"
 mobilization_option_gate_ritual_magic_desc: "숙련된 마법사들은 전장에서 치명적인 결과를 만들어낼 수 있습니다."
 mobilization_option_gate_healing_circles: "치유의 원"
 mobilization_option_gate_healing_circles_desc: "본래 신성한 의식에서 개발된 치유의 원은 전쟁터, 재난 구호 활동, 심지어 도심 의료 시설에서도 활용되며, 마법이 파괴뿐만 아니라 치유의 힘도 가질 수 있음을 증명합니다."
 mobilization_option_gate_battlefield_wards: "전장 방어막"
 mobilization_option_gate_battlefield_wards_desc: "전장 방어막을 생성하려면 숙련된 마법사가 필요하며, 보조자가 함께 마나 배열을 관리하고 전투 속에서도 집중력을 유지해야 합니다. 강력한 효과를 지닌 방호막이지만, 강력한 화력이나 지속적인 마법 공격을 받으면 과부하로 인해 갑자기 붕괴될 수 있습니다. 그럼에도 불구하고 방호막의 전략적 가치는 명백하여, 불리한 전장을 요새로 바꿀 수 있습니다."
 mobilization_option_gate_scrying: "전술적 점술" #deepl:446820983
 mobilization_option_gate_scrying_desc: "전술적 점술은 이 고대의 기술을 전장에서 활용할 수 있는 도구로 발전시켜, 지휘관들이 더 빠르고 정확하게 먼 거리나 연기와 그림자 너머를 꿰뚫어 볼 수 있게 해준다. 한때는 신비로운 의식에 불과했던 것이 이제는 정찰과 표적 선정, 그리고 전쟁의 흐름을 주도하는 실질적인 수단이 되었다." #deepl:1332627732
 mobilization_option_gate_no_regulations: "제재로 인한 참상" #deepl:1076014691
 mobilization_option_gate_no_regulations_desc: "[concept_gate_magic_users] 극히 형식적인 감독 하에 그들에게 재갈이 풀리고, 그들의 권력은 승리를 위한 대가로 용인된다." #deepl:2575681122
 mobilization_option_gate_basic_regulations: "기본 규정" #deepl:866036724
 mobilization_option_gate_basic_regulations_desc: "[concept_gate_magic_users] 군대에 복무하지만, 그들의 권력은 명백한 재앙을 막을 수 있을 만큼 충분히 통제되고 있다." #deepl:3825241518
 mobilization_option_gate_strict_regulations: "엄격한 규정" #deepl:1398427907
 mobilization_option_gate_strict_regulations_desc: "[concept_gate_magic_users] 엄격한 통제 하에서만 권한이 허용되며, 그들의 일거수일투족이 면밀히 감시받고 있다." #deepl:3240202520
