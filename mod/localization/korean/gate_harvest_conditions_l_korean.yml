l_korean:
 gate_mana_storm: "마나 폭풍"
 gate_mana_storm_desc: "$gate_mana_storm$은 [concept_gate_magical_phenomena]이다.\n\n야생의 마나가 대기 중으로 밀려들면서 하늘은 부자연스러운 에너지로 요동치고, 혼돈스러운 기상 패턴을 터뜨립니다. 뇌우는 비전 번개로 갈라지고, 바람은 기묘한 울림과 함께 울부짖으며, 빗줄기는 희미한 마법의 색조로 반짝입니다. 예측할 수 없고 불안정한 마나 폭풍은 지나간 자리에 대지를 뒤바꾸며, 경외와 파괴를 함께 남깁니다."
 gate_mana_bloom: "마나 개화"
 gate_mana_bloom_desc: "$gate_mana_bloom$은 [concept_gate_magical_phenomena]이다.\n\n녹색 마나의 파동이 지역 전체를 뒤덮으며, 부자연스러울 정도의 생명력으로 대지를 활성화합니다. 식물은 폭발적인 속도로 자라나고, 들판은 풍성한 수확을 내며, 야생 식생은 눈부신 번성 속에 무성하게 퍼져 나갑니다. 그러나 이 현상은 오래가지 않습니다. 그 마법은 찾아왔을 때만큼이나 빠르게 사라지며, 마치 마법에 축복받은 수확의 속삭임만을 남긴 채 흔적 없이 흩어집니다."
 gate_monster_attack: "괴물 습격"
 gate_monster_attack_desc: "$gate_monster_attack$은 [concept_gate_magical_phenomena]이다.\n\n증가한 [concept_gate_mana_density]로 인해 변이한 동식물들이 일으키는 괴물 습격 현상입니다."
 gate_monster_horde: "괴물 대군세"
 gate_monster_horde_desc: "$gate_monster_horde$는 [concept_gate_magical_phenomena]이다.\n\n증가한 [concept_gate_mana_density]로 인해 변이한 동식물들이 일으키는 대규모 괴물 습격 현상이다."
 gate_mana_condensation: "마나 응축"
 gate_mana_condensation_desc: "$gate_mana_condensation$은 [concept_gate_magical_phenomena]이다.\n\n$gate_mana_condensation$은 높은 마나 농도를 초래한다. 인구 대부분은 높은 마나 농도로 인해 활력을 얻지만, 일부는 심한 열병을 앓거나 심지어 사망하기도 한다."