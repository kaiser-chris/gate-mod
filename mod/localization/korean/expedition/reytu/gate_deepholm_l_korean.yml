l_korean:
# General
 expedition_location_deephold_name: "딥홀드 성채"
 expedition_location_deephold_desc: "딥홀드 성채는 레이투에 위치한 드워프의 거점입니다."
 expedition_location_deephold_flavor: "안카리스 원정 기록 – 딥홀드 드워프 성채 정찰 보고서, 지하 접근 평가\n\n#lore 딥홀드의 주 출입구는 깎아지른 산비탈에 새겨져 있으며, 접근하는 움직임에 반응해 은은히 빛나는 각진 룬이 새겨진 거대한 기둥들이 그 입구를 둘러싸고 있다. 넓은 경사로는 대지 아래로 내려가며, 마차와 대상 행렬이 오갈 수 있도록 정교하게 설계되어 있고, 양옆의 벽감에는 희미한 생기를 띤 눈빛을 번뜩이는 석상 수호자들이 자리하고 있다. 상층 회랑 내부의 암반은 정밀한 기하학적 무늬로 다듬어져 있으며, 아치형 천장은 빛과 공기의 통로를 겸하는 조각 기둥들이 떠받치고 있다. 주변 마나는 집중되고 질서정연하게 정돈되어 은은한 조명과 기계 장치, 즉 승강기와 관문, 교통 통제 체계로 흘러 들어간다. 이는 이들이 마법을 과시가 아니라 공학 속에 통합하는 문화를 지녔음을 시사한다. 드워프 보초병들은 접근 지점을 엄격히 통제하며, 무기를 손에 둔 채 뽑지는 않고 모든 방문자를 절도 있게 주시한다. 초기 접촉은 간결하지만 정중한 대화로 이루어졌으며, 교역 절차와 상호 이익을 분명히 중시하고 있다.#!"
 expedition_location_deephold_sgui: "expedition_location_deephold"
# Action Selection
 gate_expedition_reytu_deepholm.1.title: "딥홀드 성채"
 gate_expedition_reytu_deepholm.1.st: "$gate_expedition_interaction_category$"
 gate_expedition_reytu_deepholm.1.a: "무역로를 개설하라"
 gate_expedition_reytu_deepholm.1.b: "성채를 정복하라."
 gate_expedition_reytu_deepholm.1.c: "외교 공관 및 대사관을 설립하라."
 gate_expedition_reytu_deepholm.1.d: "신경쓰지 마라."
# Trade Route
 gate_expedition_reytu_deepholm.trade_route: "딥홀드 성채 - 무역로"
 gate_expedition_reytu_deepholm.2.desc: "미완성"
 gate_expedition_reytu_deepholm.2.flavor: "장인 정신에 대한 진정한 관심을 지닌 상인들이 이끄는 원정대의 교역 사절단은, 착취가 아닌 교류의 의도를 담아 지구 기원의 재료들과 인간 제조 기술의 견본을 소박한 선물로 가져왔다. 드워프 무역 평의회는 이를 예의 바른 우호 제스처이자, 안카리스에서는 구할 수 없는 새로운 자원에 접근할 기회로 받아들이고 있다."
 gate_expedition_reytu_deepholm.2.a: "좋다."
 gate_expedition_reytu_deepholm.3.desc: "미완성"
 gate_expedition_reytu_deepholm.3.flavor: "원정대의 교역 사절단은 드워프들이 \"우월한\" 인간 기술을 위해 기꺼이 자원을 제공할 것이라 오만하게 가정한 채 딥홀드에 접근했다. 그들이 제시한 거래 조건은 의도적으로 저평가되어 있었으며, 원정대는 자신들의 군사적 우위와 이 행성에서의 신참 세력이라는 위치를 협상 압박 수단으로 활용하려 했다. 드워프 지도층은 이를 모욕적이고 착취적인 태도로 받아들이고 있다."
 gate_expedition_reytu_deepholm.3.a: "성가신 드워프놈들."
