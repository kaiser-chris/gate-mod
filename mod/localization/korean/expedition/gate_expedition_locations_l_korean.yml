# Placeholder
 expedition_location_gate_name: "지구로 통하는 문"
 expedition_location_gate_desc: "우리가 통과한 마법의 문. 지구로 돌아가는 연결고리입니다."
 expedition_location_gate_flavor: "Expedition Log – 관문 외곽, 안카리스 측\n\n#lore 우리는 마침내 관문을 통과했다. 처음으로 우리 발이 안카리스의 땅을 밟는다—이제는 우리 것인. 공기에는 오래된 연기와 잔류 마력이 짙게 깔려 있다. 아치 너머에는 야전 진영의 해골 같은 잔해가 놓여 있다. 무너진 천막, 부서진 보급 상자, 산산이 조각난 마법 배터리. 적의 문장은 녹슨 갑옷과 불에 그을린 깃발에 새겨져 있으나, 시신은 없다. 이곳에서 무슨 일이 벌어졌든, 도망으로 끝났거나—그보다 더 나쁜 결말이었을 것이다. 땅은 침묵한다. 정찰병도, 초병도, 심지어 시체를 쫓는 짐승도 없다. 오직 바람만이 움직이며, 속이 빈 구조물 사이를 휘돌고 재를 유령처럼 날린다. 관문은 확보했지만, 이 고요함은 불안하다. 우리는 이제 문턱을 지켰다—하지만 안카리스는 우리를 지켜보고 있다.#!"
 expedition_location_village_name: "마을"
 expedition_location_village_desc: "작은 [concept_gate_planet] 마을입니다. 그들과 어떻게 상호작용할까요?"
 expedition_location_village_flavor: "정찰 보고서 – 마을 예비 평가, 안카리스 탐사 기록\n\n#lore 마을은 자연 지형 속에 조용히 파묻혀 있으며, 주변 환경과 거의 하나가 된 듯 자연스럽게 어우러져 있다. 경작지와 이국적인 가축들로 보아 대부분 자급자족하는 것으로 보이며, 그 생물들은 우리 학자들에게 낯선 존재들이다. 건물은 낮고 실용적인 형태를 띠며, 많은 구조물이 주변 마나에 희미하게 반응하는 유기물로 보강되어 있다. 주민들은 아직 우리에게 접근하지 않았지만, 지붕과 나무 사이에 걸린 반투명한 마법 장막 뒤에서 우리를 지켜보고 있다. 마을 전역에 미약한 마법 흔적이 감지되며, 집중된 형태가 아닌 넓게 퍼진 양상이다. 이는 이들이 땅과 깊은 연관을 맺고 있거나, 극도로 경계하고 있음을 시사한다. 현재까지 직접적인 접촉은 이루어지지 않았다. 추가 관찰이 권장된다.#!"
 expedition_location_castle_name: "요새"
 expedition_location_castle_desc: "[concept_gate_planet] 성입니다. 어떻게 상호작용할까요?"
 expedition_location_castle_flavor: "정찰 보고서 – 요새 거점, 안카리스 탐사 기록\n\n#lore 우리 선발대는 인근 평야를 내려다보는 낮은 능선 위에 세워진, 잘 관리된 성채를 발견했다. 이 요새는 현재 완전히 점령되어 있으며 상태도 매우 양호하다. 석조 구조물은 매끈하고, 성벽은 깨끗하며, 우리의 문장학으로는 알 수 없는 상징이 새긴 깃발이 새롭게 게양되어 있다. 주변은 정기적인 순찰과 질서 있는 유지 관리의 흔적이 뚜렷하며, 성 외곽에는 작은 마을이 형성되어 주둔 병력이나 영주의 궁정을 보조하는 역할을 하는 것으로 보인다. 갈등이나 불안의 조짐은 전혀 없으며, 오히려 이 지역은 안정과 질서가 강하게 느껴진다. 중앙 탑 꼭대기에는 유리로 된 돔 형태의 첨탑이 있고, 밤이 되면 은은한 마법의 빛을 내뿜는다. 이는 마법 고문이나 보호 마법이 존재한다는 신호일 수 있다. 이 성은 아마도 지역 권력자의 거처일 가능성이 높으며, 외교적 접근에 있어 중요한 거점이 될 수 있다.#!"
 expedition_location_town_name: "도시"
 expedition_location_town_desc: "[concept_gate_planet] 도시입니다. 이들과 어떻게 상호작용할까요?"
 expedition_location_town_flavor: "정찰 보고서 – 미확인 도시 정착지, 안카리스 탐사 기록\n\n#lore 초기 정찰 결과, 얕은 계곡 안에 자리 잡은 상당 규모의 정착지가 확인되었다. 이곳은 층층이 쌓인 석벽과 현지 광물로 보강된 목책으로 둘러싸여 있다. 계단식 경작지, 풍력 방앗간, 여러 개의 고지 감시초소로 보아 자급자족이 가능한 구조로 보인다. 지금까지 지나쳐 온 작은 마을들과 달리, 이 도시는 뚜렷한 계획과 질서가 엿보인다. 넓은 도로, 구획된 지구들, 그리고 밤이면 희미한 마법의 빛을 내는 중앙 첨탑이 그 증거다. 성문 근처에서는 인원이 움직이는 모습이 관찰되며, 주민들은 경계는 하지만 노골적인 적대감은 보이지 않는다. 성벽 곳곳에는 여러 깃발이 걸려 있으나, 그 의미는 아직 파악되지 않았다. 현재까지 직접적인 접촉은 이루어지지 않았지만, 이 도시의 규모와 구조로 미루어 보아 지역 무역의 거점이거나 심지어는 지방 권력의 중심일 가능성도 있다.#!"


 expedition_location_kaelmont_harbor_name: "켈몬트 항구" #deepl:1260914929
 expedition_location_kaelmont_harbor_desc: ""
 expedition_location_kaelmont_harbor_flavor: "정찰 보고서 – 켈몬트 항구, 예비 해안 평가, 안카리스 원정대 일지 \n \n #lore  도시는 자연적으로 형성된 깊은 만을 따라 계단식 지형으로 솟아 있으며, 돌로 된 부두와 나무 선착장이 보호된 만의 곡선을 따라 빽빽하게 늘어서 있다. 최근 수리된 방어벽에는 공성 무기와 마법 공격으로 인한 것으로 보이는 그을음 자국과 충격으로 인한 균열이 남아 있다. 항구를 오가는 선박의 흐름은 여전히 꾸준하다. 돛을 단 배와 마법으로 강화된 선박들이 숙련된 리듬으로 드나들고 있어, 최근의 분쟁에도 불구하고 무역이 재개되었음을 시사한다. 이곳의 건축 양식은 튼튼한 석조 기단에 목조 상층부를 얹은 형태를 선호하며, 일부 건물은 해질녘에 희미하게 빛나는 룬 문양으로 보강되어 있다. 도시의 질서는 안정된 듯 보인다. 순찰대는 규율을 잘 지키고 있으며, 항만 관리들은 체계적이고 효율적으로 검사를 수행한다. 외부인에 대한 태도는 조심스럽지만 적대적이지는 않다. 몇몇 부두 노동자들을 관찰해 본 결과, 기본적인 거래 이상의 대화를 나누려는 사람은 거의 없었다. #!" #deepl:2898752998
 expedition_location_kaelmont_harbor_sgui: "탐사지_카엘몬트 항구" #deepl:3205318893
 expedition_location_shadowfen_marshes_name: "섀도우펜 습지" #deepl:3322250556
 expedition_location_shadowfen_marshes_desc: ""
 expedition_location_shadowfen_marshes_flavor: "정찰 보고서 – 섀도우펜 습지, 구 고블린 야영지 조사, 안카리스 원정대 일지 \n \n #lore  이 습지는 썩은 물이 고인 수로와 갈대가 우거진 웅덩이로 이루어진 낮은 분지를 가로질러 펼쳐져 있으며, 끝없는 안개에 뒤덮여 있다. 조잡한 목재와 뼈로 만들어진 폐허가 된 울타리들이 진흙탕에서 불규칙한 간격으로 솟아나와 있는데, 이는 이제 진흙에 반쯤 잠겨버린 거대한 요새의 잔해들이다. 새겨진 나무와 이빨, 녹슨 금속으로 만든 부적들이 죽은 나뭇가지에 매달려 있는데, 그중 다수는 훈련받지 않은 감각으로도 감지할 수 있는 불안정한 샤먼의 기운을 여전히 뿜어내고 있다. 땅은 위험천만하다. 보이지 않는 싱크홀과 타락한 마나의 소용돌이가 이동을 어렵게 만들고, 사람과 짐승 모두를 옭아매려 위협한다. 가끔 반딧불이 같은 빛 알갱이들이 수면 위로 떠다니다가, 오래된 의식 장소 근처에서 더 밝게 빛나다가 사라진다. 조직화된 고블린의 존재는 감지되지 않았으나, 발자국과 흔적은 청소 동물들과 아마도 고립된 생존자들의 존재를 시사한다. 마법 지원과 특수 장비가 없이는 장시간 탐사를 권장하지 않는다. 이 지역은 위험 지역으로 분류되므로 극도의 주의를 기울여 접근해야 한다. #!" #deepl:3716168922
 expedition_location_shadowfen_marshes_sgui: "탐사 지역: 섀도우펜 습지" #deepl:2886152630
 expedition_location_thornhaven_name: "손헤이븐 도서관" #deepl:2889098929
 expedition_location_thornhaven_desc: ""
 expedition_location_thornhaven_flavor: "정찰 보고서 – 쏜헤이븐 도서관, 학문의 요새 관측, 안카리스 원정대 일지 \n \n #lore  쏜헤이븐은 바위투성이 언덕의 정상에 우뚝 솟아 있으며, 외벽이 자연석과 어우러져 이음매 없는 방어막을 형성하고 있다. 이 복합 단지는 요새와 수도원의 특성을 모두 지니고 있다. 좁은 창문, 보강된 성문, 그리고 회랑으로 둘러싸인 안쪽으로 향한 안뜰이 눈에 띈다. 슬레이트 지붕으로 덮인 탑들에는 관측소와, 아마도 신비한 실험실이 자리 잡고 있다. 구조화된 마나의 미묘한 광선이 때때로 하늘을 향해 솟아올랐다가 사라지곤 한다. 시야가 닿는 범위 내에서, 로브를 두른 인물들이 성벽과 테라스를 따라 차분하면서도 단호한 걸음으로 이동하며, 간격마다 도서관 깃발과 동일한 문장을 새긴 갑옷을 입은 무장 시종들이 호위하고 있다. 주변의 마기는 만연하지만 엄격히 통제되고 있다. 문과 창문, 심지어 산책로까지 보호 마법이 겹겹이 깔려 있어 보안과 격리에 큰 중점을 두고 있음을 암시한다. 적극적인 적대감은 보이지 않지만, 처음 접근을 시도했을 때는 정중하면서도 거리감 있는 반응과 함께 경계를 존중해 달라는 분명한 기대가 느껴졌다. #!" #deepl:3827972942
 expedition_location_thornhaven_sgui: "탐사 지역: 쏜헤이븐" #deepl:1547988032
 expedition_location_shattered_spine_name: "부러진 척추" #deepl:2368636830
 expedition_location_shattered_spine_desc: ""
 expedition_location_shattered_spine_flavor: "정찰 보고서 – 산산조각 난 등뼈, 이상 지형 조사, 안카리스 탐사 일지 \n \n #lore  ‘산산조각 난 등뼈’는 마치 땅 자체가 거대한 힘에 맞아 산산조각 난 듯, 부서진 산등성이와 수정 같은 암석 덩어리들이 뾰족뾰족한 띠를 이루며 지평선 너머로 뻗어 있다. 암석 지형은 도저히 있을 수 없는 각도로 뒤틀려 있으며, 때로는 중력을 거스르듯 공중에 떠 있는 듯 보이기도 하는데, 이는 보이지 않는 에너지에 의해 제자리에 고정되어 있는 듯하다. 식생은 드물고 뒤틀려 있다. 검게 그을린 나무들은 희미한 인광을 뿜어내고, 강인한 관목들은 잔여 에너지가 윙윙거리는 유리 같은 가시를 지니고 있다. 공기는 금속성 맛이 나며, 진입 지점에서 불과 짧은 거리만 떨어져도 나침반은 신뢰성을 잃는다. 고립된 마나 집중 지점들은 흔들리는 신기루나 소리와 빛의 국지적 왜곡으로 나타난다. 영구적인 거주 흔적은 발견되지 않았으나, 버려진 야영지, 부서진 도구, 그을린 개간지 등 과거 탐험의 흔적들은 보물 사냥꾼과 학자들의 간헐적인 침입을 암시한다. 장시간 노출 시 인원들에게 피로와 방향 감각 상실을 유발한다. #!" #deepl:2193838243
 expedition_location_shattered_spine_sgui: "탐사 지역: 산산조각 난 척추" #deepl:1883865606
 expedition_location_silverwood_name: "실버우드" #deepl:2345942143
 expedition_location_silverwood_desc: ""
 expedition_location_silverwood_flavor: "정찰 보고서 – 실버우드, 엘프 영토 정찰, 안카리스 원정대 일지 \n \n #lore  실버우드의 숲 천장은 서로 얽힌 나뭇가지들이 끊김 없이 이어지는 태피스트리를 이루며, 햇빛을 걸러내어 은빛과 초록빛이 어우러진 변화무쌍한 무늬를 만들어 낸다. 나무들은 상상을 초월하는 높이로 솟아 있으며, 그 줄기에는 살아있는 발판과 다리, 주거지가 얽혀 있어 잎사귀와 너무나도 자연스럽게 어우러져 멀리서 보면 거의 구별이 되지 않는다. 공기는 꽃피는 덩굴의 향기로 무겁고, 체계적인 자연 마법의 기류가 감돌고 있다. 마나의 흐름이 수액처럼 뿌리와 가지를 통해 흐르며, 숲 가장자리에서도 그 기운을 느낄 수 있다. 야생 동물들은 정찰대를 마주해도 특이할 정도로 침착하며, 마치 보이지 않는 보호자의 시선이 안심시켜 주는 듯 두려움 없이 지켜보고 있다. 엘프의 존재는 노골적이기보다는 암시적으로 느껴진다. 나뭇가지 높은 곳에서 가끔 엿보이는 움직임, 바람에 실려 오는 희미한 음악, 그리고 외부인을 특히 신성한 숲에서 멀리 이끄는 길의 미묘한 변화 등이 그것이다. 적대적인 행동은 없었지만, 매 걸음이 감시받고 있음은 분명하다. #!" #deepl:1919018679
 expedition_location_silverwood_sgui: "탐험지_실버우드" #deepl:1309102118
 expedition_location_crescent_bay_name: "크레센트 베이 트레이딩 포스트" #deepl:906168465
 expedition_location_crescent_bay_desc: ""
 expedition_location_crescent_bay_flavor: "정찰 보고서 – 크레센트 베이 교역소, 상업 중심지 조사, 안카리스 탐사 일지 \n \n #lore  크레센트 베이는 소박한 자연 항구를 감싸고 있으며, 해안선에는 구조와 품질이 제각각인 부두들이 늘어서 있다. 어떤 것은 튼튼하고 잘 관리된 반면, 다른 것들은 허름하고 명백히 임시로 지어진 것들이다. 정착지 자체는 층층이 확장된 구조로 이루어져 있다. 물가 근처에는 원래 있던 석조 창고들이 있고, 그 뒤로는 나중에 지어진 목조 건물들이 밀집해 있으며, 캔버스 차양이 펼쳐져 야외 시장을 이루고 있다. 노점 위로는 다양한 문화권의 깃발, 토템, 그리고 그림 문양들이 펄럭이며, 이곳을 찾는 상인과 지역 주민들의 폭넓은 다양성을 보여준다. 분위기는 분주하지만 질서 정연하며, 팔찌와 은은한 결속 마법으로 존경을 받는 중립적인 관리인들이 분쟁을 신속하게 중재한다. 마법은 실용적인 형태로 존재한다—보호 주문이 걸린 금고, 온도 조절 저장 시설, 번역 주문 등—하지만 과시되지는 않는다. 주민들은 이방인들에게 숙련된 무관심을 보이며, 그들을 위협이나 호기심의 대상이 아닌 잠재적 고객으로 대한다. #!" #deepl:3176239294
 expedition_location_crescent_bay_sgui: "탐사 지역: 크레센트 베이" #deepl:986831799
 expedition_location_ashcrest_ruins_name: "애쉬크레스트 유적지" #deepl:1965952850
 expedition_location_ashcrest_ruins_desc: ""
 expedition_location_ashcrest_ruins_flavor: "정찰 보고서 – 애쉬크레스트 유적, 버려진 도시 조사, 안카리스 탐사 일지 \n \n #lore  애쉬크레스트는 계곡이 내려다보이는 넓은 고원에 자리 잡고 있으며, 한때 웅장했던 대로들은 이제 바람에 날린 먼지와 무성하게 자란 초목으로 뒤덮여 있다. 다층 석조 건축물 중 상당수는 여전히 서 있으며, 정교한 부조와 매립된 수로들이 통합된 마법 시스템을 암시하고 있다. 다만 대부분은 현재 휴면 상태이거나 파손된 상태다. 중앙 광장에는 금이 간 오벨리스크와 마른 분수대가 있는데, 분수대 바닥에는 옛 마법의 희미한 잔재가 남아 있다. 이곳의 고요함은 놀라울 정도다. 상주하는 주민은 발견되지 않았으며, 도시 경계 내에서는 동물들의 흔적조차 드물다. 측정 장비들은 낮은 수준의 마법 배경 방사선을 감지한다. 이는 꾸준하지만 적대적이지 않은데, 마치 도시의 과거 힘이 여전히 환경으로 스며들고 있는 듯하다. 흩어져 있는 개인 소지품들—도자기, 도구, 옷 조각들—은 점진적인 쇠퇴보다는 급작스러운 탈출을 암시한다. #!" #deepl:4055177605
 expedition_location_ashcrest_ruins_sgui: "탐사 지역: 애쉬크레스트 유적지" #deepl:205406364
