l_korean:
 expedition_location_tooltip: "#header [Scope.Var('type').Var('name').GetFlagName]#!\n[Scope.Var('type').Var('desc').GetFlagName]\n$TOOLTIP_DELIMITER$\n[Scope.Var('type').Var('flavor').GetFlagName]"
 expedition_location_gate_name: "지구로 통하는 문"
 expedition_location_gate_desc: "우리가 통과한 마법의 문. 지구로 돌아가는 연결고리입니다."
 expedition_location_gate_flavor: "Expedition Log – 관문 외곽, 안카리스 측\n\n#lore 우리는 마침내 관문을 통과했다. 처음으로 우리 발이 안카리스의 땅을 밟는다—이제는 우리 것인. 공기에는 오래된 연기와 잔류 마력이 짙게 깔려 있다. 아치 너머에는 야전 진영의 해골 같은 잔해가 놓여 있다. 무너진 천막, 부서진 보급 상자, 산산이 조각난 마법 배터리. 적의 문장은 녹슨 갑옷과 불에 그을린 깃발에 새겨져 있으나, 시신은 없다. 이곳에서 무슨 일이 벌어졌든, 도망으로 끝났거나—그보다 더 나쁜 결말이었을 것이다. 땅은 침묵한다. 정찰병도, 초병도, 심지어 시체를 쫓는 짐승도 없다. 오직 바람만이 움직이며, 속이 빈 구조물 사이를 휘돌고 재를 유령처럼 날린다. 관문은 확보했지만, 이 고요함은 불안하다. 우리는 이제 문턱을 지켰다—하지만 안카리스는 우리를 지켜보고 있다.#!"
 expedition_location_village_name: "마을"
 expedition_location_village_desc: "작은 [concept_gate_planet] 마을입니다. 그들과 어떻게 상호작용할까요?"
 expedition_location_village_flavor: "정찰 보고서 – 마을 예비 평가, 안카리스 탐사 기록\n\n#lore 마을은 자연 지형 속에 조용히 파묻혀 있으며, 주변 환경과 거의 하나가 된 듯 자연스럽게 어우러져 있다. 경작지와 이국적인 가축들로 보아 대부분 자급자족하는 것으로 보이며, 그 생물들은 우리 학자들에게 낯선 존재들이다. 건물은 낮고 실용적인 형태를 띠며, 많은 구조물이 주변 마나에 희미하게 반응하는 유기물로 보강되어 있다. 주민들은 아직 우리에게 접근하지 않았지만, 지붕과 나무 사이에 걸린 반투명한 마법 장막 뒤에서 우리를 지켜보고 있다. 마을 전역에 미약한 마법 흔적이 감지되며, 집중된 형태가 아닌 넓게 퍼진 양상이다. 이는 이들이 땅과 깊은 연관을 맺고 있거나, 극도로 경계하고 있음을 시사한다. 현재까지 직접적인 접촉은 이루어지지 않았다. 추가 관찰이 권장된다.#!"
 expedition_location_castle_name: "요새"
 expedition_location_castle_desc: "[concept_gate_planet] 성입니다. 어떻게 상호작용할까요?"
 expedition_location_castle_flavor: "정찰 보고서 – 요새 거점, 안카리스 탐사 기록\n\n#lore 우리 선발대는 인근 평야를 내려다보는 낮은 능선 위에 세워진, 잘 관리된 성채를 발견했다. 이 요새는 현재 완전히 점령되어 있으며 상태도 매우 양호하다. 석조 구조물은 매끈하고, 성벽은 깨끗하며, 우리의 문장학으로는 알 수 없는 상징이 새긴 깃발이 새롭게 게양되어 있다. 주변은 정기적인 순찰과 질서 있는 유지 관리의 흔적이 뚜렷하며, 성 외곽에는 작은 마을이 형성되어 주둔 병력이나 영주의 궁정을 보조하는 역할을 하는 것으로 보인다. 갈등이나 불안의 조짐은 전혀 없으며, 오히려 이 지역은 안정과 질서가 강하게 느껴진다. 중앙 탑 꼭대기에는 유리로 된 돔 형태의 첨탑이 있고, 밤이 되면 은은한 마법의 빛을 내뿜는다. 이는 마법 고문이나 보호 마법이 존재한다는 신호일 수 있다. 이 성은 아마도 지역 권력자의 거처일 가능성이 높으며, 외교적 접근에 있어 중요한 거점이 될 수 있다.#!"
 expedition_location_town_name: "도시"
 expedition_location_town_desc: "[concept_gate_planet] 도시입니다. 이들과 어떻게 상호작용할까요?"
 expedition_location_town_flavor: "정찰 보고서 – 미확인 도시 정착지, 안카리스 탐사 기록\n\n#lore 초기 정찰 결과, 얕은 계곡 안에 자리 잡은 상당 규모의 정착지가 확인되었다. 이곳은 층층이 쌓인 석벽과 현지 광물로 보강된 목책으로 둘러싸여 있다. 계단식 경작지, 풍력 방앗간, 여러 개의 고지 감시초소로 보아 자급자족이 가능한 구조로 보인다. 지금까지 지나쳐 온 작은 마을들과 달리, 이 도시는 뚜렷한 계획과 질서가 엿보인다. 넓은 도로, 구획된 지구들, 그리고 밤이면 희미한 마법의 빛을 내는 중앙 첨탑이 그 증거다. 성문 근처에서는 인원이 움직이는 모습이 관찰되며, 주민들은 경계는 하지만 노골적인 적대감은 보이지 않는다. 성벽 곳곳에는 여러 깃발이 걸려 있으나, 그 의미는 아직 파악되지 않았다. 현재까지 직접적인 접촉은 이루어지지 않았지만, 이 도시의 규모와 구조로 미루어 보아 지역 무역의 거점이거나 심지어는 지방 권력의 중심일 가능성도 있다.#!"
 expedition_location_kaelmont_harbor_name: "켈몬트 항구"
 expedition_location_kaelmont_harbor_desc: ""
 expedition_location_kaelmont_harbor_flavor: "안카리스 원정 기록 – 켈몬트 항구 정찰 보고서, 초기 해안 평가\n\n#lore 도시는 천연 심수 만을 따라 층층이 솟아 있으며, 석조 부두와 목조 잔교들이 보호된 만곡 해안선을 따라 빽빽하게 들어서 있다. 최근 보수된 방어 성벽에는 공성 병기와 마법 공격으로 보이는 그을음 자국과 충격 균열이 남아 있다. 항구의 교통은 여전히 활발하다. 범선과 마나로 강화된 선박들이 익숙한 흐름 속에 끊임없이 드나들고 있으며, 이는 최근의 충돌에도 불구하고 교역이 재개되었음을 시사한다. 현지 건축은 튼튼한 석조 기반 위에 목조 상층 구조를 올린 형태를 선호하며, 일부 건물에는 황혼 무렵 희미하게 빛나는 룬 상감이 보강재처럼 새겨져 있다. 도시의 치안은 안정적으로 보인다. 경비 순찰은 규율 정연하며, 항만 관리들은 체계적인 효율 속에서 검문을 수행하고 있다. 외부인에 대한 태도는 신중하지만 적대적이지는 않다. 몇몇 부두 노동자들이 우리를 관찰하는 모습이 보였으나, 대부분은 기본적인 거래 이상의 접촉을 꺼리는 분위기였다.#!"
 expedition_location_kaelmont_harbor_sgui: "expedition_location_kaelmont_harbor"
 expedition_location_shadowfen_marshes_name: "섀도우펜 습지"
 expedition_location_shadowfen_marshes_desc: ""
 expedition_location_shadowfen_marshes_flavor: "안카리스 원정 기록 – 섀도우펜 습지 정찰 보고서, 옛 고블린 야영지 조사\n\n#lore 습지는 고여 있는 물길과 갈대가 빽빽한 웅덩이로 이루어진 낮은 분지를 가로질러 끝없이 펼쳐져 있으며, 영원히 걷히지 않는 안개에 뒤덮여 있다. 조잡한 목재와 뼈로 만든 폐허가 된 목책들이 불규칙한 간격으로 진창 속에서 튀어나와 있는데, 이는 한때 광범위한 방어시설이었으나 이제는 절반쯤 진흙에 삼켜진 잔해들이다. 조각한 나무와 이빨, 녹슨 금속으로 만든 주물들이 죽은 가지에 걸려 있으며, 그중 다수는 훈련받지 않은 감각으로도 감지될 만큼 불안정한 주술적 기운을 여전히 머금고 있다. 지면은 위험천만하다. 보이지 않는 함몰지와 오염된 마나 주머니가 이동을 어렵게 만들고, 사람과 짐승 모두를 붙잡아 삼킬 위험이 있다. 때때로 반딧불이 같은 빛무리들이 수면 위를 떠돌며, 오래된 의식 장소 근처에서 더 밝게 타오르다가 이내 사라진다. 조직적인 고블린 주둔 흔적은 발견되지 않았으나, 발자국과 배설물은 청소부 생물들과 어쩌면 고립된 생존자들의 존재를 시사한다. 마법적 지원과 특수 장비 없이는 장기 탐사를 권장하지 않는다. 해당 지역은 위험 지대로 분류되며, 극도의 주의를 기울여 접근해야 한다.#!"
 expedition_location_shadowfen_marshes_sgui: "expedition_location_shadowfen_marshes"
 expedition_location_thornhaven_name: "손헤이븐 도서관"
 expedition_location_thornhaven_desc: ""
 expedition_location_thornhaven_flavor: "안카리스 원정 기록 – 손헤이븐 도서관 정찰 보고서, 학술 성채 관찰\n\n#lore 손헤이븐은 바위투성이 언덕 위에 자리하고 있으며, 외벽은 자연 암석과 하나로 이어져 빈틈없는 방어 외피를 이루고 있다. 이 복합 시설은 요새와 수도원이 결합된 모습이다. 좁은 창문, 강화된 관문, 그리고 회랑식 통로로 둘러싸인 안쪽을 향한 안뜰들이 늘어서 있다. 점판암 지붕을 얹은 탑들은 천문대와 아마도 비전 연구실을 품고 있으며, 때때로 정돈된 마나의 은은한 광선이 하늘로 솟구쳤다가 흩어진다. 관측 가능한 범위 안에서는 로브를 입은 인물들이 흉벽과 테라스를 따라 절제된 목적의식을 갖고 움직이며, 도서관의 깃발과 같은 문장을 새긴 갑옷을 입은 무장 수행원들이 일정 간격으로 그들을 호위하고 있다. 주변 마법은 널리 퍼져 있으나 엄격히 통제되고 있다. 문과 창문, 심지어 보행로 위에도 중첩된 결계가 씌워져 있어, 보안과 봉쇄를 매우 중시함을 시사한다. 적극적인 적대 행위는 보이지 않았으나, 초기 접근 시도는 예의 바르지만 거리감 있는 응답으로 맞이되었고, 경계를 존중해야 한다는 분명한 기대가 드러났다.#!"
 expedition_location_thornhaven_sgui: "expedition_location_thornhaven"
 expedition_location_shattered_spine_name: "부서진 척추"
 expedition_location_shattered_spine_desc: ""
 expedition_location_shattered_spine_flavor: "안카리스 원정 기록 – 부서진 척추 정찰 보고서, 이상 지형 조사\n\n#lore 부서진 척추는 마치 대지 자체가 어떤 거대한 힘에 얻어맞아 산산이 갈라진 듯, 부서진 산등성이와 수정질 돌출부가 들쭉날쭉한 띠를 이루며 지평선 너머로 뻗어 있다. 암석 지형은 불가능한 각도로 뒤틀려 있으며, 때로는 보이지 않는 힘에 붙들린 채 중력을 거스르듯 공중에 떠 있다. 식생은 드물고 뒤틀려 있다. 검게 그을린 나무들은 희미한 인광을 뿜어내고, 억센 관목들은 잔류하는 힘으로 웅웅거리는 유리 같은 가시를 지니고 있다. 공기에서는 금속 맛이 나며, 진입 후 얼마 지나지 않아 나침반은 신뢰성을 잃는다. 농축된 마나 주머니는 일렁이는 신기루나 소리와 빛의 국지적 왜곡으로 나타난다. 영구적인 거주지는 관측되지 않았으나, 버려진 야영지와 부서진 도구, 불에 그을린 공터의 흔적은 보물 사냥꾼과 학자들이 간헐적으로 이곳에 들어왔음을 보여준다. 장시간 노출 시 대원들에게 피로와 방향감각 상실이 발생한다.#!"
 expedition_location_shattered_spine_sgui: "expedition_location_shattered_spine"
 expedition_location_silverwood_name: "은빛숲"
 expedition_location_silverwood_desc: ""
 expedition_location_silverwood_flavor: "안카리스 원정 기록 – 은빛숲 정찰 보고서, 엘프 영토 정찰\n\n#lore 은빛숲의 숲冠은 서로 맞물린 가지들이 끊기지 않는 융단처럼 이어져 있으며, 햇빛을 은빛과 녹색의 흔들리는 무늬로 걸러낸다. 나무들은 놀라운 높이까지 솟아 있고, 그 줄기에는 살아 있는 플랫폼과 다리, 거처들이 얽혀 있어 멀리서는 잎사귀와 거의 구별되지 않을 만큼 자연스럽게 녹아든다. 공기에는 꽃덩굴의 향기가 짙게 배어 있으며, 그 아래로 질서 잡힌 자연 마법의 흐름이 깔려 있다. 마나는 수액처럼 뿌리와 가지를 타고 흐르며, 숲 가장자리에서도 뚜렷이 느껴진다. 야생동물들은 정찰대 주변에서도 이상할 만큼 침착하게 행동하며, 보이지 않는 감시자의 보호를 받는 듯 두려움 없이 이쪽을 관찰한다. 엘프의 존재는 노골적으로 드러나기보다 추정된다. 높은 가지 사이로 스치는 움직임, 바람에 실려 오는 희미한 음악, 그리고 외부인을 특히 신성한 숲으로부터 멀어지게 유도하는 길의 미묘한 변화가 그 단서이다. 적대 행위는 없었으나, 모든 걸음이 감시되고 있음은 분명하다.#!"
 expedition_location_silverwood_sgui: "expedition_location_silverwood"
 expedition_location_crescent_bay_name: "초승달 만 교역소"
 expedition_location_crescent_bay_desc: ""
 expedition_location_crescent_bay_flavor: "안카리스 원정 기록 – 초승달 만 교역소 정찰 보고서, 상업 중심지 조사\n\n#lore 초승달 만은 작은 천연 항구를 따라 완만히 휘어져 있으며, 해안선에는 구조와 품질이 제각각인 부두들이 늘어서 있다. 일부는 튼튼하고 잘 관리되어 있지만, 다른 것들은 허술하고 명백히 임시로 세워진 것이다. 정착지 자체는 여러 겹의 확장을 거쳐 형성되어 있다. 물가 근처에는 원래의 석조 창고들이 자리하고, 그 뒤로는 후대의 목조 건물들이 빽빽이 들어섰으며, 천막 차양들이 노천시장 안쪽까지 뻗어 있다. 여러 문화권의 깃발과 토템, 채색 문양들이 가판대 위에서 펄럭이며, 다양한 방문 상인들과 현지 고객들이 오가고 있음을 보여준다. 분위기는 분주하지만 통제되어 있다. 분쟁은 중립 감시관들이 신속히 중재하며, 이들이 찬 완장과 은은한 구속 부적은 존중을 불러일으킨다. 마법은 결계가 걸린 금고, 온도 안정 저장고, 번역 부적처럼 실용적인 형태로 존재하지만, 좀처럼 과시되지는 않는다. 주민들은 새로 온 이들에게 익숙한 무관심을 보이며, 그들을 위협이나 호기심의 대상이 아니라 잠재적 고객으로 대한다.#!"
 expedition_location_crescent_bay_sgui: "expedition_location_crescent_bay"
 expedition_location_ashcrest_ruins_name: "애쉬크레스트 폐허"
 expedition_location_ashcrest_ruins_desc: ""
 expedition_location_ashcrest_ruins_flavor: "안카리스 원정 기록 – 애쉬크레스트 폐허 정찰 보고서, 버려진 도시 조사\n\n#lore 애쉬크레스트는 계곡을 내려다보는 넓은 고원 위에 자리하고 있으며, 한때 웅장했을 대로들은 이제 바람에 날려온 먼지와 밀려드는 식생으로 막혀 있다. 아직도 상당수 남아 있는 다층 석조 건축물들은 정교한 부조와 상감된 도관을 드러내는데, 이는 통합된 마법 체계의 흔적으로 보이나 대부분은 이제 휴면 상태이거나 파손된 상태이다. 중앙 광장에는 갈라진 오벨리스크와 말라붙은 분수들이 있으며, 그 수반에는 오래된 마법의 희미한 잔류물이 남아 있다. 이곳의 침묵은 유독 두드러진다. 영구 거주민은 관측되지 않았고, 도시 경계 안에서는 동물의 흔적조차 드물게 보인다. 계측 장비는 낮은 수준의 마법 배경 방사를 감지하고 있으며, 이는 안정적이고 비적대적이어서 마치 도시의 옛 힘의 잔재가 아직도 환경 속으로 스며나오고 있는 듯하다. 흩어진 개인 소지품, 도자기, 도구, 의복 조각은 점진적 쇠퇴보다는 급작스러운 이탈이 있었음을 암시한다.#!"
 expedition_location_ashcrest_ruins_sgui: "expedition_location_ashcrest_ruins"