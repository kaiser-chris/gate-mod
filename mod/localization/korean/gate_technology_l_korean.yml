l_korean:
# Production
 gate_magic_understanding_production: "마법 생산"
 gate_magic_understanding_production_desc: "귀국은 마법을 경제적인 목적으로 활용하는 데 있어 기본적인 이해를 갖추고 있습니다."
 gate_mana_extraction: "마나 안정화"
 gate_mana_extraction_desc: "마나 안정화는 마법사가 대기 중의 마나를 다양한 용도로 활용할 수 있도록 수정에 응축하는 고대의 기술입니다."
 gate_simple_rune_carving: "룬 문양 새기기"
 gate_simple_rune_carving_desc: "룬 각인은 고대에서 이어져 오면서도 끊임없이 발전해 온 기술로, 물체에 마법 문양을 새겨 내구성과 힘, 활용성을 강화하는 기술이다. 장인들은 돌과 금속, 심지어 살아 있는 나무에까지 정밀한 룬을 새겨 넣음으로써 잠재된 마법적 속성을 끌어내며, 더욱 강력한 마법 부여와 신뢰성 높은 마법 유물 제작의 길을 열어 간다."
 gate_magic_farming: "드루이드의 마법"
 gate_magic_farming_desc: "$gate_magic_farming$은 수확량을 늘리기 위해 오래전부터 이어져 온 전통이다. 이 관행은 [concept_gate_planet]의 거의 모든 국가에서 인구 폭발을 가능하게 했다. 드루이드 전통이 없는 국가들조차도 교역과 약탈을 통해 그 혜택을 누리고 있다."
 gate_living_irrigation: "생태 관개"
 gate_living_irrigation_desc: "드루이드들의 세심한 인도 아래, 마법이 깃든 덩굴과 뿌리망은 이제 자연적인 관개 수로 역할을 하며, 기계식 펌프나 노동 집약적인 운하 없이도 물과 영양분을 작물에 직접 공급합니다. 또한 마법 씨앗은 토양의 비옥도를 강화하여 안정적인 성장과 더 높은 수확량을 보장합니다."
 gate_regenerative_timber: "재생 목재"
 gate_regenerative_timber_desc: "마법 씨앗의 힘을 활용함으로써, 삼림 관리인들은 대지의 자연적 균형을 유지하면서도 나무의 성장을 가속하는 방법을 찾아냈습니다. 드루이드의 세심한 지도 아래 베어진 나무는 마법이 깃든 묘목으로 신속히 대체되며, 고품질 목재의 지속 가능하고 안정적인 공급을 보장합니다."
 gate_mana_infused_fertilizers: "마나가 깃든 비료"
 gate_mana_infused_fertilizers_desc: "마법 씨앗을 전통적인 화합물과 결합함으로써, 연금술사들은 토양 비옥도를 높이면서도 유황 의존도를 줄이는 강력한 새 비료를 개발했습니다. 원시 마나의 주입은 작물 성장을 가속하고 고갈된 밭을 회복시켜, 농민들이 더 적은 자원으로도 풍성한 수확을 거둘 수 있게 합니다."
 gate_magic_dwarf_murk: "어둠의 길 여행로"
 gate_magic_dwarf_murk_desc: "드워프들은 [GetBuildingType('building_gate_murk_ways').GetName]을 통해 이동할 수 있습니다. [GetBuildingType('building_gate_murk_ways').GetName]은 산악 지역과 특별히 연결된 마법 관문의 일종입니다. 이는 산이 있는 주에만 건설할 수 있습니다."
 gate_magic_dwarf_murk_railways: "어둠 철도"
 gate_magic_dwarf_murk_railways_desc: "[GetBuildingType('building_gate_murk_ways').GetName]에 철도를 활용하면 더 높은 처리량을 확보할 수 있습니다. 그러나 현대식 열차를 [GetBuildingType('building_gate_murk_ways').GetName]의 혼란스럽고 불안정한 관문 안에서 정상적으로 운행하게 만드는 것은 그 자체로 하나의 예술에 가깝습니다."
 gate_mana_cores: "마나 코어"
 gate_mana_cores_desc: "의식 마법과 정밀 장인기술의 결정체인 $gate_mana_cores$는 비전 공학의 정점을 상징합니다. 섬세하면서도 견고한 유리 구조물 안에 봉인된 이 핵들은 복잡한 기하학적 배열과 정교하게 새겨진 룬을 통해 원시 마나를 포착하고 안정화합니다."
 gate_arcane_foundries: "비전 주조소"
 gate_arcane_foundries_desc: "혁신적인 베세머 공정과 안정화된 마나 코어를 결합함으로써, 비전 주조소는 금속 정제에서 전례 없는 효율을 달성합니다. 마법이 깃든 공기 흐름은 정제를 가속화하고, 마나가 주입된 도가니는 일관성과 강도를 보장합니다."
 gate_magic_golems: "마법 골렘"
 gate_magic_golems_desc: "비전 숙련과 산업적 독창성이 만나는 지점에서 만들어진 마법 골렘은 혁신의 경이로움으로 우뚝 섭니다. 정교한 마나 코어로 구동되고 리벳으로 고정된 강철 골격으로 강화된 이 거대한 구조물들은, 마법 부여의 초월적 정밀성과 초기 기계장치의 투박한 실용성을 결합합니다."
 gate_ley_line_tap: "레이 라인 탐지"
 gate_ley_line_tap_desc: "대담한 비전 공학의 도약으로, 연구자들은 땅 속을 흐르는 원시 마법 에너지인 거대한 레이 라인에서 마나를 직접 흡수하는 방법을 밝혀냈습니다. 이제 사실상 무한한 힘을 손에 넣을 수 있게 되면서 산업은 급격히 번창하고 있습니다. 그러나 학자들은 이 원초적인 힘을 활용하는 데는 위험이 따르며, 조금만 잘못 계산해도 재앙적인 파동을 일으킬 수 있다고 경고하고 있습니다."
 gate_improved_extraction: "효율적인 마나 수집"
 gate_improved_extraction_desc: "정교한 룬 조정과 대기 조화를 통해, 마법사는 주변의 마나를 훨씬 더 정밀하게 끌어오는 방법을 개발했습니다. 이 혁신은 마법적 불안정성과 낭비를 줄여, 국가가 지역의 레이 라인 흐름을 불안정하게 만들지 않으면서 더 밀집된 마나 추출망을 유지할 수 있도록 합니다."
# Society
 gate_magic_understanding_society: "마법 사회"
 gate_magic_understanding_society_desc: "당신의 국가는 사회에서 마법을 사용하는 것에 대해 근본적인 이해를 가지고 있습니다."
 gate_dwarven_immigration: "새로운 산"
 gate_dwarven_immigration_desc: "정복해야 할 새로운 산이 있으니, 어서 일을 시작해야 합니다."
 gate_orcish_immigration: "새로운 풍경이 기다리고 있다"
 gate_orcish_immigration_desc: "이 세상은 누구에게나 열려 있으며, 이를 차지하려는 전사들은 결코 부족하지 않을 것입니다."
 gate_elven_immigration: "새로운 세계로"
 gate_elven_immigration_desc: "느리지만 꾸준히, 신앙이 가장 깊은 이들이 이 어둠의 대륙에서 연방의 사명을 돕기 위해 지구로 내려오고 있습니다."
 gate_gnomish_immigration: "노움 이주"
 gate_gnomish_immigration_desc: "발명과 외교의 유산을 간직한 노움들은 정복자가 아닌 협력자로서 이 땅에 도착했습니다. 지역 사회에 잘 녹아드는 능력과 현지 문화를 존중하는 태도로 유명한 노움 정착민들은 지구 공동체와 끈끈한 유대를 형성합니다. 그들의 존재는 혁신과 문화 교류, 평화로운 발전을 촉진하며, 이는 바로 '노움의 조화' 이념이 지향하는 핵심 가치입니다."
 gate_ogre_immigration: "우르살리스 이민"
 gate_ogre_immigration_desc: "[concept_gate_planet]의 차가운 시련 속에서 단련된 곰인간 종족 우르살리스의 도래는 지구 마법 시대의 새로운 장을 엽니다. 필요에 의해 움직이고 전통에 이끌린 그들은, 혹독한 환경 속에서 길러낸 강인함과 조상의 지혜, 그리고 마나와의 깊은 유대를 지닌 채 변화한 세계 속에서 피난처와 정당한 자리를 찾고자 합니다."
 gate_orc_clan_support: "씨족의 지원"
 gate_orc_clan_support_desc: "오크들에게 지구는 약속의 땅입니다. [concept_gate_planet]에 있는 그들의 척박하고 황량한 고향은 생계를 이어갈 자원을 거의 제공하지 못하지만, 중앙아메리카의 비옥한 토양은 풍요와 손쉬운 경작을 약속합니다. 이는 그들의 원래 세계에서 겪던 고난과 극명한 대조를 이루고 있습니다."
 gate_elven_support: "신봉자들의 지원"
 gate_elven_support_desc: "신앙은 국경을 알지 못하며, 관문을 통해 엘프 신정국은 안카리스의 독실한 추종자들로부터 꾸준한 금을 받아들입니다. 이 귀중한 공물은 지구에서의 신성한 사명을 뒷받침하며, 그들의 지배를 강화하고 영향력을 확산시킵니다. 신도들에게 이 교류는 신성한 의무이고, 신정국에게는 흔들림 없는 권능을 빛나게 증명하는 황금빛 증표입니다."
 gate_elven_forests: "푸른 축복"
 gate_elven_forests_desc: "엘프 마법은 울창한 황야를 비옥한 농지와 통행 가능한 길이 조화를 이루는 공간으로 재편했습니다. 이 마법이 깃든 숲은 경작지를 확장했을 뿐 아니라, 구불구불한 녹색 통로를 만들어 한때는 뚫고 지나갈 수 없던 지형 속에서도 운송과 교역이 더 원활히 이루어지게 했습니다. 이러한 변화는 자연과 실용성을 결합하는 엘프들의 능력을 보여주는 증거입니다."
 gate_gnomish_harmony: "노움의 조화"
 gate_gnomish_harmony_desc: "노움들은 정복보다 협력을 선호하는 통합의 달인들입니다. 그들은 식민화 대신 역사적으로 식민 지배를 겪은 민족들과 진정한 동반자 관계를 구축하며, 전통을 융합하고 상호 성장을 촉진합니다. 평화로운 성향은 이들을 갈등에서 멀어지게 하지만, 자신들의 고향과 동맹을 지키는 데에는 단호합니다. 노움의 조화는 통합과 이해가 확장의 길을 여는 사회를 형성합니다."
 gate_mana_lanterns: "마나 등불"
 gate_mana_lanterns_desc: "마나 크리스털로 작동하는 휴대용 광원으로, 일부 지역에서는 기존의 기름 램프를 대체하고 있습니다."
 gate_formalized_magic: "형식화된 마법"
 gate_formalized_magic_desc: "수년에 걸친 세심한 연구와 실험 끝에, 학자들은 마법 효과를 분류하고 체계화하는 획기적인 체계를 공개했습니다. 이 틀은 주문을 원소적 친화성과 활용 방식, 그리고 위력 규모에 따라 분류함으로써, 한때 신비의 영역에 속했던 마법술을 조직화된 학문으로 탈바꿈시킵니다."
 gate_monster_compendium: "괴물 백과사전"
 gate_monster_compendium_desc: "학자들은 지구의 마나 밀도 증가로 탄생한 생물들에 대한 통찰력이 가득 담긴 필수 지침서인 #v 괴물 백과사전#!을 꼼꼼하게 집대성했습니다. 약점부터 행동 양식에 이르기까지, 이 백과사전은 이제 땅을 배회하는 신비로운 야수들을 상대로 생존하고 나아가 승리하기 위해 필요한 지식을 사냥꾼 지망생들에게 제공합니다."
 gate_arcane_infrastructure: "비전 기반 시설"
 gate_arcane_infrastructure_desc: "돌과 강철에 세심하게 엮어 넣은 마법으로, 도시는 그 어느 때보다 견고하게 솟아오릅니다. 도로는 스스로 매끄럽게 다듬어지고, 수로에는 맑은 물이 흐르며, 가장 부유한 지구의 주택들은 얼어붙지도 무더워지지도 않는 안락함을 누린다. 이는 마법과 석조 건축이 하나가 된 세계를 보여주는 기념비입니다."
 gate_ethereal_messaging: "신비로운 메시지"
 gate_ethereal_messaging_desc: "말이 말보다 빨리 달려야 하는 시대에, 마법이 깃든 도관들은 속삭이는 전갈로 진동합니다. 비전의 직조는 명령과 비밀, 그리고 꿈을 먼 거리 너머로 실어 나르며, 보이지 않는 실로 떨어진 땅들을 하나로 묶습니다."
 gate_healing_circles: "치유 모임"
 gate_healing_circles_desc: "전장과 민간 의료의 초석인 치유진은 회복 에너지의 구역을 만들어내는 마법 부여입니다. 숙련된 마법사들이 활성화하는 이 진은 범위 안의 상처를 빠르게 아물게 하고, 중상을 안정시키며, 그 안에 있는 이들에게 활력을 되돌려줍니다. 그 힘은 시전자의 마나 보유량과 부상의 복잡성에 따라 제한되지만, 치유진은 수많은 생명을 구해 왔습니다."
 gate_magic_science: "마법과 과학"
 gate_magic_science_desc: "과학적 방법론의 엄밀함과 체계화된 마법의 원리를 결합함으로써, 학자들은 비전에 대한 새로운 차원의 이해를 열어젖혔습니다. 한때 불가능하다고 여겨졌던 실험들은 이제 반복 가능한 결과를 산출하며, 마나와 주문시전, 마법 부여의 숨겨진 작동 원리를 드러냅니다."
 gate_mana_linked_education: "마나 연계 교육"
 gate_mana_linked_education_desc: "소규모 마법 부여를 활용함으로써, 학교는 상호작용하는 환영과 스스로 글씨를 쓰는 분필, 마법으로 보존된 서적을 구현할 수 있습니다. 숙련된 교사의 지도 아래, 가장 단순한 주문조차도 교실을 생동감 넘치는 배움의 전당으로 바꾸어 놓으며, 지식은 학생들의 눈앞에서 형태를 갖추게 됩니다."
 gate_thaumaturgic_courts: "마법 법정"
 gate_thaumaturgic_courts_desc: "인간의 판단이 흔들릴 때, 마법은 차가운 명철함을 선사합니다. 거짓말이 나오면 룬 문양이 불타오르고, 마법이 깃든 계약은 약속을 꺾을 수 없는 힘으로 묶어둡니다. 정의는 더욱 날카로워지지만, 항상 더 자비롭지는 않습니다."
 gate_soulbound_currency: "영혼 귀속 화폐"
 gate_soulbound_currency_desc: "주인의 정수가 새겨진 주화는 그 소유자에게 속삭이며, 타인의 손길을 거부한다. 부는 더 이상 단순한 황금이 아니라, 한 존재의 영혼 그 자체를 확장한 것이 됩니다."
 gate_expeditions: "게이트 탐사"
 gate_expeditions_desc: "우리 국가는 [GetBuildingType('building_gate_alxa').GetName]을(를) 통제하는 법을 배웠으며, 이제 [concept_gate_expedition]을 시작할 수 있습니다.\"
# Military
 gate_magic_understanding_military: "마법 군대"
 gate_magic_understanding_military_desc: "국가는 마법을 군사 목적으로 활용하는 데 있어 근본적인 이해를 갖추고 있습니다."
 gate_mage_infantry: "마법 보병"
 gate_mage_infantry_desc: "구식 기사들이 마법사들을 호위합니다. 그들은 강력한 일격을 날릴 수 있지만, 현대식 무기와 전술로는 그들을 상대할 수 있습니다."
 gate_arcane_warfare_doctrine: "비전 전쟁 교리"
 gate_arcane_warfare_doctrine_desc: "전장에서의 마법을 군사 전술에 통합하는 과정을 공식화하며, 군인들이 마법사와 마법 구조물과 함께 싸울 수 있도록 훈련시킵니다."
 gate_mana_weaponization: "마나 무기화"
 gate_mana_weaponization_desc: "개인 무기에서 마나의 사용을 정교하게 다듬어, 소총, 권총, 근접 무기에 마법 에너지를 강화합니다."
 gate_runic_armor_forging: "룬 갑옷 단조"
 gate_runic_armor_forging_desc: "갑옷에 룬을 심는 기술을 발전시켜 수동적인 마법 보호 기능을 제공하고 내구성을 강화합니다."
 gate_shadow_infiltration_tactics: "그림자 침투 전술"
 gate_shadow_infiltration_tactics_desc: "전통적인 정찰과 소규모 전투에 마법적 은폐를 결합하여 그림자 마법을 이용한 은밀 작전과 정찰 훈련을 합니다."
 gate_commando_thaumaturgy: "특공 마법"
 gate_commando_thaumaturgy_desc: "마법을 이용한 침투, 파괴 공작, 고강도 타격을 위한 소규모 전술을 전문으로 합니다."
 gate_battlefield_wards: "전장 수호대"
 gate_battlefield_wards_desc: "점점 더 파괴적인 전쟁의 시대에 병력을 보호해야 할 필요성에서 탄생한 '전장 보호막'은 방어 마법의 전술적 활용을 보여줍니다. 이 보호 마법은 특정 지역에 시전되어, 병사들이 날아오는 총탄과 포탄 파편, 심지어 약한 마법 공격으로부터도 안전하게 지켜줍니다."
 gate_mage_artillery: "마법 주문 포병"
 gate_mage_artillery_desc: "$gate_mage_artillery$는 장거리에서 사용하도록 고안된 일련의 주문입니다. 이 주문들은 엄청난 사거리와 파괴력을 바탕으로 전장에 지대한 영향을 미칠 수 있습니다."
 gate_ritual_magic: "의식 마법"
 gate_ritual_magic_desc: "$gate_ritual_magic$을 통해 여러 마법사가 함께 매우 복잡한 마법을 발동할 수 있습니다. 이는 전장에서 엄청난 파괴력을 초래할 수 있습니다."
 gate_scrying_rituals: "점술 의식"
 gate_scrying_rituals_desc: "$gate_scrying_rituals$는 오랫동안 비밀에 싸인 신비로운 기술이었으나, 최근의 발전으로 인해 이 분야에서는 표준화된 의식과 주문이 확립되었습니다. 이는 군사 분야는 물론 민간 분야에서도 폭넓게 활용되고 있습니다."
