l_korean:
 gate_elven_supremacy: "$elven$ 우월주의"
 gate_elven_supremacy_desc: "엘프 우월주의는 엘프가 권력과 명예, 그리고 마법을 절대적으로 독점하는 경직된 사회 질서를 강제합니다. 다른 종족들 또한 사회 구조 속에 편입되어 있지만, 하위 계층에 묶여 성직자나 귀족, 마법 수행자 같은 지위에는 오를 수 없습니다. 엘프의 타고난 우월성을 신념으로 삼는 이 체제는, 타 종족의 노동력과 기술을 활용하면서도 엘프의 지배를 확고히 유지하도록 설계되어 있습니다."
 gate_elven_supremacy_trigger_desc: "모든 이는 시스템에 의해 지배받는다"
