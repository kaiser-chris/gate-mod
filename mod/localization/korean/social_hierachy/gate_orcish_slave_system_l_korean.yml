l_korean:
 gate_orcish_slave_system: "$orcish$ 노예 제도"
 gate_orcish_slave_system_desc: "오크들은 다른 모든 문화를 지배하며 사회 전반을 장악하고 있습니다."
 gate_orcish_slave_system_trigger_desc: "모든 이는 시스템에 의해 지배받는다"
 gate_orc_shamans: "오크 주술사"
 gate_orc_shamans_desc: "오크 주술사는 오크 사회 안에서 신비롭고 존경받는 사회 계층으로, 영성과 강력한 원소 마법을 결합한 존재들이다. 이들은 부족의 영적 지도자이자 치유자, 예언자로서 큰 영향력과 존경을 누린다. 오크 주술사들은 고대의 영혼과 원소의 힘, 자연 세계의 원초적 에너지와 소통할 수 있다고 여겨진다. 그들은 물질 세계와 영적 세계 사이의 중재자 역할을 맡는 경우가 많으며, 전쟁과 기근, 중요한 의식의 시기에 지침을 제공한다."
 gate_orc_lords: "오크 군주"
 gate_orc_lords_desc: "오크 군주는 오크 사회 안에서 지배적이고 위압적인 사회 계층으로, 오크 문화의 핵심인 힘과 권위, 군사적 기량을 체현하는 존재들입니다. 이들은 강력한 전쟁군주이자 통치자, 군사 지도자로서 부족이나 씨족 전반에 존경과 공포를 동시에 불러일으킵니다. 오크 군주들은 대개 사회의 다른 구성원들보다 더 크고, 더 많은 전투를 겪었으며, 더 교활합니다. 이들은 잔혹한 전투에서 전사들을 승리로 이끄는 능력을 통해 두각을 드러냅니다."
 gate_orc_citizens: "오크 시민"
 gate_orc_citizens_desc: "오크 시민은 오크 사회의 일상적인 구성원들로, 공동체의 중추를 이룬다. 오크 군주나 주술사와 같은 권력과 명예를 누리지는 못하지만, 오크 시민은 부족과 정착지가 기능하는 데 필수적인 존재들입니다. 이들은 숙련된 장인과 농민부터 전사와 상인에 이르기까지 다양한 역할을 맡으며, 각자의 방식으로 부족의 생존과 번영에 기여합니다. 강인함과 근면함, 지도자에 대한 충성심으로 알려진 오크 시민들은 기반시설을 유지하고 자원을 모으며, 더 강력한 동족들을 지원하는 역할을 맡는 경우가 많습니다. 그들의 삶은 생존과 전쟁의 끊임없는 요구에 의해 형성되지만, 오크 시민은 강한 공동체 의식과 자신들의 유산에 대한 자부심을 누립니다."
 gate_orc_soldiers: "오크 병사"
 gate_orc_soldiers_desc: "오크 병사는 오크 사회의 중심을 이루는 사납고 규율 잡힌 전사들로, 어린 시절부터 전투를 위해 훈련받습니다. 이들은 전쟁과 약탈에서 주력 전투부대로 복무하며, 오크 군주에게 충성하고 전투와 영광에 대한 갈망에 의해 움직입니다. 무지막지한 힘과 거친 공격성, 끈질긴 투지로 알려진 오크 병사들은 대개 중무장과 투박하지만 효과적인 갑옷을 갖추고 있으며, 강한 전우애를 지니고 있습니다. 비록 높은 지위를 차지하지는 못하더라도, 전장에서의 용맹은 그들에게 존중을 안겨주며, 이들의 역할은 오크 영토를 확장하고 방어하는 데 핵심적입니다. 피와 정복을 통해, 오크 병사들은 자신들의 민족을 규정하는 전사의 정신을 체현합니다."
 gate_orc_lowers: "오크 하층민"
 gate_orc_lowers_desc: "오크 하층민은 오크 사회의 최하위 사회 계층으로, 주로 허드렛일을 맡고 상위 오크들의 필요를 충족시키는 역할을 합니다. 이 집단에는 노동자, 종복, 견습생처럼 필수적이지만 명예는 낮은 역할을 수행하는 이들이 포함됩니다. 오크 시민이나 병사와 같은 권리나 존중을 누리지는 못하지만, 이들의 노동은 부족의 생존과 기능 유지에 필수적입니다. 오크 하층민은 대개 가혹한 환경 속에서 살아가며, 신분 상승의 기회도 제한적입니다. 그럼에도 이들은 강인함과 끈기, 강한 공동체 의식으로 알려져 있다. 낮은 지위에도 불구하고, 이들은 오크 사회의 일상적 운영에 없어서는 안 될 존재이며, 서로 긴밀한 유대를 형성하는 경우가 많습니다."
 gate_orc_slaves: "노예"
 gate_orc_slaves_desc: "오크가 아닌 모든 존재는 노예로 전락합니다."
