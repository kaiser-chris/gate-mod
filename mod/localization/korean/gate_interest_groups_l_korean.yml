l_korean:
 ig_gate_magic_users: "비전의 손길"
 ig_gate_magic_users_desc: "비전의 손길 [concept_interest_group]은 마법 사용자, 연구자, 그리고 마법의 우월함을 확신하는 이들로 구성된 집단입니다."
 ig_gate_magic_users_only_icon: "@magic_users!"
 ig_gate_cultivators: "경작자"
 ig_gate_cultivators_desc: "경작자 [concept_interest_group]는 마법 사용자, 연구자, 그리고 마법의 우월성을 확신하는 이들로 이루어진 집단입니다."
 ig_gate_golden_defenders: "빛의 수호자"
 ig_gate_golden_defenders_desc: "Lightwardens [concept_interest_group]은 [GetReligion('gate_golden_religion').GetName]의 성직자층이다."
 ig_gate_shamans: "주술사"
 ig_gate_shamans_desc: "비전의 균형을 수호하는 이들로, 주술사는 전통과 날것의 마법을 융합합니다. 드루이드 예언자이든 학문적인 마법사이든, 그들은 마나를 유산이자 힘으로 다루며, 세상을 형성하는 그 에너지의 흐름을 끊임없이 주시합니다."
 ig_gate_hofgodi: "호프고디"
 ig_gate_hofgodi_desc: "호프고디는 종교 의식과 잔치가 열리던 공동 회관(호프)을 관리하는 존경받는 인물들입니다. 그들은 공동체를 위해 의식을 행하며 때로는 신들과의 중재자 역할을 하기도 합니다."
 ig_gate_hollow_faithful: "공허한 신도"
 ig_gate_hollow_faithful_desc: "공허한 신앙의 [concept_interest_group]는 굶주림을 신성한 수련으로 받아들이는 이들로 이루어져 있습니다—희생과 강인함을 상기시키는 성스러운 실천으로 여기는 것입니다."
# Traits
 ig_trait_gate_slave_masters: "행복한 주인"
 ig_trait_gate_slave_masters_desc: "행복한 주인들은 노예를 더 잘 대합니다."
 ig_trait_gate_military_support: "군사 지원"
 ig_trait_gate_military_support_desc: "우리는 우리 군인들을 전폭적으로 지지합니다."
 ig_trait_gate_annoyed_masters: "짜증 난 주인들"
 ig_trait_gate_annoyed_masters_desc: "짜증 난 노예 주인들은 노예들을 더 혹독하게 대합니다."
 ig_trait_gate_hidden_research: "숨겨진 연구"
 ig_trait_gate_hidden_research_desc: "이 국가는 우리의 연구를 받을 자격이 없다."
 ig_trait_gate_patriotic_research: "애국적 연구"
 ig_trait_gate_patriotic_research_desc: "우리국가가 위대해지려면 우리 모두의 지혜가 필요합니다."
