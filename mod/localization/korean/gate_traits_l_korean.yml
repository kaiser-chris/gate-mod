 gate_dragon_general_desc: "이 캐릭터는 위대한 용으로부터 군사 지식의 축복을 받았습니다." #deepl:3928334919
 gate_arcanist_magic_sight: "아케인 아이즈" #deepl:819776185
 gate_arcanist_magic_sight_desc: "이 캐릭터는 ‘[concept_gate_magic]’ 주문을 통해 육안의 시력을 소진시켰습니다. 이 캐릭터의 눈은 타인에게 깊은 불안을 주지만, 그 눈으로 ‘[concept_gate_magic]’의 흐름을 감지할 수 있게 해줍니다." #deepl:1310620690
 gate_arcanist_magic_voice: "잿빛 목소리" #deepl:2242472114
 gate_arcanist_magic_voice_desc: "이 인물은 금지된 주문을 거듭 외우는 바람에 목이 타버렸다. 그 대가로 그가 내뱉는 모든 말에는 비정상적인 울림이 실려 있어, 주문을 더 쉽게 구사할 수 있게 되었으며 그의 명령은 무시하기 더 어려워졌다." #deepl:3141797067
 gate_arcanist_bound_name: "인장 명칭" #deepl:2665726043
 gate_arcanist_bound_name_desc: "이 캐릭터는 적대적인 마법적 힘([concept_gate_magic])으로부터 자신을 보호하기 위해 자신의 본명의 일부를 봉인했습니다. 이로 인해 저주, 강박, 소환 의식에 대한 저항력을 얻게 되지만, 마치 자신의 정체성 중 핵심적인 부분이 더 이상 타인에게 온전히 전달되지 못하는 것처럼 사회적 위상이 약화됩니다." #deepl:1622693922
