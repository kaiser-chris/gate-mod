 gate_dragon_health: "드래곤의 건강"
 gate_dragon_health_desc: "이 인물은 위대한 드래곤으로부터 건강의 축복을 받았습니다."
 gate_dragon_general: "드래곤 전술"
 gate_dragon_general_desc: "이 인물은 위대한 드래곤으로부터 군사 지식의 축복을 받았습니다."
 gate_arcanist_magic_sight: "비전의 눈"
 gate_arcanist_magic_sight_desc: "이 인물은 [concept_gate_magic]으로 인해 평범한 시력을 불태워버렸습니다. 그의 눈은 타인에게 깊은 불쾌감과 섬뜩함을 안겨주지만, 대신 [concept_gate_magic]의 흐름을 감지할 수 있게 해줍니다."
 gate_arcanist_magic_voice: "잿빛 목소리"
 gate_arcanist_magic_voice_desc: "이 인물은 금단의 공식들을 반복적으로 읊조리다 목을 태워버렸다. 그 대가로 그가 내뱉는 모든 말에는 부자연스러운 울림이 깃들어, 주문은 더 쉽게 형성되고 명령은 더 거역하기 어려워진다."
 gate_arcanist_bound_name: "인장 명칭"
 gate_arcanist_bound_name_desc: "이 인물은 적대적인 [concept_gate_magic]으로부터 자신을 보호하기 위해 자신의 진명을 일부 봉인했습니다. 그 덕분에 저주와 강제, 소환 의식에 대한 저항력을 얻었지만, 그 대가로 사회적으로 위축된 존재가 되었습니다. 마치 정체성의 본질적인 일부가 더 이상 타인에게 온전히 닿지 못하는 것처럼 말입니다."
