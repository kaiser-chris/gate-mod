l_korean:
 concept_gate_planet: "$gate_planet$"
 concept_gate_planet_desc: "안카리스는 거친 마법과 고대의 경이로 가득한 세계로, 거대한 산맥 속에는 드워프의 전당이 자리하고, 울창한 숲에는 엘프 왕국이 숨어 있으며, 광활한 평원에는 오크 전사들의 격돌이 울려 퍼집니다. 그러나 이 아름다움 아래에는 마나의 거친 흐름이 만들어낸 격동의 역사가 숨겨져 있으며, 이는 이 땅의 민족과 풍경을 조화와 갈등 속에 얽어 놓았습니다."
 concept_gate_magic_knowledge: "비전 지식"
 concept_gate_magic_knowledge_desc: "$concept_gate_magic_knowledge$은 직접 연구할 수 없으며, [concept_gate_magic_researcher]로 마법 자체를 연구해야만 획득할 수 있는 기술들의 집합입니다.\n\n해당 기술은 다음과 같습니다:\n• [GetTechnology('gate_magic_understanding_production').GetName]\n• [GetTechnology('gate_magic_understanding_society').GetName]\n• [GetTechnology('gate_magic_understanding_military').GetName]"
 concept_gate_mana_saturation: "마나 포화"
 concept_gate_mana_saturation_desc: "마나 포화도는 전 세계의 평균 [concept_gate_mana_density]를 의미합니다."
 concept_gate_magic_innovation: "마법 혁신"
 concept_gate_magic_innovation_desc: "@magic_innovation!$concept_gate_magic_innovation$은 주로 우리의 [concept_gate_magic_researcher]와 [GetBuildingType('building_gate_magic_research_institute').GetName]을 통해 생산됩니다. [GetBuildingType('building_gate_alxa').GetName], [GetBuildingType('building_gate_mage_tower').GetName], [GetBuildingType('building_gate_magic_academy').GetName], [GetBuildingType('building_university').GetName] $concept_buildings$ 또한 매월 생성되는 마법 혁신에 기여할 수 있습니다."
 concept_gate_magic_technology: "마법 기술"
 concept_gate_magic_technologies: "마법 기술"
 concept_gate_magic_technology_desc: "$concept_gate_magic_technology$은 $PRODUCTION_NO_CONCEPT$, $MILITARY$, $SOCIETY$ 분야의 모든 마법 혁신을 포괄합니다. $concept_gate_magic_technologies$은 전국적 효과를 가지며, 그 효과는 [Concept('concept_modifier','$concept_modifiers$')]를 통해 [Concept('concept_country','$concept_country_possessive$')] 운영 수치를 변경하는 것부터 새로운 [Concept('concept_production_method','$concept_production_methods$')], [Concept('concept_building','$concept_buildings$')], [Concept('concept_law','$concept_laws$')], [Concept('concept_decree','$concept_decrees$')], [Concept('concept_diplomatic_pact','$concept_diplomatic_pacts$')]을 해금하는 것까지 다양합니다.\n\n새로운 $concept_gate_magic_technologies$에 대한 진척도는 [concept_gate_magic_innovation]을 통해 오릅니다.\n\n$concept_gate_magic_technology$을 획득하는 데 필요한 진척도는 해당 기술의 [Concept('concept_technology_era','$concept_technology_era_short$')]에 따라 달라집니다. $concept_technology_era_ahead_of_time_penalty_desc$"
 concept_gate_monster_attack: "괴물 습격"
 concept_gate_monster_attacks: "괴물 습격"
 concept_gate_monster_attack_desc: "[concept_gate_mana_density]가 중간 수준에 이르면, 지역 동식물이 변이하여 민간인을 공격할 수 있습니다."
 concept_gate_monster_horde: "괴물 대군세"
 concept_gate_monster_hordes: "괴물 대군세"
 concept_gate_monster_horde_desc: "[concept_gate_mana_density]가 중간 수준에 이르면, 지역 동식물이 대규모로 변이하여 민간인을 잔혹하게 공격할 수 있습니다."
 concept_gate_mana_density: "마나 밀도"
 concept_gate_mana_density_mana: "마나"
 concept_gate_mana_density_desc: "마법 관문이 열린 이후, 마나가 지구로 쏟아져 나오고 있습니다. 지구에서 [concept_gate_magic_knowledge]이 응용되면서 대기 중 마나의 양은 더욱 증가했습니다. 한 주의 $concept_gate_mana_density$가 최대치에 도달하면 [concept_gate_magical_phenomena]이 일상적으로 발생하게 됩니다. 그 전까지는 한 주의 $concept_gate_mana_density$ 수준에 따라 예측할 수 없는 변화와 사건들이 발생할 것입니다.\n\n#header 마나 밀도 단계:#!\n• 낮은 마나 밀도는 #v [GuiScope.ScriptValue('gate_low_mana_density_threshhold')]%#!부터 시작됨\n• 중간 마나 밀도는 #v [GuiScope.ScriptValue('gate_medium_mana_density_threshhold')]%#!부터 시작됨\n• 높은 마나 밀도는 #v [GuiScope.ScriptValue('gate_high_mana_density_threshhold')]%#!부터 시작됨"
 concept_gate_magical_phenomena: "마법 현상"
 concept_gate_magical_phenomena_desc: "마법 현상은 한 주의 [concept_gate_mana_density] 증가로 인해 발생하는 사건입니다. 그 양상은 무해한 것부터 유익한 것, 그리고 공포스러운 것까지 다양합니다."
 concept_gate_magic_researcher: "비전술사"
 concept_gate_magic_researchers: "비전술사"
 concept_gate_magic_researcher_desc: "한 국가의 비전술사는 [GetBuildingType('building_gate_magic_research_institute').GetName]을 이끌며 그 [concept_gate_magic_innovation]의 방향을 조정합니다. 이들은 [Concept('concept_gate_project','$concept_gate_projects$')]를 주도하고, 마법 산업과 사회 내 마법 활용을 개선하는 데 기여합니다."
 concept_gate_character_experience: "캐릭터 경험"
 concept_gate_character_experience_desc: "특정 인물들, 예를 들어 우리의 [concept_gate_magic_researcher]는 자신의 업무에서 경험을 쌓을 수 있습니다. 높은 레벨의 인물일수록 업무 능력이 뛰어나며, 일상 업무의 성과를 높여줍니다.\n\n#header 경험 레벨:#!\n• $gg_character_experience_novice$\n• $gg_character_experience_experienced$\n• $gg_character_experience_master$"
 concept_gate_magic: "마법"
 concept_gate_magic_desc: "마법은 마나를 세계에 영향을 미치는 형태로 가공하는 행위입니다. 이는 [concept_gate_magic_users]들에 의해 사용되어 경이로운 결과를 만들어내기도 하지만, 동시에 파괴적인 결과를 초래하기도 합니다."
 concept_gate_magic_user: "마법사"
 concept_gate_magic_users: "마법사"
 concept_gate_magic_users_desc: "마법사는 일상생활에서 비전의 힘을 다루는 [Concept('concept_pop','$concept_pops$')]입니다.\n\n#header 인구:#!\n• [GetPopType('gate_mages').GetName]\n• [GetPopType('gate_druids').GetName]"
 concept_gate_magic_ethic: "비전의 영역"
 concept_gate_magic_ethics: "비전의 영역"
 concept_gate_magic_ethic_desc: "$concept_gate_magic_ethics$은 [concept_country]를 규정하는 핵심 보정치이다.\n이는 한 국가가 마법을 어떻게 활용하고자 하는지를 나타낸다."
 concept_gate_mbudye_council: "음부디예 의회"
 concept_gate_mbudye_council_desc: "$concept_gate_mbudye_council$는 룬다의 역사적·영적 정체성의 중심으로 자리하고 있습니다. 지혜로운 남녀들로 구성된 이들은 신성한 전통의 수호자이자 정치 원칙의 해석자이며, 조상 대대로 이어진 기억의 파수꾼 역할을 합니다. 아크투리안 연방이 황금의 축복을 확산시키려는 시도에 맞서, 평의회는 저항의 방벽이자 대화를 위한 가교가 되어 왔습니다. 역사의 무게와 변화의 압력 사이에서 균형을 잡으며, 음부디예는 신앙과 권력이 뒤얽히는 격동의 시대를 헤쳐 나가고 있습니다."
 concept_gate_bambudye: "밤부디예"
 concept_gate_bambudye_desc: "밤부디예는 룬다의 끈질긴 저항 속에서 태어난 비밀 결사로서, 그림자 속에서 활동하며 아크투리안 연방의 통치에 맞서고 있습니다. 고대 전통에 뿌리를 둔 이들은 신비주의와 교묘한 전략을 결합하여, 자신들의 자치와 문화적 정체성을 지켜내기 위해 싸웁니다. 억압받는 이들에게 그들은 희망과 반란의 상징이며, 엘프들에게는 취약한 질서 속에 혼란을 퍼뜨리는 종잡을 수 없는 반란 세력입니다. 그 영향력은 깊숙이 스며들어 낮은 목소리로 속삭여지며, 룬다의 정신은 쉽게 굴복시킬 수 없다는 사실을 끊임없이 일깨웁니다."
 concept_gate_vampirism: "뱀파이어"
 concept_gate_vampirism_desc: "피와 힘 사이의 어두운 계약, 뱀파이어가 되는 것은 대가를 치르면서 영원한 생명을 제공합니다. 이 저주를 받아들인 자들은 비정상적인 힘과 예리한 감각을 얻으며, 그림자와 얽히는 갈증에 사로잡힙니다. 감염된 자들의 혈관 속에서 마나와 갈망이 얽혀, 두려움과 존경을 동시에 받는 존재들이 됩니다. 뱀파이어가 되는 것은 [GetCulture('vampire').GetName]의 일원이 되는 것을 의미합니다."
 concept_gate_ley_line: "레이 라인"
 concept_gate_ley_lines: "레이 라인"
 concept_gate_ley_lines_desc: "일반인에게는 보이지 않지만, 신비로움에 필수적인 레이라인은 대지 아래를 흐르는 원초적인 마나의 흐름입니다. 레이라인이 모이는 곳에서는 마나가 급증하여 해당 지역을 강력한 마법의 핫스팟으로 변환시키고, 주변의 모든 주문 효과를 증폭시킵니다."
 concept_gate_mana_well: "마나샘"
 concept_gate_mana_well_desc: "마나샘은 [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]에서 에너지를 채집하는 방식입니다. 마나 우물은 거의 무제한의 $gate_mana$를 생성할 수 있습니다.\n\n그러나 이는 지역 [Concept('concept_gate_ley_lines','$concept_gate_ley_line$')]의 #v 불안정#!을 초래할 수 있으며, 이로 인해 #v 사고#!가 발생할 위험이 있습니다."
 concept_gate_expedition: "$gate_planet$ 원정"
 concept_gate_expedition_desc: "[GetBuildingType('building_gate_alxa').GetName]을 확보하고 [GetTechnology('gate_expeditions').GetName]을 통해 이에 대한 통제력을 강화하면, [concept_gate_planet]로의 탐사를 시작할 수 있습니다."
 concept_gate_expedition_location: "탐사 지역"
 concept_gate_expedition_location_desc: "" #TODO
 concept_gate_expedition_leader: "원정대장"
 concept_gate_expedition_leaders: "원정대 리더"
 concept_gate_expedition_leader_desc: "우리 [concept_gate_expedition]의 지도자입니다. 지도자에 따라 [concept_gate_planet]에서 수행할 수 있는 [concept_gate_expedition_activities]가 달라집니다.\n\n**지도자 유형은 세 가지가 있습니다:\n•[concept_gate_expedition_leader_militarist]\n•[concept_gate_expedition_leader_politician]\n•[concept_gate_expedition_leader_industrialist]"
 concept_gate_expedition_leader_militarist: "군국주의자"
 concept_gate_expedition_leader_militarist_desc: "$concept_gate_expedition_leader_militarist$는 [concept_gate_planet]의 주민들을 무력으로 통제하는 데 집중합니다."
 concept_gate_expedition_leader_politician: "정치인"
 concept_gate_expedition_leader_politician_desc: "$concept_gate_expedition_leader_politician$는 [concept_gate_planet] 주민들과 외교 관계를 맺는 데 집중합니다."
 concept_gate_expedition_leader_industrialist: "산업주의자"
 concept_gate_expedition_leader_industrialist_desc: "$concept_gate_expedition_leader_industrialist$는 [concept_gate_planet] 주민들과 새로운 무역로 개척에 집중합니다."
 concept_gate_expedition_budget: "원정대 예산"
 concept_gate_expedition_budget_desc: "$concept_gate_expedition_budget$은 [concept_gate_planet]에서 새로운 [concept_gate_expedition_activities]를 시작하는 데 사용됩니다. 예산이 소진되면 우리의 [concept_gate_expedition]은 종료됩니다."
 concept_gate_expedition_activity: "원정대 활동"
 concept_gate_expedition_activities: "원정대 활동"
 concept_gate_expedition_activities_desc: "[concept_gate_expedition_map]의 모든 상호작용은 [Concept('concept_gate_expedition_activities','$concept_gate_expedition_activity$')]으로 간주합니다."
 concept_gate_expedition_map: "탐험 지도"
 concept_gate_expedition_map_desc: "$concept_gate_expedition_map$은 정찰을 통해 한 조각씩 밝혀내야 합니다. 지도 자체는 여러 탐사에서 변하지 않고 일정하게 유지됩니다."
 concept_gate_project: "비전주의자 프로젝트"
 concept_gate_projects: "비전주의자 프로젝트"
 concept_gate_project_desc: "우리 국가 최고의 마법 학자들의 지도를 받으며, 비전주의자 프로젝트는 신비로운 이론을 실용적인 혁신으로 전환합니다. 이러한 집중된 연구 노력은 산업, 사회, 그리고 인프라를 향상시키는 마법적 개량을 가능하게 하며, 보다 마법으로 물든 미래를 향한 길을 닦아 나갑니다."
 concept_gate_magic_country: "마법 국가"
 concept_gate_magic_countries: "마법 국가"
 concept_gate_magic_country_desc: "[concept_gate_magic_knowledge]을 습득한 국가들."
 concept_gate_arcane_council: "$io_gate_arcane_council$"
 concept_gate_arcane_council_desc: "$io_gate_arcane_council$은 [concept_gate_magic_users]를 규제하고 제한하기 위해 설립된 [concept_com_international_organization]입니다. 그 주된 목적은 국제적 사건의 발생을 방지하는 데 있으며, [concept_gate_arcane_council_high_mage]가 이를 이끕니다."
 concept_gate_arcane_council_high_mage: "$io_gate_arcane_council_leader_title$"
 concept_gate_arcane_council_high_mage_desc: "$io_gate_arcane_council_leader_title$은 [concept_gate_arcane_council] [concept_com_international_organization]을 이끕니다. 이들은 모든 회원국의 [Concept('concept_gate_magic_researcher','$concept_gate_magic_researchers$')] 중에서 선출됩니다."
