l_korean:
 io_gate_arcane_council: "비전 의회"
 io_gate_arcane_council_reason: "[concept_gate_magic]이 흔하고 강력한 [concept_gate_magic_users]들이 국가 간을 자유롭게 이동할 수 있는 세계에서, 각국은 협력의 필요성을 깨닫게 되었다. [concept_gate_arcane_council]은 비전술 사용에 대한 국제적 규칙과 제한을 조율하기 위해 창설되었다."
 io_gate_arcane_council_election: "[concept_gate_arcane_council_high_mage]는 종신직에 가깝게 선출된다. 기존 [concept_gate_arcane_council_high_mage]가 은퇴하거나 사망하면 새로운 선거가 열린다. 모든 회원 [Concept('concept_country','$concept_countries$')]의 [concept_gate_magic_researcher]가 선거에 출마할 자격을 가진다.[AddLocalizationIf(GetPlayer.MakeScope.Var('gate_joined_mage_council').IsSet, 'io_gate_arcane_council_election_involved')]"
 io_gate_arcane_council_election_involved: "\n\n우리 [concept_gate_magic_researcher]의 선거 점수는 #tooltippable #tooltip:[GetRawTextTooltipTag('io_gate_arcane_council_election_score_tooltip')] [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]#!#!이며, 우리는 다음 선거에서 아마 [GetPlayer.GetCustom('gate_arcane_council_election_indicator')] 것이다."
 io_gate_arcane_council_election_indicator_loss: "#r 패배#!"
 io_gate_arcane_council_election_indicator_win: "#g 승리#!"
 io_gate_arcane_council_election_score_tooltip: "우리 [concept_gate_magic_researcher]의 총 [concept_gate_arcane_council_high_mage] 선거 점수는 다음 요인으로 인해 [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]이다:#indent_newline:3 \n[GetPlayer.MakeScope.GetScriptValueDesc('gate_arcane_council_election_score')]#!"
 io_gate_arcane_council_status_election: "조직은 현재 새로운 [concept_gate_arcane_council_high_mage]를 선출하고 있다."
 io_gate_arcane_council_leader_title: "대마법사"
 io_gate_arcane_council_leader_tooltip: "#header [concept_gate_arcane_council_high_mage] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName]#!\n[JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] 측 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetName] 인물은 현재 [concept_gate_arcane_council]의 [concept_gate_arcane_council_high_mage]이다.\n\n이 인물의 선거 점수는 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]이며, 다음 선거에서 아마 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetCustom('gate_arcane_council_election_indicator')] 것이다."
 sb_gate_arcane_council_research_cooperation: "연구 협력 시작"
 sb_gate_arcane_council_research_cooperation_desc: "우리의 [concept_influence]를 사용해 모든 회원국 간 공동 연구 계획을 추진한다."
 sb_gate_arcane_council_forbid_no_regulations: "전장의 마법 억제"
 sb_gate_arcane_council_forbid_no_regulations_desc: "회원국들이 [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName] [concept_mobilization_option]을 사용하는 것을 금지한다."
 sb_gate_arcane_council_forbid_basic_regulations: "전장 마법을 더욱 제한"
 sb_gate_arcane_council_forbid_basic_regulations_desc: "회원국들이 [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName] 및 [GetMobilizationOption('mobilization_option_gate_basic_regulations').GetName] [concept_mobilization_option]을 사용하는 것을 금지한다."
 sb_gate_arcane_council_cancel_regulations: "전장 규정 폐지"
 sb_gate_arcane_council_cancel_regulations_desc: "회원국들이 [GetMobilizationOption('mobilization_option_gate_no_regulations').GetName] 및 [GetMobilizationOption('mobilization_option_gate_basic_regulations').GetName] [concept_mobilization_option]을 다시 사용할 수 있도록 허용한다."
 modifier_gate_arcane_council_base: "기본 마법 규정"
 modifier_gate_arcane_council_research_cooperation: "연구 협력"
 modifier_gate_arcane_council_forbid_no_regulations: "$mobilization_option_gate_no_regulations$에 따른 $concept_mobilization_option$을 금지"
 modifier_gate_arcane_council_forbid_basic_regulations: "$mobilization_option_gate_basic_regulations$에 따른 $concept_mobilization_option$을 금지"
 modifier_gate_arcane_council_action_cost: "[concept_gate_arcane_council] 행동 비용"
 modifier_gate_arcane_council_incident_cost: "마법사 사건 비용"
 decision_gate_found_arcane_council: "$io_gate_arcane_council$ 설립"
 decision_gate_found_arcane_council_desc: "[concept_gate_arcane_council]을 발견함."
 decision_gate_join_arcane_council: "$io_gate_arcane_council$ 가입"
 decision_gate_join_arcane_council_desc: "[concept_gate_arcane_council]에 가입함."
 decision_gate_leave_arcane_council: "$io_gate_arcane_council$ 탈퇴"
 decision_gate_leave_arcane_council_desc: "[concept_gate_arcane_council]에 탈퇴함."
 gate_arcane_council_event_hint: "[concept_gate_arcane_council]을 통해 [concept_gate_magic]을 국제적으로 규제한다면, 이와 같은 사건이 앞으로 다시 일어나는 것을 막을 수 있을 것이다."
 gate_arcane_council.1.t: "외국 마법, 국내의 파장"
 gate_arcane_council.1.d: "[TopScope.sC('source_country').GetName] 출신의 방문 [Concept('concept_gate_magic_users','$concept_gate_magic_user$')]가 [TopScope.sS('target_state').GetName]에서 통제력을 잃고 [concept_devastation]을 초래했다.\n\n$gate_arcane_council_event_hint$"
 gate_arcane_council.1.f: "[TopScope.sC('source_country').GetNameNoFormatting] 출신의 방문 주문시전자가 [GetPlayer.GetAdjectiveNoFormatting] 현지인들과의 충돌 중 통제력을 잃었다. 그 결과 발생한 마법 폭발은 인근 거리를 초토화했으며, 이미 시민과 상인, 행정관들 사이에 불안을 촉발하고 있다. 이 사건을 잘못 처리한다면 국내의 공공질서와 [TopScope.sC('source_country').GetNameNoFormatting] 측과의 관계가 동시에 손상될 수 있다."
 gate_arcane_council.1.a: "[TopScope.sC('source_country').GetNameNoFlag]에 답변을 요구하라."
 gate_arcane_council.1.b: "그 일에 신경 쓰지 않겠다."
 gate_arcane_council.1.c: "재건에 집중하라."
 gate_arcane_council.2.t: "외부인의 재앙"
 gate_arcane_council.2.d: "[TopScope.sC('source_country').GetName] 출신의 드루이드 [Concept('concept_gate_magic_users','$concept_gate_magic_user$')]가 [TopScope.sS('target_state').GetName]에 [GetHarvestConditionType('drought').GetName] [concept_harvest_condition]을 초래했다.\n\n$gate_arcane_council_event_hint$"
 gate_arcane_council.2.f: "[TopScope.sC('source_country').GetNameNoFormatting] 출신의 한 드루이드가 [TopScope.sS('target_state').GetNameNoFormatting]의 들판에 파멸을 불러온 것으로 여겨지고 있다. 불과 몇 주 전까지만 해도 풍요를 약속하던 밭들은 이제 황량하고 잿빛으로 변했으나, 초기 보고에 따르면 이는 국가의 공식 행위라기보다 고립된 광신자의 소행일 가능성이 있다. 이 구분은 외교적으로는 중요할지 모르나, 생계가 흙 속에서 말라 죽어가는 모습을 지켜보는 농민들에게는 아무런 위안도 되지 못한다."
 gate_arcane_council.2.a: "[TopScope.sC('source_country').GetNameNoFlag]에 답변을 요구하라."
 gate_arcane_council.2.b: "그 일에 신경 쓰지 않겠다."
 gate_arcane_council.2.c: "우리 소작농들을 돕는 데 주력한다."
 gate_arcane_council_election_score_no_researcher: "[concept_gate_magic_researcher] 없음"
 gate_arcane_council_election_score_experience: "[concept_gate_character_experience]"
