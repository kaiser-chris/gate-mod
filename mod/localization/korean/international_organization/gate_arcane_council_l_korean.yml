l_korean:
 io_gate_arcane_council: "비전의 의회" #deepl:899135299
 io_gate_arcane_council_reason: "[concept_gate_magic]가 널리 퍼져 있고, [concept_gate_magic_users]가 주와 국가 사이를 자유롭게 오갈 수 있는 세상에서, 각국은 협력할 필요성을 느끼게 되었습니다. 이에 따라 [concept_gate_arcane_council]가 설립되어, 마법 수행에 관한 국제적 규칙과 제한 사항을 조정하고 있습니다." #deepl:1916466954
 io_gate_arcane_council_election: "[concept_gate_arcane_council_high_mage]는 임기 전체에 걸쳐 선출됩니다. 현직 [concept_gate_arcane_council_high_mage]가 은퇴하거나 사망할 경우 새로운 선거가 실시됩니다. 모든 회원 [Concept('concept_country','$concept_countries$')]의 [concept_gate_magic_researcher]는 선거에 출마할 자격이 있습니다. [AddLocalizationIf(GetPlayer.MakeScope.Var('gate_joined_mage_council').IsSet, 'io_gate_arcane_council_election_involved')]" #deepl:272868124
 io_gate_arcane_council_election_involved: "\n \n 저희 ‘[concept_gate_magic_researcher]’의 선거 평가 점수는 #tooltippable  입니다. #tooltip: [GetRawTextTooltipTag('io_gate_arcane_council_election_score_tooltip')] [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v] #! #! 다음 선거에서는 아마 [GetPlayer.GetCustom('gate_arcane_council_election_indicator')] 할 것입니다." #deepl:2891667291
 io_gate_arcane_council_election_indicator_loss: "#r  #!을(를) 삭제합니다" #deepl:3926816450
 io_gate_arcane_council_election_indicator_win: "#g  #!에서 승리" #deepl:3291145026
 io_gate_arcane_council_election_score_tooltip: "우리의 ‘[concept_gate_magic_researcher]’가 ‘[concept_gate_arcane_council_high_mage]’ 선거 평가에서 받은 총점은 [GetPlayer.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]이며, 그 이유는 다음과 같습니다:#indent_newline:3 \n [GetPlayer.MakeScope.GetScriptValueDesc('gate_arcane_council_election_score')] #!" #deepl:2154648864
 io_gate_arcane_council_status_election: "이 단체는 현재 차기 회장([concept_gate_arcane_council_high_mage])을 선출하고 있습니다." #deepl:2521965666
 io_gate_arcane_council_leader_title: "대마도사" #deepl:3032438028
 io_gate_arcane_council_leader_tooltip: "#header  [concept_gate_arcane_council_high_mage] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] #! \n [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetFullName] [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetName]은 현재 [concept_gate_arcane_council]의 [concept_gate_arcane_council_high_mage]입니다. \n \n 이 단체의 선거 성적은 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.MakeScope.ScriptValue('gate_arcane_council_election_score')|v]이며, 다음 선거에서는 아마도 [JournalEntry.MakeScope.Var('com_interorg_chair_var').GetCharacter.GetCountry.GetCustom('gate_arcane_council_election_indicator')]할 것으로 보입니다." #deepl:175225360
