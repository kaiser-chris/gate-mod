 gate_arcane_council_event_hint: "국제 사이버 보안 협약([concept_gate_arcane_council])을 통해 인터넷 프로토콜 500([concept_gate_magic])을 규제한다면, 앞으로 이와 같은 사고를 예방할 수 있을 것입니다." #deepl:767825992
 gate_arcane_council.1.t: "외부의 마법, 국내의 파장" #deepl:2618697781
 gate_arcane_council.1.d: "[TopScope.sC('source_country').GetName] 소속의 방문 차량이 [TopScope.sS('target_state').GetName]에서 통제력을 잃고 [concept_devastation]을 일으켰습니다. \n \n $gate_arcane_council_event_hint$" #deepl:1275259305
 gate_arcane_council.1.f: "[TopScope.sC('source_country').GetNameNoFormatting]에서 온 한 마법사가 [GetPlayer.GetAdjectiveNoFormatting] 지역 주민들과의 대치 상황에서 통제력을 잃었습니다. 이로 인해 발생한 마법 폭발은 인근 거리를 초토화시켰으며, 이미 시민, 상인, 행정관들 사이에서 불안을 야기하고 있습니다. 이 사태를 제대로 수습하지 못할 경우, 자국의 치안과 [TopScope.sC('source_country').GetNameNoFormatting]와의 관계 모두에 심각한 타격을 줄 수 있습니다." #deepl:1079261975
 gate_arcane_council.1.a: "[TopScope.sC('source_country').GetNameNoFlag]에 답변을 요구하십시오." #deepl:2732754887
 gate_arcane_council.1.b: "그 일은 신경 쓰지 마세요." #deepl:1652035745
 gate_arcane_council.1.c: "재건에 집중합시다." #deepl:38167414
 gate_arcane_council.2.t: "이방인의 재앙" #deepl:4133570612
 gate_arcane_council.2.d: "[TopScope.sC('source_country').GetName]의 드루이드 [Concept('concept_gate_magic_users','$concept_gate_magic_user$')]가 [TopScope.sS('target_state').GetName]에서 [GetHarvestConditionType('drought').GetName] [concept_harvest_condition]를 일으켰습니다. \n \n $gate_arcane_council_event_hint$" #deepl:3839380
 gate_arcane_council.2.f: "[TopScope.sC('source_country').GetNameNoFormatting] 출신의 한 드루이드가 [TopScope.sS('target_state').GetNameNoFormatting]의 농경지에 재앙을 불러온 것으로 추정된다. 불과 몇 주 전만 해도 풍요를 약속했던 들판은 이제 황량하고 회색빛으로 변해버렸지만, 초기 보고에 따르면 이는 국가의 공식적인 조치가 아니라 한 명의 광신도가 저지른 소행일 가능성이 있다. 이러한 구분은 외교적으로는 중요할지 모르나, 생계 수단이 흙속으로 사라지는 것을 지켜봐야 하는 농부들에게는 별다른 위안이 되지 못한다." #deepl:1987967690
 gate_arcane_council.2.a: "[TopScope.sC('source_country').GetNameNoFlag]에 답변을 요구하십시오." #deepl:2732754887
 gate_arcane_council.2.b: "그 일은 신경 쓰지 마세요." #deepl:1652035745
 gate_arcane_council.2.c: "우리 농민들을 돕는 데 주력합시다." #deepl:2871400520
