l_korean:
 gg_map_marker_mana_density: "[State.AccessStateRegion.MakeScope.Var('mana_density').GetValue|0]%"
 gg_map_marker_mana_density_levels: "#header Levels:#!\n• Under #v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! no [concept_gate_magical_phenomena] occur.\n• Between #v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! & #v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#! [concept_gate_magical_phenomena] can happen.\n• Starting from #v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#! [concept_gate_magical_phenomena] are common place."
 gg_map_marker_mana_density_tooltip: "[State.GetStateRegion.GetName]의 [concept_gate_mana_density]는 #v [State.GetStateRegion.MakeScope.Var('mana_density').GetValue|0]%#!입니다.\n\n#header 마나 밀도 단계:#!\n#v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! 미만: [concept_gate_magical_phenomena] 발생 없음.\n#v [State.MakeScope.ScriptValue('medium_mana_density_threshhold')]%#! ~ #v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#!: [concept_gate_magical_phenomena] 발생 가능.\n#v [State.MakeScope.ScriptValue('high_mana_density_threshhold')]%#! 이상: [concept_gate_magical_phenomena]이 일반적으로 발생."
 gg_map_marker_mana_density_gate_tooltip: "#header  [concept_gate_mana_density] [State.GetStateRegion.GetName] #! \n [GetBuildingType('building_gate_alxa').GetName] 이 사이트는 주변의 [concept_gate_mana_density]를 확대하고 있습니다. \n \n $gg_map_marker_mana_density_levels$" #deepl:4214300641
 gg_map_marker_mana_density_gate_veiled_tooltip: "#header  [concept_gate_mana_density] [State.GetStateRegion.GetName] #! \n 주변의 마나를 증가시키는 마나 원천이 있습니다. [concept_gate_mana_density]. \n \n $gg_map_marker_mana_density_levels$" #deepl:3338802587
