l_korean:
 gg_map_marker_mana_density: "[State.AccessStateRegion.MakeScope.Var('mana_density').GetValue|0]%"
 gg_map_marker_mana_density_tooltip: "#header [State.GetStateRegion.GetName]의 [concept_gate_mana_density]#!\n[State.GetStateRegion.GetName]의 [concept_gate_mana_density]는 #v [State.GetStateRegion.MakeScope.Var('mana_density').GetValue|0]%#!이다.\n\n$gg_map_marker_mana_density_levels$"
 gg_map_marker_mana_density_levels: "#header 단계:#!\n• #v [State.MakeScope.ScriptValue('gate_medium_mana_density_threshhold')]%#! 미만에서는 [concept_gate_magical_phenomena]가 발생하지 않는다.\n• #v [State.MakeScope.ScriptValue('gate_medium_mana_density_threshhold')]%#! ~ #v [State.MakeScope.ScriptValue('gate_high_mana_density_threshhold')]%#! 사이에서는 [concept_gate_magical_phenomena]가 발생할 수 있다.\n• #v [State.MakeScope.ScriptValue('gate_high_mana_density_threshhold')]%#! 이상부터는 [concept_gate_magical_phenomena]가 흔하게 발생한다."
 gg_map_marker_mana_density_gate_tooltip: "#header [State.GetStateRegion.GetName]의 [concept_gate_mana_density]#!\n이 지역에는 주변 [concept_gate_mana_density]를 증가시키는 [GetBuildingType('building_gate_alxa').GetName]이 존재한다.\n\n$gg_map_marker_mana_density_levels$"
 gg_map_marker_mana_density_gate_veiled_tooltip: "#header [State.GetStateRegion.GetName]의 [concept_gate_mana_density]#!\n이 지역에는 주변 [concept_gate_mana_density]를 증가시키는 마나의 원천이 존재한다.\n\n$gg_map_marker_mana_density_levels$"