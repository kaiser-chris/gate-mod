 je_gate_germanic_religion: "우리 형제들을 개종시키기"
 je_gate_germanic_religion_reason: "독일의 권력 회랑에는 오래전에 사라진 줄 알았던 고대의 찬가가 다시 메아리칩니다. 한때 십자가가 놓였던 자리엔 이제 참나무 잎을 새긴 깃발이 신앙의 상징으로 휘날립니다. 옛 신들이 이 땅의 중심에 돌아왔고, 그들의 사제들은 바위를 흔들고 영혼을 뒤흔드는 목소리로 설법합니다. 이제 시선은 북쪽, 아직 천둥이 울리지 않은 저 저지대 국가로 향합니다."
