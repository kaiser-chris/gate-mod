 je_gate_harmony_pledge: "$gate_harmony_pledge$" #deepl:1767427134
 je_gate_harmony_pledge_reason: "그놈의 땅에서 조화는 우연이 아니라, 하나의 구조물이다. 외부인들이 종종 온화한 철학으로 오해하는 ‘조화의 서약’은 사실 치밀한 설계물이다. 이는 끝없는 극단을 지닌 민족을 다스리기 위해 마련된 법과 관습, 그리고 은근한 교정들이 얽혀 이루어진 격자 구조다. \n \n 방치된다면, 그놈들은 찬란함이나 파멸, 방종이나 금욕, 단결이나 화려한 혼돈 중 하나로 치닫게 된다. 이 서약은 이러한 본성을 부정하지 않고, 그 본성을 올바른 방향으로 이끈다. 제도는 부드럽게 이끌고, 전통은 뿌리를 내리게 하며, 각 법령은 사회가 의지하는 미묘한 균형을 조정한다. \n \n 그러나 균형은 결코 영구적이지 않다. 갑작스러운 열정, 새로운 아이디어, 혹은 예기치 못한 위기는 순식간에 균형을 무너뜨릴 수 있다. 그래서 그놈들은 세상을 주시하는 만큼이나 스스로를 면밀히 살피며, 끊임없이 조정하고 수정하여, 그들의 과잉이 붕괴가 아닌 힘의 원천이 되도록 보장한다." #deepl:4236478007
