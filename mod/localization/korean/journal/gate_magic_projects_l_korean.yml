l_korean:
# Shared
 gate_project_button_stop: "프로젝트 중지"
 gate_project_button_stop_desc: "이 [concept_gate_project]를 중단하고 우리의 [concept_gate_magic_researcher]가 새 프로젝트를 시작할 수 있도록 허용합니다."
 gate_project_button_pause: "프로젝트 일시 중지"
 gate_project_button_pause_desc: "[concept_gate_project]와 그에 따른 지속적인 비용을 일시적으로 중단하십시오."
 gate_project_button_continue: "프로젝트 계속하기"
 gate_project_button_continue_desc: "이 [concept_gate_project]를 계속하십시오."
 modifier_gate_project_cost: "[concept_gate_project] 비용"
 modifier_gate_project_infrastructure_cost: "프로젝트 건설 비용"
 gate_project_goal: "이 [concept_gate_project]는 목표를 달성했습니다."
# Expand Magic Research Institute
 button_project_expand_research_institute: "[GetBuildingType('building_gate_magic_research_institute').GetNameNoFormatting] 확장"
 je_gate_project_expand_research_institute: "우리의 [GetBuildingType('building_gate_magic_research_institute').GetNameNoFormatting] 확장 중"
 je_gate_project_expand_research_institute_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]가 현재 #bold $je_gate_project_expand_research_institute$#!를 진행 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_expand_research_institute_description$"
 je_gate_project_expand_research_institute_description: "[GetBuildingType('building_gate_magic_research_institute').GetName]는 마법 적용의 새로운 방법을 연구하는 우리의 핵심 기관입니다. 이 프로젝트는 매달 얻을 수 있는 [concept_gate_magic_innovation]의 #bold 최대#!수치를 증가시킵니다."
 modifier_gate_project_institute_new_wing: "새로운 연구관"
 modifier_gate_project_institute_improved_instruments: "개선된 계기"
 modifier_gate_project_institute_better_mana_conduits: "더 나은 마나 도관"
# Research Arcane Domains
 button_project_domain: "$concept_gate_magic_ethics$ 연구"
 je_gate_project_domain: "$concept_gate_magic_ethics$ 연구"
 je_gate_project_domain_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]가 현재 #bold $je_gate_project_domain$#!를 진행 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_domain_description$"
 je_gate_project_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]은 우리 사회에서 마법에 대한 관점을 나타내며, 국가에 큰 이점을 제공합니다. 이 프로젝트를 통해 추가로 하나의 [concept_gate_magic_ethic]을 선택할 수 있게 됩니다."
 je_gate_project_domain_condition_not_researched: "[THIS.GetCountry.GetNameNoFlag]은 아직 새로운 [concept_gate_magic_ethic]을 연구하지 않음"
 je_gate_project_domain_condition_domain_slot: "[THIS.GetCountry.GetNameNoFlag]은 비어 있는 [concept_gate_magic_ethic] 슬롯을 최소 하나 보유하고 있음"
 # Change Arcane Domains
 button_project_change_domain: "$concept_gate_magic_ethics$ 변경"
 je_gate_project_change_domain: "$concept_gate_magic_ethics$ 변경"
 je_gate_project_change_domain_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]은 현재 #bold $je_gate_project_change_domain$#! 작업을 진행 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_change_domain_description$"
 je_gate_project_change_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]은 우리 사회가 마법을 바라보는 관점을 나타내며, 국가에 막대한 보너스를 제공합니다. 이 프로젝트를 통해 활성화된 [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]을 변경할 수 있습니다. #r [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 분야는 단 한 번만 변경할 수 있습니다!#!"
 je_gate_project_change_domain_condition_max_domains: "[THIS.GetCountry.GetNameNoFlag]은 [concept_gate_magic_ethic] 슬롯 세 개를 모두 사용하고 있음"
 je_gate_project_change_domain_condition_not_researched: "[THIS.GetCountry.GetNameNoFlag]은 아직 [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')]을 변경한 적이 없음"
# Improve Mana Extraction
 button_project_improve_mana_extraction: "마나 추출 향상"
 je_gate_project_improve_mana_extraction: "마나 추출 향상"
 je_gate_project_improve_mana_extraction_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]가 현재 #bold $je_gate_project_improve_mana_extraction$#!를 진행 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_improve_mana_extraction_description$"
 je_gate_project_improve_mana_extraction_description: "마나 추출은 마법 산업이 번성하는 데 필수적인 [GetGoods('gate_mana').GetName]의 주요 공급원입니다. 이 프로젝트는 마나 [GetBuildingType('building_gate_mana_extractor').GetBuildingGroupName] 중 하나에 $modifier_gate_project_improved_mana_extraction_with_tooltip$ [concept_modifier]을 추가합니다."
 modifier_gate_project_improved_mana_extraction: "개선된 추출"
 modifier_gate_project_improved_mana_extraction_tooltip: "#V $modifier_gate_project_improved_mana_extraction$#!\n[GetStaticModifier('modifier_gate_project_improved_mana_extraction').GetDesc]"
 modifier_gate_project_improved_mana_extraction_with_tooltip: "#bold #tooltip:[GetRawTextTooltipTag('modifier_gate_project_improved_mana_extraction_tooltip')] #underline $modifier_gate_project_improved_mana_extraction$#!#!#!"
 trigger_gate_project_can_has_unimproved_mana_extraction: "$modifier_gate_project_improved_mana_extraction_with_tooltip$ [concept_modifier] 없이 [GetBuildingType('building_gate_mana_extractor').GetBuildingGroupName] [concept_building]을 보유함"
# Modernizing Seed Selection
 button_project_modernize_seed_selection: "종자 선택 현대화"
 je_gate_project_modernize_seed_selection: "종자 선택 현대화"
 je_gate_project_modernize_seed_selection_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]가 현재 #bold $je_gate_project_modernize_seed_selection$#!를 진행 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_modernize_seed_selection_description$"
 je_gate_project_modernize_seed_selection_description: "[GetGoods('gate_magic_seed').GetName]는 농작물 수확량을 증가시키는 데 사용됩니다. 더 나은 수확량을 위해 종자 선별 방식을 현대화하면 생산량이 향상됩니다. 이 프로젝트는 우리 [GetBuildingType('building_gate_druid_grove').GetBuildingGroupName] 중 하나에 $modifier_gate_project_modernize_seed_selection_with_tooltip$ [concept_modifier]을 추가합니다."
 modifier_gate_project_modernize_seed_selection: "현대적인 종자 선발"
 modifier_gate_project_modernize_seed_selection_tooltip: "#V $modifier_gate_project_modernize_seed_selection$#!\n[GetStaticModifier('modifier_gate_project_modernize_seed_selection').GetDesc]"
 modifier_gate_project_modernize_seed_selection_with_tooltip: "#bold #tooltip:[GetRawTextTooltipTag('modifier_gate_project_modernize_seed_selection_tooltip')] #underline $modifier_gate_project_modernize_seed_selection$#!#!#!"
 trigger_gate_project_can_has_unimproved_magic_seed: "$modifier_gate_project_modernize_seed_selection_with_tooltip$ [concept_modifier] 없이 [GetBuildingType('building_gate_druid_grove').GetBuildingGroupName] [concept_building]을 보유함"
# Artificial Ecosystem
 button_project_artificial_ecosystem: "인공 생태계 구축"
 je_gate_project_artificial_ecosystem: "인공 생태계 구축"
 je_gate_project_artificial_ecosystem_reason: "[concept_gate_magic_researcher] [GetPlayer.MakeScope.Var('gate_magic_researcher').GetCharacter.GetFullName]은 현재 #bold $je_gate_project_artificial_ecosystem$#!을 작업 중입니다.\n$gate_journal_delimiter$\n$je_gate_project_artificial_ecosystem_description$"
 je_gate_project_artificial_ecosystem_description: "[GetGoods('gate_magic_seed').GetName]는 농작물 수확량을 증가시키는 데 사용됩니다. 더 나은 수확량을 위해 종자 선별 방식을 현대화하면 생산량이 향상됩니다. 이 프로젝트는 우리 [GetBuildingType('building_gate_druid_grove').GetBuildingGroupName] 중 하나에 $modifier_gate_project_modernize_seed_selection_with_tooltip$ [concept_modifier]을 추가합니다."
