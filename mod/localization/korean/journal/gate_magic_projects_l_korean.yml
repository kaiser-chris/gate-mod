 je_gate_project_change_domain_description: "[Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 이는 우리 사회의 마법에 대한 관점을 대변하며 국가에 막대한 활력을 불어넣을 것입니다. 이 프로젝트를 통해 [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 도메인을 변경할 수 있습니다. #r  [Concept('concept_gate_magic_ethic','$concept_gate_magic_ethics$')] 도메인은 단 한 번만 변경할 수 있습니다!#!" #deepl:1371592778
