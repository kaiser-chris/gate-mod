l_korean:
# Events
 gate_pelly.1.t: "냉혈한 살인" #deepl:1602546968
 gate_pelly.1.d: "[TopScope.sS('murder_state').GetName]에서 이례적인 살인 사건이 발생했습니다. [TopScope.sCha('clone').GetPrimaryRoleTitle] [TopScope.sCha('clone').GetFullName]의 도플갱어가 총에 맞아 숨진 채 발견되었습니다. 두 사람의 닮은 꼴은 기이할 정도를 넘어섭니다. 범인은 아직 밝혀지지 않았으며 도주 중입니다." #deepl:648320810
 gate_pelly.1.f: "한 목격자는 범인이 트렌치코트와 모자를 쓰고 있었다고 진술했다. 그는 드러난 피부가 녹색을 띠고 있었기 때문에 범인이 병에 걸렸을 것이라고 생각했다. 또한 범인이 피해자를 살해한 뒤 낯선 말을 중얼거리는 것을 들었기 때문에 외국인이 아닐까 추측했다." #deepl:1637002757
 gate_pelly.1.a: "이상하네." #deepl:3250626623
 gate_pelly.2.t: "도주 중인 살인범" #deepl:1753045682
 gate_pelly.2.d: "오랜 수사 끝에 우리 경찰관들은 살인범의 은신처를 특정해냈으나, 경찰이 그를 체포하기 전에 그는 도주해 버렸다. 수사관들은 은신처에서 찢겨진 일기장 한 장을 발견했다." #deepl:795823668
 gate_pelly.2.f: "\"비는 그 소음을 덮어주기에 충분했다. 나는 내가 원하는 모습으로 비춰지길 바라는 마음에 모자를 썼지만, 어차피 밤은 나를 알아봤을 것이다. 담배는 한 번 흔들리더니 내가 꺼버렸다. 끝까지 피울 필요는 없었다. 차는 느릿하고 무심하게 다가왔고, 나는 어둠 속에서 걸어 나왔다. 내 손에 쥔 리볼버만큼이나 차분하게. \n \n 세 발의 총성. \n \n 소리는 내가 예상했던 것보다 더 깔끔했다. 길 위에 쓰러진 시체는 포드처럼 보였고, 그게 여전히 나를 즐겁게 하는 부분이다. 어떤 남자는 도시 건너편 갈라 행사에 숨어 있을 수 있겠지만, 그런 얼굴은 모방할 수 있고, 그것도 엉성하게 모방할 뿐이다. 그래도 길 위에 있던 그 남자는 내가 찾아온 바로 그 사람이었다. \n \n 그가 죽었다는 걸 확신했을 때, 나도 죽었다.\"\n \n - 'P.'라고 서명된 회수된 일기장 페이지" #deepl:1722889360
 gate_pelly.2.a: "이상하네." #deepl:3250626623
 gate_pelly.3.t: "살인범이 국경을 넘어 도주했다" #deepl:295570707
 gate_pelly.3.d: "수사관들이 용의자의 위치를 특정해냈지만, 그는 도주했습니다. 그는 이미 국외로 도피해 흔적도 없이 사라진 것으로 보입니다." #deepl:4261509167
 gate_pelly.3.f: "\"용의자의 행방을 파악했으나 체포에는 실패했습니다. 접근을 시도하던 중, 그는 인간이 감당할 수 있는 한계를 훨씬 뛰어넘는, 도저히 불가능해 보이는 거리를 단숨에 뛰어넘어 도주했습니다. 이러한 비인간적인 움직임을 고려할 때, 수사관들은 해당 인물이 어떤 종류의 마법사일 가능성이 높다고 결론지었습니다. 그는 이후 국외로 도주했으며, 현재 우리 손이 닿지 않는 곳에 있는 것으로 추정됩니다.\"\n \n - 사건 기록 1.13.5 LS 발췌" #deepl:3085779159
 gate_pelly.3.a: "적어도 이제 끝났으니 다행이다." #deepl:2486173353
