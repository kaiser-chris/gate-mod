l_korean:
# Events
 gate_pelly.1.t: "냉혈한 살인"
 gate_pelly.1.d: "[TopScope.sS('murder_state').GetName]에서 기이한 살인 사건이 발생했다. [TopScope.sCha('clone').GetPrimaryRoleTitle] [TopScope.sCha('clone').GetFullName]의 도플갱어가 총에 맞아 숨진 채 발견된 것이다. 그 외모의 유사성은 기괴할 정도였다. 범인은 아직 밝혀지지 않았으며 도주 중이다."
 gate_pelly.1.f: "한 목격자는 범인이 트렌치코트와 모자를 착용하고 있었다고 증언했다. 그는 범인이 드러난 피부가 녹빛을 띠고 있었기에 병을 앓고 있었던 것 같다고 믿고 있다. 또한 피해자를 살해한 직후 범인이 이해할 수 없는 기묘한 말을 중얼거리는 것을 들었다며, 외국인일 가능성도 제기했다."
 gate_pelly.1.a: "이상하군."
 gate_pelly.2.t: "도주 중인 살인범"
 gate_pelly.2.d: "오랜 수사 끝에, 우리 경찰은 살인범의 은신처를 특정하는 데 성공했으나, 경찰이 체포하기 전에 그는 도주했다. 수사관들은 은신처에서 찢어진 일기장 한 장을 발견했다."
 gate_pelly.2.f: "\"비는 다행스럽게도 소리를 감춰주었다. 나는 사람들이 나를 바라보길 원하는 모습으로 보이기 위해 모자를 썼지만, 밤은 어차피 내 정체를 알고 있었을 것이다. 담배는 단 한 번 떨렸고, 나는 그대로 불이 꺼지게 내버려 두었다. 끝까지 피울 필요는 없었다. 차는 제멋대로 느리고 부주의하게 도착했고, 나는 손에 든 리볼버만큼이나 차가운 태도로 어둠 속에서 걸어나왔다.\n\n세 발.\n\n소리는 예상보다도 깔끔했다. 길바닥에 쓰러진 시체는 포드처럼 보였고, 그 점이 아직도 나를 웃게 만든다. 도시 반대편 연회장에 숨어 있는 남자라도, 그런 얼굴은 복제될 수 있다. 형편없이나마 말이다. 그래도 길 위에 있던 놈이야말로 내가 찾아온 대상이었다.\n\n놈이 완전히 숨이 끊어진 걸 확인했을 때, 나 역시 그렇게 되었다.\"\n\n'P.'라는 서명이 남겨진 회수된 일기장 페이지"
 gate_pelly.2.a: "이상하군."
 gate_pelly.3.t: "살인범이 국경을 넘어 도주하다"
 gate_pelly.3.d: "우리 수사관들은 용의자의 위치를 특정하는 데 성공했으나, 그는 도주했다. 그는 이미 국외로 빠져나간 뒤, 바람처럼 자취를 감춘 것으로 보인다."
 gate_pelly.3.f: "\"용의자의 위치는 확인되었으나 체포에는 실패했다. 접근을 시도하는 과정에서 그는 알려진 인간의 능력을 넘어서는 불가능한 거리를 도약해 탈출했다. 이러한 비인간적인 움직임을 고려할 때, 수사관들은 대상자가 어떤 종류의 주문시전자였을 가능성이 높다고 결론 내렸다. 이후 그는 국외로 도주했으며, 현재는 우리의 손이 닿지 않는 곳에 있는 것으로 추정된다.\"\n\n사건 파일 1.13.5 LS 발췌"
 gate_pelly.3.a: "적어도 이제 끝났으니 다행이다."
