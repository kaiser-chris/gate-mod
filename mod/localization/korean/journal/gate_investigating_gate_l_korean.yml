l_korean:
 investigate_gate_decision: "$building_gate$ 조사"
 investigate_gate_decision_desc: "[GetBuildingType('building_gate_alxa').GetName]을 조사하여 이를 통제하는 방법을 알아냅니다."
 gate_investigate_gate.1.t: "조사 성공"
 gate_investigate_gate.1.d: "우리는 [GetBuildingType('building_gate_alxa').GetName]에 대한 조사를 통해 [GetTechnology('gate_expeditions').GetName]을 발견했습니다."
 gate_investigate_gate.1.f: "수개월에 걸친 집요한 연구와 조심스러운 속삭임 끝에, 우리의 학자들은 마침내 포로로 잡힌 마법의 문이 숨기고 있던 비밀을 풀어냈습니다. 한때 이해할 수 없었던 고대의 룬들이 이제 생명력으로 깨어나, 오랫동안 잃어버린 지식을 드러냈습니다. 문에 숨겨진 미스터리가 풀리면서, 아케인 에너지가 우리의 손에 흐르며 세상에 대한 이해를 재구성했습니다. 이 새로 얻은 힘으로, 우리 국가는 마법의 르네상스의 문턱에 서 있으며, 세대를 넘어 우리를 피해온 힘들을 활용할 준비가 되어 있습니다."
 gate_investigate_gate.1.a: "완전히 새로운 세계를 탐험하라."
 je_gate_investigate_gate: "$building_gate$ 조사"
 je_gate_investigate_gate_reason: "새롭게 정복한 영토의 중심부에서, 마법 관문은 이루 말할 수 없는 힘의 유산처럼 우뚝 서 있다. 고대의 룬들은 신비로운 빛을 발하며 비전 지식의 비밀을 속삭이고 있다. 학자들이 그 주변에 모여들자 공기마저 긴장감으로 무거워진다. 이 관문은 지혜와 힘에 대한 약속을 품은 채, 그 잠금을 풀어줄 자를 기다리고 있다. 이제 그 신비를 해독하기 위한 고된 작업이 시작된다. 이는 마법에 대한 우리의 이해를 완전히 바꾸고, 우리 왕국을 새로운 경지로 끌어올릴 여정이 될지도 모른다."
 je_gate_investigate_gate_goal: "조사 성공"
 je_gate_investigate_gate_button_focus_academia: "모든 자원을 집중하라"
 je_gate_investigate_gate_button_focus_academia_desc: "비록 기술 발전에 차질이 생기더라도, 우리는 이 조사에 모든 역량을 집중할 것입니다."
 modifier_gate_focus_investigate_gate_cost: "집중 수사"