l_korean:
 je_gate_dwarven_alps: "알프스의 주인들"
 je_gate_dwarven_alps_lobby: "$je_gate_dwarven_alps_reason$"
 je_gate_dwarven_alps_status: "우리는 우리 고향의 산맥 전체를 우리 것으로 주장합니다."
 je_gate_dwarven_alps_reason: "$GATE_MK$의 궁극적 목표는 알프스를 그 깃발 아래 통합하는 것이며, 이 열망은 스위스를 분명한 대상으로 삼고 있습니다. 정복에 의존할 다른 많은 국가들과 달리, $GATE_MK$의 드워프들은 외교적 접근을 선호하며, 스위스가 자발적으로 자신들의 연합에 합류하도록 설득하고자 합니다. 그들은 한 국가가 다른 국가에 종속되는 것이 아니라, 공동 번영과 문화 교류를 바탕으로 한 동등한 동반자 관계를 구상하고 있습니다.\n$gate_journal_delimiter$\n이를 이루기 위해 $GATE_MK$는 공정한 통치와 문화적 통합 능력을 입증해야 함을 알고 있습니다. 기존 독일어권 인구의 성공적인 동화는 단순한 국내 과제가 아니라 중대한 시험 사례이기도 합니다. 스위스는 어떤 통합에서도 자신을 드워프의 이익에 종속된 존재가 아니라 동등한 동반자로 인식해야 합니다."
 je_gate_dwarven_integration_of_germans: "독일인 통합"
 je_gate_dwarven_integration_of_germans_reason: "알프스의 심장부에 자리 잡은 드워프 국가 $GATE_MK$는 전례 없는 변혁의 소용돌이 속에 놓여 있다. 독일어권 이웃들과의 연합 이후, 드워프의 고대 전통과 바이에른 인간들의 관습을 결합하여 통합된 알프스 정체성을 구축하려는 노력이 시작되었습니다. 이제 드워프 길드는 인간 평의회와 함께 논의를 진행하고, 대장간 망치 소리에는 새로운 바이에른의 선율이 울려 퍼집니다.\n$gate_journal_delimiter$\n그러나 그 과정은 결코 순탄하지 않습니다. 수 세기에 걸친 전통의 변화에 저항하는 드워프들과, 돌로 지어진 전당과 엄격한 길드 위계가 지배하는 사회 속 자신의 역할을 받아들이기 어려워하는 인간들 사이에서 긴장이 고조되고 있습니다. 양측 모두에서 불만의 속삭임은 점점 커져 갑니다. 인간들은 문화적 말살을 두려워하고, 드워프들은 타협이 자신들의 유산을 희석시키고 있다고 투덜거립니다. 눈 덮인 산맥의 그림자 아래에서 통합은 아직 캐내지 못한 광맥처럼 위태롭게 흔들리고 있으며, 오래된 자존심과 새로운 동맹의 무게 아래 산산이 갈라질 위기에 놓여 있습니다."
 je_gate_dwarven_integration_of_germans_success: "독일 국민들이 사회에 완전히 정착하게 되면 완료될 것임"
 je_gate_dwarven_integration_of_germans_failure: "통합에 대한 대중의 지지를 잃게 되면 실패할 것임"
 je_gate_dwarven_alps_button_switzerland_exists: "[SCOPE.sCountry('loc_swiss_scope').GetName]이(가) 존재함"
 je_gate_dwarven_alps_button_switzerland_magic: "$SWI$에 '마법 동맹' 제안"
 je_gate_dwarven_alps_button_switzerland_magic_desc: "[SCOPE.sCountry('loc_swiss_scope').GetName]와 [concept_alliance]를 맺는 대가로 우리의 [concept_gate_magic_knowledge]를 공유하겠다고 제안한다."
 je_gate_dwarven_alps_button_switzerland_magic_already: "[SCOPE.sCountry('loc_swiss_scope').GetName]은 아직 마법을 #bold 알지 못함#!"
 je_gate_dwarven_alps_button_switzerland_integrate: "$SWI$ 통합"
 je_gate_dwarven_alps_button_switzerland_integrate_desc: "[SCOPE.sCountry('loc_swiss_scope').GetName]을 [SCOPE.sCountry('loc_raetia_scope').GetName]에 통합합니다."
 je_gate_dwarven_alps_integrate_germans: "독일인 통합"
 je_gate_dwarven_alps_integrate_germans_desc: "[SCOPE.sCulture('loc_south_german_scope').GetName] 및 [SCOPE.sCulture('loc_alemannic_scope').GetName] 문화를 [concept_primary_cultures]로 통합하는 절차를 시작합니다. 이로 인해 우리 인구 일부가 분노할 수 있습니다."
 decision_gate_dwarven_tunnels: "드워프의 터널 파기"
 decision_gate_dwarven_tunnels_desc: "산악 주에 $state_trait_gate_dwarven_tunnels$ 특성을 추가합니다."
 decision_gate_dwarven_tunnels_cooldown_tt: "지난 6개월 동안 #v $state_trait_gate_dwarven_tunnels$#!을 굴착하지 않음"
 effect_gate_change_german_integration_progress: "독일인 통합 진행도를 [SCOPE.GetLocalVariable('integration_change').GetValue|+=0]%만큼 변경됨"
 pb_gate_german_integration_name: "통합 진행 상태"
 pb_gate_german_integration_desc: "진행률: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|0%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/100)%"
 pb_gate_german_integration_support_name: "통합에 대한 대중적 지지"
 pb_gate_german_integration_support_progess: "우리의 통합 노력"
 pb_gate_german_integration_support_desc_pro: "지지"
 pb_gate_german_integration_support_desc_anti: "반대"
 pb_gate_german_integration_support_state_peace: "[Concept('concept_incorporated_state', '$concept_incorporated_states$')] 중 [concept_turmoil]이 낮은 지역"
 pb_gate_german_integration_support_state_turmoil: "[Concept('concept_incorporated_state', '$concept_incorporated_states$')] 중 [concept_turmoil]이 높은 지역"
 gate_dwarven_alps.1.t: "마법 동맹"
 gate_dwarven_alps.1.d: "[SCOPE.sCountry('loc_raetia_scope').GetName]가 [SCOPE.sCountry('loc_swiss_scope').GetName]와 마법 [concept_alliance]를 맺었습니다."
 gate_dwarven_alps.1.f: "$GATE_MK$의 얼어붙은 산봉우리에서, 드워프들은 산맥 그 자체보다도 오래된 비밀을 품은 채 숨겨진 대장간 밖으로 모습을 드러냈습니다. 고대 석상 파수꾼들의 감시 아래, 그들은 스위스 사절들과 마주했으며, 그들의 눈빛에는 경계와 희망이 뒤섞여 빛나고 있습니다. 비전 지식을 공유하는 대가로, 드워프들은 지상 거주자들과의 동맹이 지닌 힘을 원했습니다. 그 조약은 맞잡은 악수로 봉인되었고, 산과 계곡을 하나로 묶으며 양국의 운명을 새롭게 빚어낼 연합을 약속했습니다."
 gate_dwarven_alps.1.a: "우리는 그 산맥을 함께 나누게 될 것이다."
 gate_dwarven_alps.2.t: "드워프 터널 완공"
 gate_dwarven_alps.2.d: "[SCOPE.sState('digging_state').GetName]에 #v $state_trait_gate_dwarven_tunnels$#! 특성을 추가합니다."
 gate_dwarven_alps.2.f: "끊임없는 노력과 대가적인 공학 기술 끝에, 정교한 드워프 터널망이 완성되어 [SCOPE.sState('digging_state').GetName] 주는 완전히 우리 영역에 통합되었습니다. 이 지하 통로들은 우리의 지배를 공고히 할 뿐만 아니라, 무역과 방어, 탐험을 위한 핵심 동맥 역할도 수행합니다. 곡괭이 소리와 드워프 석공들의 노랫소리가 울려 퍼지던 공간은 이제 상업과 통합으로 가득한 번화한 회랑으로 변모했으며, 이는 우리 국가의 점점 깊어지는 힘과 영향력을 상징합니다."
 gate_dwarven_alps.2.a: "이곳은 영원히 우리의 집이 될 것이다."
 gate_dwarven_alps.3.t: "알프스의 주인들"
 gate_dwarven_alps.3.d: "모든 알프스 지역은 우리 통제하에 있다."
 gate_dwarven_alps.3.f: "드디어 알프스 전역이 우리 것이 되었고, 우리는 여기서 계속 머물 것입니다!"
 gate_dwarven_alps.3.a: "알프스는 우리 것이다."
 gate_dwarven_alps.4.t: "독일인 통합"
 gate_dwarven_alps.4.d: "[SCOPE.sCulture('loc_south_german_scope').GetName] 및 [SCOPE.sCulture('loc_alemannic_scope').GetName] 문화를 [concept_primary_cultures]로 추가합니다."
 gate_dwarven_alps.4.f: "우뚝 솟은 알프스 산맥의 그림자 아래, $GATE_MK$의 드워프들은 도끼와 망치를 결의에 찬 빛으로 번뜩이며 집결했습니다. 이 험준한 산지에서 삶의 터전을 일구어온 독일인 정착민들은 이제 새로운 시대를 맞이하고 있습니다. 공식적인 칙령과 함께, 드워프들은 통합의 손길을 내밀어 자신들의 고대 전통과 산악 민족의 근면한 정신을 하나로 엮어냈습니다. 얼음 같은 바람이 사방을 휘몰아치는 가운데, 새로운 동맹이 산맥의 심장부에서 맺어졌고, 모든 돌과 모든 이야기가 서로 얽히는 미래가 만들어지기 시작했습니다."
 gate_dwarven_alps.4.a: "우리는 그들을 반드시 드워프로 만들어 버릴 것이다."
 gate_dwarven_alps.5.t: "스위스 통합"
 gate_dwarven_alps.5.d: "[SCOPE.sCountry('loc_swiss_scope').GetName]을 완전히 통합했습니다."
 gate_dwarven_alps.5.f: "알프스의 심장부, 봉우리들이 하늘을 찌르는 곳에서 $GATE_MK$와 $SWI$의 지도자들은 나란히 섰고, 그들의 목소리는 고대 전당 안에 울려 퍼졌습니다. 대지의 핵에서 솟는 빛으로 왕관을 빛내던 드워프 왕은 두 민족의 통합을 선포했습니다. $SWI$는 드워프의 지도 아래 합류하여, 돌의 강인함과 필멸자의 끈질긴 생명력을 하나로 융합하게 될 것입니다. 산맥은 이에 화답하듯 울부짖었고, 두 국가는 하나가 되어 마법과 힘이 군림할 번영과 권력의 새 시대를 열었습니다."
 gate_dwarven_alps.5.a: "우리는 그 산맥을 함께 나누게 될 것이다."
 gate_dwarven_german_integration.1.t: "소외 계층의 목소리"
 gate_dwarven_german_integration.1.d: "독일어권 시민들 중 상당수가 부의 혜택에서 소외되어 있습니다."
 gate_dwarven_german_integration.1.f: "한 전령이 골짜기에서 온 불길한 소식을 전해왔습니다. 저지대에 거주하는 독일어권 시민들이 극심한 빈곤에 시달리고 있다는 것입니다. 무너져가는 농가, 비어버린 저장고, 드워프 요새의 그늘 아래로 피난처를 찾는 가족들의 이야기가 회랑을 따라 퍼져나갔습니다. 한때 자존심 높던 그들의 목소리는 이제 절박함으로 떨리고 있고, 이제 선택은 국가의 지도자들에게 달려 있습니다 — 이들을 돕기 위한 지원을 보낼 것인가, 아니면 그들의 외침이 산맥 너머로 허공에 메아리칠 것인가? 이 결정은 가난에 허덕이는 이들만의 운명이 아니라, $GATE_MK$의 위태로운 통합을 좌우할 수도 있습니다."
 gate_dwarven_german_integration.1.a: "그들은 게으르기만 하다!"
 gate_dwarven_german_integration.1.b: "그들을 도와야 한다!"
 modifier_gate_dwarven_help_germans: "독일어권 형제들 돕기"
 modifier_gate_dwarven_german_work_program: "독일인 취업 프로그램"
 gate_dwarven_german_integration.2.t: "완고한 길드 마스터"
 gate_dwarven_german_integration.2.d: "일부 $dwarven$ 길드 마스터는 전통적인 거부권을 이용해 독일어권 시민을 길드원에게서 배제하고 있습니다."
 gate_dwarven_german_integration.2.f: "한 전령이 골짜기에서 온 불길한 소식을 전해왔습니다. 저지대에 거주하는 독일어권 시민들이 극심한 빈곤에 시달리고 있다는 것입니다. 무너져가는 농가, 비어버린 저장고, 드워프 요새의 그늘 아래로 피난처를 찾는 가족들의 이야기가 회랑을 따라 퍼져나갔습니다. 한때 자존심 높던 그들의 목소리는 이제 절박함으로 떨리고 있고, 이제 선택은 국가의 지도자들에게 달려 있습니다 — 이들을 돕기 위한 지원을 보낼 것인가, 아니면 그들의 외침이 산맥 너머로 허공에 메아리칠 것인가? 이 결정은 가난에 허덕이는 이들만의 운명이 아니라, $GATE_MK$의 위태로운 통합을 좌우할 수도 있습니다."
 gate_dwarven_german_integration.2.a: "그게 그들의 권리다."
 gate_dwarven_german_integration.2.b: "전통은 변화되어야 한다."
 gate_dwarven_german_integration.3.t: "문화 화합 축제"
 gate_dwarven_german_integration.3.d: "문화 화합 축제는 드워프와 독일계 [Concept('concept_culture', '$concept_cultures$')] 간의 통합을 증진시킵니다."
 gate_dwarven_german_integration.3.f: "$GATE_MK$의 거리에서는 다채로운 $dwarven$ 장인 정신과 독일 예술이 살아납니다. 가판대는 알프스의 진미와 드워프의 양조주로 넘쳐나며, 두 전통의 음악이 공기를 가득 채웁니다. 하루 동안, 차이점은 사라지고 공동체들은 그들의 공유된 미래를 축하하며 신뢰와 이해의 씨앗을 뿌립니다."
 gate_dwarven_german_integration.3.a: "좋군."
 gate_dwarven_german_integration.4.t: "공유 길드 혁신"
 gate_dwarven_german_integration.4.d: "드워프와 독일 문화의 융합은 우리의 [concept_gate_magic_innovation]을 증가시킵니다."
 gate_dwarven_german_integration.4.f: "드워프 길드와 독일 장인들이 획기적인 협업을 통해 전문 지식을 결합하며 마법 혁신의 새로운 지평을 여는 프로젝트입니다. 신비로운 이론과 실용적인 독창성이 만나는 워크숍은 두 전통의 근본을 뒤흔들 아이디어로 가득 차 있으며, 활기찬 에너지로 넘쳐납니다. 이 협력은 공동 창작을 통해 화합을 향한 중요한 걸음을 내딛는 과정입니다."
 gate_dwarven_german_integration.4.a: "마법의 선두에 서겠다."
 gate_dwarven_german_integration.5.t: "통합 노력 방해"
 gate_dwarven_german_integration.5.d: "일부 $dwarven$ 전통주의자들이 우리의 통합 계획을 방해하고 있습니다."
 gate_dwarven_german_integration.5.f: "드워프 전통주의자들은 자신들의 명맥 보존이 위협받고 있다고 주장하며, 통합 프로그램에 대한 암묵적인 저항 세력이 등장합니다. 이 사건은 불신을 퍼뜨리고, 민 라이티아의 기치 아래 다양한 공동체를 통합하려는 노력을 더욱 복잡하게 만듭니다."
 gate_dwarven_german_integration.5.a: "그에 따라 처벌하라."
 gate_dwarven_german_integration.5.b: "우리가 할 수 있는 게 없다."
 gate_dwarven_german_integration.6.t: "통합 노력 방해"
 gate_dwarven_german_integration.6.d: "일부 독일 전통주의자들이 우리의 통합 계획을 방해하고 있습니다."
 gate_dwarven_german_integration.6.f: "독일어를 사용하는 비밀스러운 시민 집단이 문화적 정체성 상실에 대한 두려움을 이유로 통합 계획을 방해하며 긴장이 고조되고 있습니다. 이들의 행동은 신뢰를 약화시키고, 전통을 통합된 국가로 융합하는 데 따른 어려움을 더욱 부각시킵니다."
 gate_dwarven_german_integration.6.a: "그에 따라 처벌하라."
 gate_dwarven_german_integration.6.b: "우리가 할 수 있는 게 없다."
