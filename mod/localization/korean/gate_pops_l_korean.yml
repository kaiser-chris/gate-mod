l_korean:
# Mages
 gate_mages: "@gate_mages! $gate_mages_no_icon$"
 gate_mages_only_icon: "@gate_mages!"
 gate_mages_no_icon: "마법사"
 gate_mages_desc: "교육받은 [concept_gate_magic_users]들로, 대개 부유한 엘리트 계층 출신입니다. 이들의 정치적 이해관계는 주로 [GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameWithCountryVariant]에 의해 대변됩니다."
 GATE_MAGES_QUALIFICATIONS_DESC: "충분한 [concept_literacy]를 갖춘 인구만이 #v $gate_mages$#!가 될 수 있습니다. 가능성은 [concept_literacy]와 [concept_wealth]가 높을수록 증가합니다. [concept_discrimination]을 받는 [concept_culture]의 인구는 훨씬 더 오랜 시간이 걸립니다. #v $aristocrats$#!와 #v $academics$#!는 특히 #v $gate_mages$#!가 되기 쉽습니다. [GetBuildingType('building_gate_magic_academy').GetName] [concept_building] 역시 새로운 #v $gate_mages$#! 양성을 더 쉽게 만들어 줍니다."
 gate_mages_qualifications_academy: "[GetBuildingType('building_gate_magic_academy').GetName]에서"
 pop_gate_mages: "$gate_mages$ [concept_profession]"
 building_employment_gate_mages_add: "단계별 $gate_mages$"
 building_employment_gate_mages_add_desc: "건물이 단계별로 고용할 수 있는 $gate_mages$의 수 변화"
 building_employment_gate_mages_mult: "$building_employment_gate_mages_add$"
 building_employment_gate_mages_mult_desc: "$building_employment_gate_mages_add_desc$"
 building_gate_mages_shares_add: "$gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_add_desc: "$gate_mages$의 [Concept('concept_ownership_share', '$concept_ownership_shares$')] 증감 정도"
 building_gate_mages_shares_mult: "$gate_mages$ [Concept('concept_ownership_share', '$concept_ownership_shares$')]"
 building_gate_mages_shares_mult_desc: "$gate_mages$의 [Concept('concept_ownership_share', '$concept_ownership_shares$')] 증감 정도"
 building_gate_mages_mortality_mult: "$state_gate_mages_mortality_mult$"
 building_gate_mages_mortality_mult_desc: "$state_gate_mages_mortality_mult_desc$"
 building_gate_mages_fertility_mult: "$gate_mages$의 [Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')]"
 building_gate_mages_fertility_mult_desc: "$gate_mages$의 [Concept('concept_pop_growth', '$concept_pop_growth_birthrate$')] 증감 정도"
 state_gate_mages_dependent_wage_mult: "$gate_mages$ 피부양 인구 수입"
 state_gate_mages_dependent_wage_mult_desc: "$gate_mages$ 피부양 인구 수입의 증감 정도"
 state_gate_mages_mortality_mult: "$gate_mages$의 [Concept('concept_pop_growth', '$concept_pop_growth_mortality$')]"
 state_gate_mages_mortality_mult_desc: "$gate_mages$의 [Concept('concept_pop_growth', '$concept_pop_growth_mortality$')] 증감 정도"
 state_gate_mages_investment_pool_contribution_add: "$gate_mages$ [concept_investment_pool] 공헌"
 state_gate_mages_investment_pool_contribution_add_desc: "$gate_mages$ 계층이 투자할 이윤의 액수"
 state_gate_mages_investment_pool_efficiency_mult: "$gate_mages$ [concept_investment_pool] 공헌 효율"
 state_gate_mages_investment_pool_efficiency_mult_desc: "[concept_investment_pool]에 공헌되는 $gate_mages$의 투자 소득 증감 정도"
 country_gate_mages_pol_str_mult: "$gate_mages$의 [concept_political_strength]"
 country_gate_mages_pol_str_mult_desc: "$gate_mages$의 [concept_political_strength] 증가 또는 감소"
 country_gate_mages_voting_power_add: "$gate_mages$ [concept_votes]의 [concept_political_strength]"
 country_gate_mages_voting_power_add_desc: "선거에서 $gate_mages$의 [concept_votes]로 얻는 [concept_political_strength]의 증감 정도"
 building_gate_mages_standard_of_living_add: "$gate_mages$의 [concept_sol]"
 building_gate_mages_standard_of_living_add_desc: "고용된 $gate_mages$의 [concept_sol]에 대한 보너스 또는 불이익입니다."
