l_korean:
# Orcish Hegemony
 lawgroup_gate_orcish_hegemony: "$orcish$ 패권"
 lawgroup_gate_orcish_hegemony_desc: "$lawgroup_gate_orcish_hegemony$은 삶의 모든 측면을 권력과 위계가 규정하는 잔혹하고 비타협적인 체제입니다. 오크에게 지배는 단순한 권리가 아니라 신조이며, 모든 비오크는 노예가 되어 정체성과 자유를 박탈당한 채 녹색 피부의 주인들을 섬기도록 묶여 있습니다. 그러나 오크들 사이에서도 삶은 단순히 힘만으로 결정되지 않습니다. 그들 역시 직업에 따라 계층화되어 있으며, 각 역할은 엄격히 통제됩니다."
 law_gate_orcish_hegemony_enforced: "강제된 패권"
 law_gate_orcish_hegemony_enforced_desc: "$orcish$ [concept_culture]의 사회적 패권가 확립됩니다."
 law_gate_orcish_hegemony_not_enforced: "행사되지 않는 패권"
 law_gate_orcish_hegemony_not_enforced_desc: "$orcish$ [concept_culture]의 사회적 패권은 강제되지 않으며, 다른 문화들도 우리 사회에 편입될 수 있습니다."
# Elven Supremacy
 lawgroup_gate_elven_supremacy: "$elven$ 패권"
 lawgroup_gate_elven_supremacy_desc: "엘프 우월주의는 엘프가 권력과 명예, 그리고 마법을 절대적으로 독점하는 경직된 사회 질서를 강제합니다. 다른 종족들 또한 사회 구조 속에 편입되어 있지만, 하위 계층에 묶여 성직자나 귀족, 마법 수행자 같은 지위에는 오를 수 없습니다. 엘프의 타고난 우월성을 신념으로 삼는 이 체제는, 타 종족의 노동력과 기술을 활용하면서도 엘프의 지배를 확고히 유지하도록 설계되어 있습니다."
 law_gate_elven_supremacy_religious_preaching: "종교적 우월성 주장"
 law_gate_elven_supremacy_religious_preaching_desc: "$elven$의 지배는 종교적 가르침을 통해 확립됩니다."
 law_gate_elven_supremacy_enforced: "강제된 우월성"
 law_gate_elven_supremacy_enforced_desc: "$elven$의 우월성은 국가에 의해 강제됩니다."
 law_gate_elven_supremacy_not_enforced: "행사되지 않는 우월성"
 law_gate_elven_supremacy_not_enforced_desc: "$elven$의 우월성은 강제되지 않습니다."
# New Samadore
 law_gate_gnomish_harmony: "노움의 조화"
 law_gate_gnomish_harmony_desc: "노움들의 다양성 속 통합 능력에서 영감을 받은 이 시민권법은 다문화주의를 사회의 초석으로 받아들입니다. 모든 종교와 문화가 환영받고 통합되며, 다채로운 전통의 생생한 태피스트리를 만들어냅니다. 협력과 상호 존중의 정신 속에서, 노움의 조화는 차이를 강점으로 바꾸고, 모든 목소리가 국가라는 합창 속에서 제자리를 찾도록 보장합니다."
 EFFECTS_ON_ACCEPTANCE_law_gate_gnomish_harmony: "#tooltippable #tooltip:$BREAKDOWN_TAG$ 받아들여지는 정도는 덜하지만, 몇 가지 부정적인 결과를 제외하면 인구층은 비슷한 삶을 살아갑니다#!#!"
 law_gate_gnomish_integration: "노움 통합"
 law_gate_gnomish_integration_desc: "존중과 협력에 뿌리를 둔 노움식 통합은 정복이 아닌 연결을 지향합니다. 이 식민 정책은 대화와 공동 번영, 상호 존중을 통해 다른 문화를 자발적으로 국가 안에 포용하는 것을 중시합니다. 지배보다 통합을 우선함으로써, 이 접근법은 식민지를 예속된 땅이 아니라 번영하는 동반자로 바꾸는 지속적 유대를 구축하고자 합니다. 복잡한 문제가 없는 것은 아니지만, 노움식 통합은 조화와 공동 성장을 바탕으로 한 식민화의 비전을 보여줍니다."
# Monster Hunting
 lawgroup_gate_monster_hunting: "괴물 사냥"
 lawgroup_gate_monster_hunting_desc: "[Concept('concept_gate_monster_attack','$concept_gate_monster_attacks$')]를 방지하기 위한 괴물 사냥 체계입니다."
 law_gate_no_organized_monster_hunting: "조직적인 괴물 사냥 금지"
 law_gate_no_organized_monster_hunting_desc: "이 국가는 괴물을 사냥하는 조직적인 세력을 보유하고 있지 않으며, [Concept('concept_gate_monster_attack','$concept_gate_monster_attacks$')]가 빈번하게 발생할 것입니다."
 law_gate_private_monster_hunters: "사설 괴물 사냥꾼"
 law_gate_private_monster_hunters_desc: "이국가는 개인이나 기업에 허가를 내주고 보수를 지급하여 괴물을 사냥하게 합니다."
 law_gate_dedicated_monster_hunters: "전문 괴물 사냥꾼"
 law_gate_dedicated_monster_hunters_desc: "이 국가에는 체계적인 훈련을 받은 전문 괴물 사냥꾼들이 있습니다."
 law_gate_militarized_monster_hunters: "무장한 괴물 사냥꾼"
 law_gate_militarized_monster_hunters_desc: "괴물 사냥꾼들에게 군용 장비와 군사 훈련을 제공하면, 그들의 임무 수행 능력이 향상됩니다."
# Arcane Organization
 lawgroup_gate_magic_users: "비전 조직"
 lawgroup_gate_magic_users_desc: "우리 사회에서 [concept_gate_magic]의 활용 방식을 어떻게 체계화할 것인지에 관한 법륩입니다."
 law_gate_free_magic_users: "조직화 없음"
 law_gate_free_magic_users_desc: "해당 국가는 [GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]을 일반 시민으로 대우하며, [concept_gate_magic]에 대한 규제를 두지 않습니다."
 law_gate_restricted_magic_users: "엄격한 허가증"
 law_gate_restricted_magic_users_desc: "[concept_gate_magic]은 국가에 의해 엄격하게 규제됩니다. [GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]은 철저히 감시되며, 정부에서 발급한 허가증을 가진 사람만이 이를 사용할 수 있습니다. 무단으로 [concept_gate_magic]을 사용하는 것은 엄격히 처벌되며, 정부는 자국의 권위에 위협이 될 수 있는 모든 마법 활동을 방지하기 위해 마법에 대한 통제를 강화하고 있습니다."
 law_gate_noble_magic_users: "비전 귀족"
 law_gate_noble_magic_users_desc: "해당 국가는 [GetInterestGroupVariant('ig_gate_magic_users',GetPlayer).GetNameNoFormatting]을 타고난 귀족이라고 위협하며 일반 시민보다 더 많은 권리를 부여합니다."
 law_gate_druidic_circles: "드루이드 집회"
 law_gate_druidic_circles_desc: "[GetPopType('gate_druids').GetName]은 자연과 교감하여 식물과 동물의 힘을 활용합니다. 신성한 숲과 자연의 순환에 맞춰 이들은 치유, 보호, 그리고 야생을 제어하는 능력을 지닙니다."
 law_gate_mage_guilds: "마법사 길드"
 law_gate_mage_guilds_desc: "이 마법 체계는 숙련된 [GetPopType('gate_mages').GetName]들이 운영하는 마법사 길드의 전문성에 기반합니다. 정련된 수련, 마법 도구, 그리고 신비로운 주문을 통해 이들은 마법 산업을 증진시킬 수 있습니다."
 law_gate_arcane_bureau: "비전국"
 law_gate_arcane_bureau_desc: "[GetPopType('gate_mages').GetName]와 [GetPopType('gate_druids').GetName]를 하나의 조직 아래 통합하는 국가 운영 기관입니다."
# Government Principles
 law_gate_vampire_monarchy: "영원한 군주제"
 law_gate_vampire_monarchy_desc: "이 나라는 [concept_gate_vampirism]를 받아들였고 군주는 영원한 존재로 여겨집니다."
 law_gate_magocracy: "마법정"
 law_gate_magocracy_desc: "국가에서 가장 강력한 마법사가 능력, 지위 또는 혈통에 따라 평생 통치하는 형태의 정부입니다. 이들은 $RULER_TITLE_GATE_ARCHWIZARD$ 또는 $RULER_TITLE_GATE_ARCHWITCH$로 선포됩니다."
# Distribution of Power
 law_gate_arcane_council: "비전 의회"
 law_gate_arcane_council_desc: "국가 원수는 소수의 강력한 비선출 [GetPopType('gate_mages').GetName] 및 [GetPopType('gate_druids').GetName]들과 권력과 책임을 공유합니다."
